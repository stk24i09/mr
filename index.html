<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛠️ GARAGE RACK // CONTROL TERMINAL</title>

<style>
/* 共通リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    /* 硬質でインダストリアルなサンセリフと等幅フォント */
    font-family: "Impact", "Arial Black", "Consolas", "Courier New", monospace, sans-serif;
    background-color: #121314; /* 鋳鉄のような極暗グレー */
    /* 縞鋼板（チェッカープレート）を模した極薄のパターン背景 */
    background-image: 
        linear-gradient(45deg, #18191a 25%, transparent 25%), 
        linear-gradient(-45deg, #18191a 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #18191a 75%),
        linear-gradient(-45deg, transparent 75%, #18191a 75%);
    background-size: 16px 16px;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
    color: #d1d2d3; /* くすんだスチール色 */
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 32px;
    -webkit-font-smoothing: antialiased;
}

/* ヘッダー：工業用マシンの銘板（ネームプレート）風 */
.garage-header {
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    margin-bottom: 24px;
    background-color: #1a1c1e;
    border: 2px solid #2d3135;
    border-left: 6px solid #d35400; /* アンバーオレンジのアクセント */
    border-radius: 4px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 4px 12px rgba(0,0,0,0.5);
    flex-shrink: 0;
}

.brand-title {
    font-size: 18px;
    font-weight: 900;
    color: #f3f4f6;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 12px;
}

.brand-title span {
    color: #d35400;
}

.system-volt {
    font-size: 11px;
    font-family: "Consolas", monospace;
    color: #2ecc71; /* インジケーターのグリーン */
    background: #0d1b15;
    padding: 4px 10px;
    border: 1px solid #145a32;
    border-radius: 3px;
    letter-spacing: 1px;
}

/* 2カラムワークスペース */
.garage-workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 24px;
    width: 100%;
}

/* スチールラックをイメージしたパネル */
.garage-panel {
    flex: 1;
    background: #16181a;
    border: 2px solid #2d3135;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
}

.panel-header {
    background-color: #1c1e22;
    padding: 16px 20px;
    border-bottom: 2px solid #2d3135;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.panel-title {
    font-size: 12px;
    font-weight: bold;
    color: #a0a5a9;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
}

.panel-title::before {
    content: "";
    display: inline-block;
    width: 8px;
    height: 8px;
    background-color: #d35400;
    border-radius: 50%;
    box-shadow: 0 0 8px #d35400;
}

/* コントロールコンソール（アナログアンプのつまみ風） */
.control-console {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
    background-color: #111214;
    border: 1px solid #23272a;
    border-radius: 4px;
    padding: 12px 16px;
}

.selector-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-family: "Consolas", monospace;
    color: #888;
}

/* ヘヴィ・デューティーなセレクトボックス */
select {
    background: #1a1c1e;
    color: #d1d2d3;
    border: 1px solid #3a3f44;
    padding: 6px 12px;
    border-radius: 4px;
    font-size: 11px;
    font-family: "Consolas", monospace;
    outline: none;
    cursor: pointer;
    transition: all 0.2s;
}

select:focus {
    border-color: #d35400;
}

/* トグルスイッチ風の金属製同期ボタン */
.btn-industrial {
    background: linear-gradient(to bottom, #2c3035, #1c1e22);
    color: #e5e7eb;
    border: 1px solid #3e444b;
    border-bottom: 3px solid #111214;
    padding: 6px 16px;
    font-family: "Consolas", monospace;
    font-size: 11px;
    font-weight: bold;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.1s;
}

.btn-industrial:hover {
    background: linear-gradient(to bottom, #353b41, #24292e);
    border-color: #4e555d;
}

.btn-industrial:active {
    border-bottom-width: 1px;
    transform: translateY(2px);
}

#updateTime {
    font-size: 10px;
    font-family: "Consolas", monospace;
    color: #666;
    margin-top: 4px;
    text-align: right;
}

.panel-body {
    overflow-y: auto;
    flex: 1;
    padding: 20px;
}

/* テーブルスタイル（配管やメタルラックをイメージ） */
.garage-table {
    width: 100%;
    border-collapse: collapse;
}

.garage-table th {
    padding: 10px 8px;
    font-size: 10px;
    font-family: "Consolas", monospace;
    color: #666;
    text-transform: uppercase;
    text-align: left;
    border-bottom: 2px solid #2d3135;
}

.garage-table td {
    padding: 14px 8px;
    font-size: 13px;
    border-bottom: 1px solid #202225;
}

/* ギアやメタルパーツを想起させる生徒名選択 */
.target-btn {
    font-size: 13px;
    font-family: "Consolas", monospace;
    font-weight: bold;
    color: #a0a5a9;
    background: none;
    border: none;
    cursor: pointer;
    text-align: left;
    width: 100%;
    transition: all 0.15s;
}

.target-btn:hover {
    color: #d35400;
    text-shadow: 0 0 10px rgba(211,84,0,0.3);
}

/* アクティブ選択行：ヴィンテージウッドのような赤みのブラウン */
.row-active td {
    background-color: #231c16 !important; /* オイルステインウッド風 */
    border-top: 1px solid rgba(211,84,0,0.3);
    border-bottom: 1px solid rgba(211,84,0,0.3);
}

.row-active .target-btn {
    color: #d35400;
}

/* メタルプレート風カウンター */
.gear-badge {
    background-color: #111214;
    color: #d4ac0d; /* 真鍮ゴールド */
    border: 1px solid #3a321a;
    padding: 2px 8px;
    border-radius: 3px;
    font-family: "Consolas", monospace;
    font-size: 11px;
    font-weight: bold;
}

.row-active .gear-badge {
    color: #f39c12;
    border-color: #e67e22;
    background-color: #1c1008;
}

/* 右側：詳細（工業用ワークカード風） */
.card-stack {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.detail-title {
    font-size: 15px;
    font-weight: bold;
    color: #f3f4f6;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px dashed #2d3135;
    font-family: "Consolas", monospace;
}

/* タイムカード風ログカード */
.work-card {
    background-color: #1a1c1e;
    border: 1px solid #2d3135;
    border-left: 3px solid #d4ac0d; /* ブラスライン */
    padding: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-radius: 3px;
}

.work-card:hover {
    background-color: #1e2124;
}

.work-main {
    font-size: 13px;
    color: #cbd5e1;
    font-family: sans-serif;
}

.work-main strong {
    color: #f3f4f6;
    font-family: "Consolas", monospace;
}

.work-meta {
    font-family: "Consolas", monospace;
    font-size: 11px;
    color: #70757a;
}

/* 未選択：無稼働状態のモニター */
.offline-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #555;
    text-align: center;
}

.offline-icon {
    font-size: 32px;
    margin-bottom: 16px;
    color: #333;
}

.offline-prompt {
    font-size: 11px;
    font-family: "Consolas", monospace;
    line-height: 1.8;
}

/* 歯車調ローディング */
.gear-loader {
    width: 24px;
    height: 24px;
    border: 3px dashed #d35400;
    border-radius: 50%;
    animation: rotate-gear 2s infinite linear;
    margin-bottom: 16px;
}

@keyframes rotate-gear {
    to { transform: rotate(360deg); }
}

/* タフなスクロールバー */
::-webkit-scrollbar {
    width: 6px;
}
::-webkit-scrollbar-track {
    background: #111214;
}
::-webkit-scrollbar-thumb {
    background: #2a2d30;
    border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover {
    background: #3e4448;
}
</style>

</head>

<body>

<!-- 工業用ネームプレート調ヘッダー -->
<div class="garage-header">
    <div class="brand-title">
        <span>[🛠️]</span> GARAGE_RACK // ADMIN_PORT
    </div>
    <div class="system-volt">SYS_STATUS: ACTIVE</div>
</div>

<!-- メインエリア -->
<div class="garage-workspace">

    <!-- 左パネル：ツール（生徒名簿） -->
    <div class="garage-panel">
        <div class="panel-header">
            <div class="panel-title">Target Registry</div>
        </div>
        <div class="panel-body">
            
            <div class="control-console">
                <div class="selector-group">
                    <span>SORT:</span>
                    <select id="sortSelect" onchange="loadSummary()">
                        <option value="count">Count (最高稼働順)</option>
                        <option value="id">Alphabetical (ID順)</option>
                    </select>
                </div>
                <div>
                    <button class="btn-industrial" onclick="refreshData()">Sync Server</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <table class="garage-table" id="summaryTable">
                <thead>
                    <tr>
                        <th style="padding-left: 8px;">Target Unit (ID)</th>
                        <th style="text-align: right; padding-right: 8px; width: 80px;">Tasks</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JS展開 -->
                </tbody>
            </table>

        </div>
    </div>

    <!-- 右パネル：タスクカード（指導履歴） -->
    <div class="garage-panel">
        <div class="panel-header">
            <div class="panel-title">Operation Logs</div>
        </div>
        <div id="historyArea" class="panel-body">
            <!-- 未選択状態 -->
            <div class="offline-state">
                <div class="offline-icon">🔌</div>
                <p class="offline-prompt">
                    SYSTEM IDLE // SELECT TARGET ON THE LEFT<br>
                    左リストから識別IDを選択して、ログをアクティブ化してください。
                </p>
            </div>
        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = "SYNC_T: " + now.toLocaleTimeString("en-US", {hour12: false});
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";
        let students = [];
        
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="target-btn" onclick="showHistory('${student.id}')">
                        &gt; ${student.id}
                    </button>
                </td>
                <td style="text-align: right; padding-right: 8px;">
                    <span class="gear-badge">${student.count} LOGS</span>
                </td>
            </tr>
            `;
        });

        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // アクティブ行の変更
    document.querySelectorAll('.garage-table tbody tr').forEach(tr => tr.classList.remove('row-active'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('row-active');
    }

    // ロード中表示
    document.getElementById("historyArea").innerHTML = `
        <div class="offline-state">
            <div class="gear-loader"></div>
            <p class="offline-prompt">RETRIEVING MACHINE DATA FOR ${studentId}...</p>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <div class="detail-title">> REGISTERED STREAM: ${studentId}</div>
        <div class="card-stack">
        `;

        for(let i = 0; i < data.length; i++){
            let d = new Date(data[i].date);
            let dateStr = d.toLocaleDateString("en-US", { year: 'numeric', month: 'short', day: 'numeric' }) + " " + d.toLocaleTimeString("en-US", { hour: '2-digit', minute: '2-digit', hour12: false });

            html += `
            <div class="work-card">
                <div class="work-main">
                    Supervisor / Instructor: <strong>${data[i].teacher}</strong>
                </div>
                <div class="work-meta">
                    [ ${dateStr} ]
                </div>
            </div>
            `;
        }

        html += "</div>";
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="offline-state" style="color: #e74c3c;">
                <div class="offline-icon">🚨</div>
                <p class="offline-prompt">CONNECTION ERROR // SYNC FAILED.</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
