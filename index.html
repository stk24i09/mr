<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面接練習回数管理システム</title>

<style>
/* 共通リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

/* スクロールバーもガラスに馴染む極細デザイン */
::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
::-webkit-scrollbar-track {
    background: transparent;
}
::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.15);
    border-radius: 9999px;
}
::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.3);
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Arial, sans-serif;
    background-color: #0f1322; /* ベースは深い夜空のネイビー */
    color: #f8fafc;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
}

/* 背景に配置する美しいオーラ（ぼかしグラデーション） */
body::before, body::after {
    content: "";
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    filter: blur(120px);
    z-index: -1;
    opacity: 0.55;
    pointer-events: none;
}
body::before {
    top: -10%;
    left: -10%;
    background: radial-gradient(circle, #4f46e5 0%, transparent 80%);
    animation: float-slow 20s infinite alternate ease-in-out;
}
body::after {
    bottom: -10%;
    right: -10%;
    background: radial-gradient(circle, #06b6d4 0%, transparent 80%);
    animation: float-slow 25s infinite alternate-reverse ease-in-out;
}

@keyframes float-slow {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(80px, 50px) scale(1.1); }
}

/* Apple風 グラスモフィズム（すりガラス）の共通クラス */
.glass-panel {
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.25);
}

/* トップヘッダー */
.app-header {
    height: 68px;
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255, 255, 255, 0.01);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    flex-shrink: 0;
}

.brand {
    display: flex;
    align-items: center;
    gap: 12px;
}

.brand-icon {
    font-size: 20px;
    background: rgba(255, 255, 255, 0.1);
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.15);
}

.brand-name {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #ffffff;
}

.user-badge {
    background: rgba(255, 255, 255, 0.07);
    color: #e2e8f0;
    font-size: 11px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 9999px;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

/* メイン2カラム配置 */
.app-viewport {
    display: flex;
    flex: 1;
    overflow: hidden;
    padding: 24px;
    gap: 24px;
    max-width: 1500px;
    width: 100%;
    margin: 0 auto;
}

/* 左右のガラスボード */
.board-card {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
}

.board-header {
    padding: 24px 28px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    flex-shrink: 0;
}

.board-title {
    font-size: 15px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.02em;
}

.board-body {
    overflow-y: auto;
    flex: 1;
    padding: 24px 28px;
}

/* コントロールエリア */
.controls-container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
}

.sort-box {
    display: flex;
    align-items: center;
    gap: 8px;
}

.sort-label {
    font-size: 12px;
    font-weight: 500;
    color: #94a3b8;
}

/* 磨りガラススタイルのコントロールパーツ */
select {
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 600;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #ffffff;
    border-radius: 12px;
    outline: none;
    cursor: pointer;
    transition: all 0.2s;
}

select:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.2);
}

select option {
    background-color: #171d31; /* ドロップダウンメニューの背景 */
    color: #ffffff;
}

.btn-glass {
    padding: 8px 18px;
    font-size: 12px;
    font-weight: 600;
    background: rgba(255, 255, 255, 0.08);
    color: #ffffff;
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
}

.btn-glass:hover {
    background: rgba(255, 255, 255, 0.15);
    border-color: rgba(255, 255, 255, 0.25);
    transform: translateY(-1px);
}

.btn-glass:active {
    transform: translateY(0);
}

#updateTime {
    font-size: 10px;
    color: #64748b;
    margin-top: 4px;
    text-align: right;
}

/* テーブルデザイン（極細グリッド） */
.glass-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 10px; /* 行ごとの隙間 */
    margin-top: -10px;
}

.glass-table th {
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 600;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-align: left;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
}

.glass-table td {
    padding: 14px 16px;
    background: rgba(255, 255, 255, 0.02);
    border-top: 1px solid rgba(255, 255, 255, 0.04);
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    transition: all 0.25s ease;
}

.glass-table td:first-child {
    border-left: 1px solid rgba(255, 255, 255, 0.04);
    border-top-left-radius: 12px;
    border-bottom-left-radius: 12px;
}

.glass-table td:last-child {
    border-right: 1px solid rgba(255, 255, 255, 0.04);
    border-top-right-radius: 12px;
    border-bottom-right-radius: 12px;
    text-align: right;
}

/* ホバーでガラスが浮き上がる質感 */
.glass-table tr:hover td {
    background: rgba(255, 255, 255, 0.06);
    border-color: rgba(255, 255, 255, 0.12);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
}

.id-click-btn {
    font-size: 13px;
    font-weight: 700;
    color: #f8fafc;
    background: none;
    border: none;
    cursor: pointer;
    transition: color 0.2s;
    letter-spacing: 0.03em;
}

.id-click-btn:hover {
    color: #38bdf8;
}

/* 選択行のガラスオーラエフェクト */
.row-active td {
    background: rgba(255, 255, 255, 0.08) !important;
    border-color: rgba(56, 189, 248, 0.3) !important; /* ライトブルーのエッジ */
}

.row-active .id-click-btn {
    color: #38bdf8;
}

/* 半透明ガラスチップ */
.glass-chip {
    background: rgba(255, 255, 255, 0.05);
    color: #e2e8f0;
    border: 1px solid rgba(255, 255, 255, 0.08);
    padding: 6px 14px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
    display: inline-block;
}

.row-active .glass-chip {
    background: rgba(56, 189, 248, 0.15);
    color: #38bdf8;
    border-color: rgba(56, 189, 248, 0.25);
}

/* 履歴画面のアクリル風カードリスト */
.history-meta-title {
    font-size: 15px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 20px;
}

.history-glass-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.history-glass-item {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 14px;
    padding: 18px 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.2s;
}

.history-glass-item:hover {
    background: rgba(255, 255, 255, 0.04);
}

.history-content-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.history-tag {
    font-size: 9px;
    font-weight: 700;
    color: #38bdf8;
    letter-spacing: 0.1em;
}

.teacher-name {
    font-size: 13px;
    font-weight: 600;
    color: #f8fafc;
}

.date-text {
    font-size: 11px;
    color: #94a3b8;
}

/* プレースホルダー */
.glass-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #64748b;
    text-align: center;
}

.glass-empty-icon {
    font-size: 32px;
    margin-bottom: 12px;
    background: rgba(255, 255, 255, 0.03);
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255, 255, 255, 0.05);
}

.glass-empty-text {
    font-size: 13px;
    font-weight: 500;
}
</style>

</head>

<body>

<!-- アプリヘッダー -->
<div class="app-header">
    <div class="brand">
        <div class="brand-icon">❄️</div>
        <span class="brand-name">INTERVIEW MIRAGE</span>
    </div>
    <span class="user-badge">FACULTY MEMBER</span>
</div>

<!-- メインエリア -->
<div class="app-viewport">

    <!-- 左パネル -->
    <div class="board-card glass-panel">
        <div class="board-header">
            <div class="board-title">STUDENTS</div>
        </div>
        <div class="board-body">
            <div class="controls-container">
                <div class="sort-box">
                    <span class="sort-label">SORT</span>
                    <select id="sortSelect" onchange="loadSummary()">
                        <option value="count">面接回数 順</option>
                        <option value="id">生徒ID 順</option>
                    </select>
                </div>
                <div>
                    <button class="btn-glass" onclick="refreshData()">RELOAD</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <table class="glass-table" id="summaryTable">
                <thead>
                    <tr>
                        <th>生徒ID</th>
                        <th style="text-align: right; width: 100px;">練習回数</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JSにより動的に挿入されます -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 右パネル -->
    <div class="board-card glass-panel">
        <div class="board-header">
            <div class="board-title">HISTORY</div>
        </div>
        <div id="historyArea" class="board-body">
            <!-- 初期表示のプレースホルダー -->
            <div class="glass-empty">
                <div class="glass-empty-icon">💎</div>
                <p class="glass-empty-text">生徒IDを選択すると、バックエンドから履歴を投影します。</p>
            </div>
        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = now.toLocaleTimeString("ja-JP") + " 更新済み";
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";

        let students = [];
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="id-click-btn" onclick="showHistory('${student.id}')">
                        ${student.id}
                    </button>
                </td>
                <td style="text-align: right;">
                    <span class="glass-chip">${student.count} 回</span>
                </td>
            </tr>
            `;
        });

        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // アクティブな生徒行の強調
    document.querySelectorAll('.glass-table tbody tr').forEach(tr => tr.classList.remove('row-active'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('row-active');
    }

    // ガラス状のなめらかなロードアニメーション代わり
    document.getElementById("historyArea").innerHTML = `
        <div class="glass-empty">
            <div class="glass-empty-icon">❄️</div>
            <p class="glass-empty-text">セッション同期中...</p>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <h2 class="history-meta-title">
             ${studentId} のログ
        </h2>
        <div class="history-glass-list">
        `;

        for(let i = 0; i < data.length; i++){
            let date = new Date(data[i].date);
            html += `
            <div class="history-glass-item">
                <div class="history-content-left">
                    <span class="history-tag">SESSION 0${i+1}</span>
                    <span class="teacher-name">面接官: ${data[i].teacher} 先生</span>
                </div>
                <div class="date-text">
                    ${date.toLocaleString("ja-JP")}
                </div>
            </div>
            `;
        }

        html += "</div>";
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="glass-empty" style="color: #f43f5e;">
                <div class="glass-empty-icon">⚠️</div>
                <p class="glass-empty-text">同期に失敗しました。再接続してください。</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
