<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>面接練習回数管理システム</title>

<style>
body{
    font-family:sans-serif;
    margin:30px;
    max-width:1400px;
}

.container{
    display:flex;
    flex-direction:row;
    align-items:flex-start;
    gap:30px;
}

.left-panel{
    flex:1;
    min-width:400px;
}

.right-panel{
    flex:1;
    min-width:400px;
}

table{
    border-collapse:collapse;
    width:100%;
}

th,td{
    border:1px solid #000;
    padding:10px;
    text-align:center;
}

th{
    background:#eeeeee;
}

.student-link{
    color:blue;
    cursor:pointer;
    text-decoration:underline;
}

.student-link:hover{
    color:red;
}

#historyArea{
    border:1px solid #ccc;
    padding:15px;
    min-height:300px;
    background:#fafafa;
}

.sortArea{
    margin-bottom:15px;
}

select{
    padding:5px;
    font-size:16px;
}

button{
    padding:6px 15px;
    font-size:16px;
    margin-left:15px;
    cursor:pointer;
}

button:hover{
    background:#eeeeee;
}

#updateTime{
    margin-top:10px;
    color:#555;
}
</style>
</head>

<body>

<div class="container">

<div class="left-panel">
<h1>面接練習回数一覧</h1>

<div class="sortArea">
<label for="sortSelect">並び替え：</label>
<select id="sortSelect" onchange="loadSummary()">
    <option value="id">生徒ID順</option>
    <option value="count">面接回数順</option>
</select>

<button onclick="refreshData()">🔄 更新</button>
<p id="updateTime"></p>
</div>

<table id="summaryTable">
<tr>
    <th>生徒名 / ID</th>
    <th>面接回数</th>
</tr>
</table>
</div>

<div class="right-panel">
<div id="historyArea">
    <h2>面接履歴</h2>
    <p>生徒名をクリックしてください。</p>
</div>
</div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = "最終更新：" + now.toLocaleString("ja-JP");
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = `
        <tr>
            <th>生徒名 / ID</th>
            <th>面接回数</th>
        </tr>
        `;

        let students = [];
        for(let name in data){
            students.push({
                name: name,
                count: Number(data[name]) || 0
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        // 回数順（多い順）
        if(sortType == "count"){
            students.sort(function(a, b){
                if(b.count !== a.count){
                    return b.count - a.count;
                }
                return a.name.localeCompare(b.name, undefined, {numeric: true});
            });
        }
        // ID順（24i01 〜 24i33 を昇順に並べる）
        else{
            students.sort(function(a, b){
                const matchA = a.name.match(/\d+[a-zA-Z]\d+/);
                const matchB = b.name.match(/\d+[a-zA-Z]\d+/);
                
                const codeA = matchA ? matchA[0] : a.name;
                const codeB = matchB ? matchB[0] : b.name;
                
                return codeA.localeCompare(codeB, undefined, {numeric: true});
            });
        }

        // テーブル生成
        students.forEach(function(student){
            html += `
            <tr>
                <td>
                    <span class="student-link" onclick="showHistory('${student.name}')">
                        ${student.name}
                    </span>
                </td>
                <td>
                    ${student.count}回
                </td>
            </tr>
            `;
        });

        document.getElementById("summaryTable").innerHTML = html;
    })
    .catch(error => {
        console.error("エラーが発生しました:", error);
    });
}

function showHistory(studentName){
    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentName))
    .then(response => response.json())
    .then(data => {
        let html = `
        <h2>${studentName} の面接履歴</h2>
        <table>
        <tr>
            <th>回数</th>
            <th>日時</th>
            <th>担当先生</th>
        </tr>
        `;

        if(!data || data.length === 0){
            html += `<tr><td colspan="3">まだ面接練習の記録はありません。</td></tr>`;
        } else {
            for(let i = 0; i < data.length; i++){
                let date = new Date(data[i].date);
                html += `
                <tr>
                    <td>${i+1}回目</td>
                    <td>${date.toLocaleString("ja-JP")}</td>
                    <td>${data[i].teacher}</td>
                </tr>
                `;
            }
        }

        html += "</table>";
        document.getElementById("historyArea").innerHTML = html;
    });
}
</script>

</body>
</html>
