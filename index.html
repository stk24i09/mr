<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📖 MIDNIGHT BIBLIOTHEQUE // 図書貸出管理システム</title>

<style>
/* 共通リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    /* クラシックで可読性の高いフォント構成 */
    font-family: "Georgia", "Times New Roman", "YuMincho", "Hiragino Mincho ProN", serif;
    background-color: #070f0d; /* 深夜の図書館を思わせる超深緑 */
    background-image: 
        radial-gradient(circle at 50% 30%, rgba(212, 175, 55, 0.05) 0%, transparent 60%);
    color: #f1ebd9; /* 年月を経た羊皮紙のようなオフホワイト */
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 24px;
    letter-spacing: 0.06em;
}

/* ヘッダー：書庫の重厚な看板プレート風 */
.lib-header {
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding: 0 10px;
    border-bottom: 2px double #d4af37; /* 真鍮（ゴールド）のダブルライン */
    flex-shrink: 0;
}

.brand-title {
    font-size: 18px;
    font-weight: bold;
    color: #d4af37; /* 琥珀ゴールド */
    display: flex;
    align-items: center;
    gap: 12px;
    text-transform: uppercase;
}

.brand-icon {
    font-size: 20px;
}

.lib-status {
    font-size: 11px;
    font-family: sans-serif;
    border: 1px solid rgba(212, 175, 55, 0.4);
    padding: 3px 10px;
    color: #d4af37;
    text-transform: uppercase;
    letter-spacing: 0.15em;
}

/* 2カラムレイアウト */
.lib-workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 24px;
    width: 100%;
}

/* 飾り縁付きの重厚な書架パネル */
.lib-panel {
    flex: 1;
    background: rgba(15, 26, 23, 0.85); /* ダークオーク＆グリーン */
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(212, 175, 55, 0.2);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(0, 0, 0, 0.5);
}

.panel-header {
    background-color: rgba(212, 175, 55, 0.03);
    padding: 14px 20px;
    border-bottom: 1px solid rgba(212, 175, 55, 0.2);
    font-size: 11px;
    font-weight: bold;
    color: #d4af37;
    letter-spacing: 0.15em;
}

.panel-body {
    overflow-y: auto;
    flex: 1;
    padding: 24px;
}

/* コントロール（アンティークデスク調） */
.control-panel {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
    background-color: rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(212, 175, 55, 0.15);
    padding: 12px;
}

.filter-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-family: sans-serif;
    color: #c9bfab;
}

/* クラシックなセレクト */
select {
    padding: 5px 10px;
    font-size: 11px;
    font-family: sans-serif;
    border: 1px solid rgba(212, 175, 55, 0.3);
    background-color: #0c1613;
    color: #f1ebd9;
    outline: none;
    cursor: pointer;
}

select:hover {
    border-color: #d4af37;
}

/* 書斎ボタン */
.btn-lib {
    padding: 5px 14px;
    font-size: 11px;
    font-family: sans-serif;
    font-weight: bold;
    background-color: transparent;
    color: #d4af37;
    border: 1px solid #d4af37;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
}

.btn-lib:hover {
    background-color: #d4af37;
    color: #070f0d;
}

#updateTime {
    font-size: 10px;
    font-family: sans-serif;
    color: #8a8271;
    margin-top: 4px;
}

/* 図書台帳（テーブル） */
.lib-table {
    width: 100%;
    border-collapse: collapse;
}

.lib-table th {
    padding: 10px 8px;
    font-size: 11px;
    color: #d4af37;
    text-transform: uppercase;
    text-align: left;
    border-bottom: 1px solid #d4af37;
}

.lib-table td {
    padding: 14px 8px;
    font-size: 13px;
    border-bottom: 1px solid rgba(212, 175, 55, 0.1);
}

/* 本の著者やタイトルを選択するようなボタン（生徒名） */
.student-btn {
    font-size: 14px;
    font-family: "Georgia", serif;
    font-weight: bold;
    color: #f1ebd9;
    background: none;
    border: none;
    cursor: pointer;
    text-align: left;
    transition: color 0.2s, padding-left 0.2s;
}

.student-btn::before {
    content: "📖 ";
    color: rgba(212, 175, 55, 0.5);
}

.student-btn:hover {
    color: #d4af37;
    padding-left: 4px;
}

/* 選択行：羊皮紙のインクが滲むような深い琥珀カラー */
.row-selected td {
    background-color: rgba(212, 175, 55, 0.04) !important;
    border-bottom-color: #d4af37;
}

.row-selected .student-btn {
    color: #d4af37;
}

.row-selected .student-btn::before {
    content: "🔖 ";
    color: #d4af37;
}

/* 閲覧回数バッジ */
.book-count {
    font-family: sans-serif;
    border: 1px solid rgba(212, 175, 55, 0.3);
    padding: 2px 8px;
    font-size: 10px;
    color: #d4af37;
}

/* 右側：アンティークな貸出カード風 */
.card-title {
    font-size: 15px;
    font-weight: bold;
    color: #d4af37;
    margin-bottom: 20px;
    border-bottom: 2px double rgba(212, 175, 55, 0.4);
    padding-bottom: 8px;
}

.index-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

/* アンティークの蔵書インデックス・貸出カード */
.lib-card {
    background-color: #1a1510; /* 革張りの背表紙のようなブラウン */
    border: 1px solid rgba(212, 175, 55, 0.25);
    padding: 16px;
    position: relative;
    box-shadow: 4px 6px 15px rgba(0,0,0,0.4);
}

.lib-card:hover {
    border-color: #d4af37;
}

.lib-card-corner {
    position: absolute;
    top: 0; right: 0;
    width: 24px; height: 24px;
    background: linear-gradient(225deg, #d4af37 10%, transparent 11%);
}

.card-index {
    font-size: 9px;
    font-family: sans-serif;
    color: #8a8271;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
}

.card-main {
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 8px;
}

.card-main span {
    color: #d4af37;
    font-weight: bold;
}

.card-date {
    font-size: 11px;
    font-family: sans-serif;
    color: #8a8271;
}

/* 未選択：沈黙の図書室 */
.reading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #8a8271;
    text-align: center;
}

.reading-icon {
    font-size: 32px;
    margin-bottom: 16px;
    animation: book-sway 3s infinite ease-in-out;
}

@keyframes book-sway {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50% { transform: translateY(-4px) rotate(4deg); }
}

.reading-text {
    font-size: 11px;
    font-family: "YuMincho", "Hiragino Mincho ProN", serif;
    line-height: 2;
}
</style>

</head>

<body>

<!-- ヘッダー -->
<div class="lib-header">
    <div class="brand-title">
        <span class="brand-icon">⚜️</span>
        <span>MIDNIGHT BIBLIOTHEQUE // COGNITIVE RECORD</span>
    </div>
    <div class="lib-status">ARCHIVE_ROOM_02</div>
</div>

<!-- メインエリア -->
<div class="lib-workspace">

    <!-- 左パネル：蔵書棚（生徒一覧） -->
    <div class="lib-panel">
        <div class="panel-header">
            <span>📚 CATALOGUE INDEX (蔵書索引)</span>
        </div>
        <div class="panel-body">
            <div class="control-panel">
                <div class="filter-group">
                    <span>配置順:</span>
                    <select id="sortSelect" onchange="loadSummary()">
                        <option value="count">貸出・記録回数の多い順</option>
                        <option value="id">資料 ID 順</option>
                    </select>
                </div>
                <div>
                    <button class="btn-lib" onclick="refreshData()">目録を更新</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <table class="lib-table" id="summaryTable">
                <thead>
                    <tr>
                        <th>資料識別 ID</th>
                        <th style="text-align: right; width: 110px;">記録数</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JSで展開 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 右パネル：貸出カード（指導履歴） -->
    <div class="lib-panel">
        <div class="panel-header">
            <span>🔖 CARD INDEX (貸出履歴カード)</span>
        </div>
        <div id="historyArea" class="panel-body">
            <!-- 未選択画面 -->
            <div class="reading-state">
                <div class="reading-icon">🕯️</div>
                <p class="reading-text">
                    静粛にお願いいたします。<br>
                    左の資料を選択して、貸出記録（指導履歴）をお取り寄せください。
                </p>
            </div>
        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = "LAST_ALIGN: " + now.toLocaleTimeString("ja-JP");
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";

        let students = [];
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="student-btn" onclick="showHistory('${student.id}')">
                        ${student.id}
                    </button>
                </td>
                <td style="text-align: right;">
                    <span class="book-count">${student.count} VOL</span>
                </td>
            </tr>
            `;
        });

        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // アクティブ行の切り替え
    document.querySelectorAll('.lib-table tbody tr').forEach(tr => tr.classList.remove('row-selected'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('row-selected');
    }

    // 重厚なロード表示
    document.getElementById("historyArea").innerHTML = `
        <div class="reading-state">
            <div class="reading-icon">📜</div>
            <p class="reading-text">地下書庫より、${studentId} の貸出票を取得しています...</p>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <div class="card-title">REGISTRY // ${studentId} の読書記録</div>
        <div class="index-list">
        `;

        for(let i = 0; i < data.length; i++){
            let date = new Date(data[i].date);
            html += `
            <div class="lib-card">
                <div class="lib-card-corner"></div>
                <div class="card-index">INDEX-LOG #0${i+1}</div>
                <div class="card-main">
                    担当司書：<span>${data[i].teacher}</span> 先生<br>
                    指導、対話、およびその観察。
                </div>
                <div class="card-date">閲覧記録日時：${date.toLocaleString("ja-JP")}</div>
            </div>
            `;
        }

        html += "</div>";
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="reading-state" style="color: #ff8888;">
                <div class="reading-icon">⚠️</div>
                <p class="reading-text">書庫へのアクセスに失敗しました。更新ボタンをお試しください。</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
