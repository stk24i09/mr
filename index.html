<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 BOTANICAL OASIS // ハーブ温室管理ログ</title>

<style>
/* 共通リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: "Avenir Next", "Helvetica Neue", Arial, "Hiragino Sans", "Segoe UI", sans-serif;
    /* 朝露と木漏れ日を表現した爽やかなグラデーション */
    background: linear-gradient(135deg, #eef4f1 0%, #f3f6f0 50%, #faf8f0 100%);
    color: #2c3e35; /* 深いフォレストグリーン */
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 24px;
    letter-spacing: 0.04em;
}

/* ヘッダー：お洒落なハーブガーデンの看板風 */
.garden-header {
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding: 0 10px;
    border-bottom: 2px solid #8fa89b;
    flex-shrink: 0;
}

.brand-title {
    font-size: 18px;
    font-weight: 700;
    color: #436a56;
    display: flex;
    align-items: center;
    gap: 10px;
    text-transform: uppercase;
}

.brand-icon {
    font-size: 22px;
    animation: leaf-breeze 5s infinite ease-in-out;
}

@keyframes leaf-breeze {
    0%, 100% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(8deg) scale(1.05); }
}

.garden-status {
    font-size: 10px;
    font-weight: bold;
    background-color: rgba(67, 106, 86, 0.08);
    color: #436a56;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.1em;
}

/* 2カラムレイアウト */
.garden-workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 24px;
    width: 100%;
}

/* 朝霧の擦りガラスをイメージした半透明パネル */
.garden-panel {
    flex: 1;
    background: rgba(255, 255, 255, 0.45);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(143, 168, 155, 0.3);
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
    box-shadow: 0 10px 30px rgba(44, 62, 53, 0.05);
}

.panel-header {
    background-color: rgba(255, 255, 255, 0.3);
    padding: 16px 24px;
    border-bottom: 1px solid rgba(143, 168, 155, 0.2);
    font-size: 11px;
    font-weight: bold;
    color: #5c7e6c;
    letter-spacing: 0.12em;
}

.panel-body {
    overflow-y: auto;
    flex: 1;
    padding: 24px;
}

/* コントロール（テラコッタの鉢植えツール調） */
.control-panel {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
    background-color: rgba(255, 255, 255, 0.5);
    border: 1px solid rgba(143, 168, 155, 0.2);
    border-radius: 14px;
    padding: 12px 16px;
}

.filter-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: #5c7e6c;
}

/* オーガニックなセレクトボックス */
select {
    padding: 6px 12px;
    font-size: 11px;
    font-family: inherit;
    border: 1px solid rgba(143, 168, 155, 0.4);
    border-radius: 8px;
    background-color: #ffffff;
    color: #2c3e35;
    outline: none;
    cursor: pointer;
    transition: all 0.2s;
}

select:hover {
    border-color: #436a56;
}

/* ハーブガーデンボタン */
.btn-herb {
    padding: 6px 16px;
    font-size: 11px;
    font-family: inherit;
    font-weight: bold;
    background-color: #436a56;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(67, 106, 86, 0.15);
    transition: all 0.2s;
}

.btn-herb:hover {
    background-color: #325141;
    transform: translateY(-1px);
    box-shadow: 0 6px 15px rgba(67, 106, 86, 0.25);
}

#updateTime {
    font-size: 10px;
    color: #7a9485;
    margin-top: 4px;
}

/* 台帳（テーブル） */
.garden-table {
    width: 100%;
    border-collapse: collapse;
}

.garden-table th {
    padding: 12px 8px;
    font-size: 11px;
    color: #5c7e6c;
    text-transform: uppercase;
    text-align: left;
    border-bottom: 1.5px solid #8fa89b;
}

.garden-table td {
    padding: 16px 8px;
    font-size: 13.5px;
    border-bottom: 1px solid rgba(143, 168, 155, 0.15);
}

/* 苗木ラベル（生徒名ボタン） */
.student-btn {
    font-size: 14px;
    font-family: inherit;
    font-weight: 700;
    color: #2c3e35;
    background: none;
    border: none;
    cursor: pointer;
    text-align: left;
    transition: color 0.2s, transform 0.2s;
}

.student-btn::before {
    content: "🌱 ";
}

.student-btn:hover {
    color: #436a56;
    transform: translateX(3px);
}

/* 選択行：やわらかなグリーンと日の光のブレンド */
.row-selected td {
    background-color: rgba(143, 168, 155, 0.08) !important;
    border-bottom-color: #8fa89b;
}

.row-selected .student-btn {
    color: #436a56;
}

/* 育成回数バッジ */
.sprout-badge {
    background-color: rgba(67, 106, 86, 0.08);
    color: #436a56;
    border: 1px solid rgba(67, 106, 86, 0.2);
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: bold;
}

/* 右側：ハーブのシードペーパー・ネームタグ風 */
.tag-title {
    font-size: 14px;
    font-weight: bold;
    color: #436a56;
    margin-bottom: 20px;
    border-bottom: 1px solid rgba(143, 168, 155, 0.3);
    padding-bottom: 8px;
}

.tag-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

/* ウッディでクラフト紙のようなオーガニックカード */
.tag-card {
    background-color: #f7f5ed; /* 無漂白のクラフトペーパー風 */
    border: 1px dashed rgba(67, 106, 86, 0.3);
    border-radius: 12px;
    padding: 16px;
    position: relative;
    box-shadow: 0 4px 12px rgba(44, 62, 53, 0.03);
    overflow: hidden;
}

.tag-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    background-color: #8fa89b; /* 優しいグリーンライン */
}

.tag-card:hover {
    border-style: solid;
    border-color: #436a56;
}

.tag-num {
    font-size: 9px;
    font-weight: bold;
    color: #7a9485;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
}

.tag-teacher {
    font-size: 13.5px;
    font-weight: bold;
    color: #2c3e35;
    margin-bottom: 6px;
}

.tag-date {
    font-size: 11px;
    color: #7a9485;
}

/* 未選択：ジョウロと双葉 */
.oasis-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #7a9485;
    text-align: center;
}

.oasis-icon {
    font-size: 36px;
    margin-bottom: 16px;
    animation: watering 3s infinite ease-in-out;
    transform-origin: bottom right;
}

@keyframes watering {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(-15deg); }
}

.oasis-text {
    font-size: 11.5px;
    line-height: 1.8;
}
</style>

</head>

<body>

<!-- ヘッダー -->
<div class="garden-header">
    <div class="brand-title">
        <span class="brand-icon">🌿</span>
        <span>BOTANICAL OASIS // RECORD LAB</span>
    </div>
    <div class="garden-status">GREENHOUSE_01</div>
</div>

<!-- メインエリア -->
<div class="garden-workspace">

    <!-- 左パネル：苗木（生徒）一覧 -->
    <div class="garden-panel">
        <div class="panel-header">
            <span>🍃 NURSERY INDEX (育成台帳)</span>
        </div>
        <div class="panel-body">
            <div class="control-panel">
                <div class="filter-group">
                    <span>ソート:</span>
                    <select id="sortSelect" onchange="loadSummary()">
                        <option value="count">育成（特訓）回数順</option>
                        <option value="id">品種（生徒）ID 順</option>
                    </select>
                </div>
                <div>
                    <button class="btn-herb" onclick="refreshData()">新芽を同期</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <table class="garden-table" id="summaryTable">
                <thead>
                    <tr>
                        <th>生徒識別 ID</th>
                        <th style="text-align: right; width: 110px;">指導回数</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JSで展開 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 右パネル：シードタグ（指導履歴） -->
    <div class="garden-panel">
        <div class="panel-header">
            <span>🏷️ SEED TAGS (お世話の履歴)</span>
        </div>
        <div id="historyArea" class="panel-body">
            <!-- 未選択画面 -->
            <div class="oasis-state">
                <div class="oasis-icon">🚿</div>
                <p class="oasis-text">
                    温室に優しい風が吹き込んでいます。<br>
                    左の生徒を選択して、これまでの育成ログ（指導履歴）を開いてください。
                </p>
            </div>
        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = "最終お世話: " + now.toLocaleTimeString("ja-JP");
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";

        let students = [];
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="student-btn" onclick="showHistory('${student.id}')">
                        ${student.id}
                    </button>
                </td>
                <td style="text-align: right;">
                    <span class="sprout-badge">${student.count} 芽</span>
                </td>
            </tr>
            `;
        });

        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // アクティブ行の切り替え
    document.querySelectorAll('.garden-table tbody tr').forEach(tr => tr.classList.remove('row-selected'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('row-selected');
    }

    // 爽やかなロード表示
    document.getElementById("historyArea").innerHTML = `
        <div class="oasis-state">
            <div class="oasis-icon">🌱</div>
            <p class="oasis-text">${studentId} の育成ノートを紐解いています...</p>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <div class="tag-title">🌿 ${studentId} の成長記録</div>
        <div class="tag-list">
        `;

        for(let i = 0; i < data.length; i++){
            let date = new Date(data[i].date);
            html += `
            <div class="tag-card">
                <div class="tag-num">SESSION_0${i+1}</div>
                <div class="tag-teacher">担当ガーデナー：${data[i].teacher} 先生</div>
                <div class="tag-date">観察日時：${date.toLocaleString("ja-JP")}</div>
            </div>
            `;
        }

        html += "</div>";
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="oasis-state" style="color: #c05c5c;">
                <div class="oasis-icon">⚠️</div>
                <p class="oasis-text">通信の水分が不足しているようです。新芽を同期（更新）してください。</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
