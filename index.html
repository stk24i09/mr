<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glassmorphism Terminal</title>

<style>
/* 共通リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    /* 宇宙の星雲をイメージした美麗グラデーション背景 */
    background: radial-gradient(circle at 20% 30%, #251845 0%, #0a0a16 70%), 
                radial-gradient(circle at 80% 80%, #0d3831 0%, transparent 50%);
    background-attachment: fixed;
    color: #f3f4f6;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 32px;
    -webkit-font-smoothing: antialiased;
}

/* ヘッダー */
.glass-header {
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    margin-bottom: 24px;
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    flex-shrink: 0;
}

.brand-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #ffffff;
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
}

.app-status {
    font-size: 11px;
    font-weight: 500;
    color: #9ca3af;
    letter-spacing: 0.5px;
}

/* 2カラムレイアウト */
.glass-workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 24px;
    width: 100%;
}

/* 磨りガラス風パネル */
.glass-panel {
    flex: 1;
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
}

.panel-header {
    padding: 24px 24px 12px 24px;
    font-size: 12px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.6);
    letter-spacing: 1.5px;
    text-transform: uppercase;
}

.panel-body {
    overflow-y: auto;
    flex: 1;
    padding: 0 24px 24px 24px;
}

/* 操作エリア */
.control-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
}

/* シースルーのセレクトボックス */
select {
    background: rgba(255, 255, 255, 0.06);
    color: #ffffff;
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 6px 16px;
    border-radius: 8px;
    font-size: 12px;
    font-family: inherit;
    outline: none;
    cursor: pointer;
    transition: all 0.2s;
}

select:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.2);
}

/* 光彩を放つサイバー感ボタン */
.btn-glass {
    background: linear-gradient(135deg, rgba(168, 85, 247, 0.4), rgba(34, 197, 94, 0.4));
    color: #ffffff;
    border: 1px solid rgba(255, 255, 255, 0.15);
    padding: 6px 18px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(168, 85, 247, 0.2);
}

.btn-glass:hover {
    background: linear-gradient(135deg, rgba(168, 85, 247, 0.6), rgba(34, 197, 94, 0.6));
    box-shadow: 0 4px 18px rgba(168, 85, 247, 0.4);
    transform: translateY(-1px);
}

#updateTime {
    font-size: 10px;
    color: rgba(255, 255, 255, 0.4);
    margin-top: 6px;
    text-align: right;
}

/* テーブルスタイル */
.glass-table {
    width: 100%;
    border-collapse: collapse;
}

.glass-table th {
    padding: 10px 12px;
    font-size: 11px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.5);
    text-align: left;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}

.glass-table td {
    padding: 16px 12px;
    font-size: 14px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
}

/* リスト項目 */
.student-link {
    background: none;
    border: none;
    color: rgba(255, 255, 255, 0.85);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    width: 100%;
    transition: all 0.15s;
}

.student-link:hover {
    color: #ffffff;
    padding-left: 4px; /* わずかにスライドして触覚を表現 */
}

/* アクティブ行 */
.row-active td {
    background: rgba(255, 255, 255, 0.06);
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.row-active .student-link {
    color: #a855f7; /* パープル */
    font-weight: bold;
    text-shadow: 0 0 8px rgba(168, 85, 247, 0.4);
}

/* カプセルバッジ */
.glass-badge {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #ffffff;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
}

.row-active .glass-badge {
    background: rgba(168, 85, 247, 0.2);
    border-color: rgba(168, 85, 247, 0.4);
    color: #e9d5ff;
}

/* 右側：履歴セクション */
.history-title {
    font-size: 15px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 20px;
}

.card-container {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* 半透明の詳細カード */
.history-card {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.2s;
}

.history-card:hover {
    background: rgba(255, 255, 255, 0.05);
    border-color: rgba(255, 255, 255, 0.1);
    transform: translateY(-1px);
}

.history-main {
    font-size: 13px;
    color: #ffffff;
}

.history-main strong {
    color: #22c55e; /* エメラルドグリーン */
}

.history-meta {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.45);
}

/* 空表示 */
.empty-view {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: rgba(255, 255, 255, 0.4);
    text-align: center;
}

.empty-text {
    font-size: 13px;
    line-height: 1.6;
}

/* スペーシーなスピンローダー */
.space-loader {
    width: 24px;
    height: 24px;
    border: 2px solid rgba(255, 255, 255, 0.1);
    border-top-color: #a855f7;
    border-bottom-color: #22c55e;
    border-radius: 50%;
    animation: orbit 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    margin-bottom: 16px;
}

@keyframes orbit {
    to { transform: rotate(360deg); }
}

/* 極細スクロールバー */
::-webkit-scrollbar {
    width: 4px;
}
::-webkit-scrollbar-track {
    background: transparent;
}
::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 2px;
}
::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.2);
}
</style>

</head>

<body>

<!-- ガラスヘッダー -->
<div class="glass-header">
    <div class="brand-title">NEBULA CONTROL</div>
    <div class="app-status">SYSTEM OK // ENCRYPTED_CONN</div>
</div>

<!-- ワークスペース -->
<div class="glass-workspace">

    <!-- 左パネル：ディレクトリ -->
    <div class="glass-panel">
        <div class="panel-header">Database Directory</div>
        <div class="panel-body">
            
            <div class="control-bar">
                <div>
                    <select id="sortSelect" onchange="loadSummary()">
                        <option value="count">Sort: Max Entries</option>
                        <option value="id">Sort: Target ID</option>
                    </select>
                </div>
                <div>
                    <button class="btn-glass" onclick="refreshData()">Sync Database</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <table class="glass-table" id="summaryTable">
                <thead>
                    <tr>
                        <th style="padding-left: 12px;">Target Identifier</th>
                        <th style="text-align: right; padding-right: 12px;">Total</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JS展開 -->
                </tbody>
            </table>

        </div>
    </div>

    <!-- 右パネル：ログ詳細 -->
    <div class="glass-panel">
        <div class="panel-header">Data Stream Output</div>
        <div id="historyArea" class="panel-body">
            
            <!-- デフォルト -->
            <div class="empty-view">
                <p class="empty-text">
                    Await Selection...<br>
                    Choose an active telemetry target to pipe logs.
                </p>
            </div>

        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = "SYNC_TIME: " + now.toLocaleTimeString("en-US", {hour12: false});
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";
        let students = [];
        
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="student-link" onclick="showHistory('${student.id}')">
                        ${student.id}
                    </button>
                </td>
                <td style="text-align: right; padding-right: 12px;">
                    <span class="glass-badge">${student.count}</span>
                </td>
            </tr>
            `;
        });

        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // リストの行ハイライト
    document.querySelectorAll('.glass-table tbody tr').forEach(tr => tr.classList.remove('row-active'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('row-active');
    }

    // 読み込み中表示
    document.getElementById("historyArea").innerHTML = `
        <div class="empty-view">
            <div class="space-loader"></div>
            <p class="empty-text">Piping telemetric stream for ${studentId}...</p>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <div class="history-title">Streaming Log: ${studentId}</div>
        <div class="card-container">
        `;

        for(let i = 0; i < data.length; i++){
            let d = new Date(data[i].date);
            let dateStr = d.toLocaleDateString("en-US", { month: 'short', day: 'numeric' }) + " " + d.toLocaleTimeString("en-US", { hour: '2-digit', minute: '2-digit', hour12: false });

            html += `
            <div class="history-card">
                <div class="history-main">
                    Authorized by <strong>${data[i].teacher}</strong>
                </div>
                <div class="history-meta">
                    ${dateStr}
                </div>
            </div>
            `;
        }

        html += "</div>";
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="empty-view" style="color: #ef4444;">
                <p class="empty-text">Stream Interrupted. Verify terminal connection.</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
