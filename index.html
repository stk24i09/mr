<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workspace</title>

<style>
/* 共通リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: #ffffff;
    color: #111111;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 40px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

/* シンプルなヘッダー（余白でゾーニング） */
.header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 48px;
    flex-shrink: 0;
}

.brand-title {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.02em;
}

.app-status {
    font-size: 12px;
    color: #888888;
    font-weight: 400;
}

/* 2カラムレイアウト */
.workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 64px; /* 広めの余白で情報の混ざりを防ぐ */
    width: 100%;
}

/* パネル */
.panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
}

.panel-header {
    font-size: 11px;
    font-weight: 600;
    color: #888888;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 24px;
}

.panel-body {
    overflow-y: auto;
    flex: 1;
}

/* コントロール（余白と文字だけで構成） */
.control-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
}

.filter-group {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: #666666;
}

/* プレーンなドロップダウン */
select {
    padding: 4px 0;
    font-size: 13px;
    font-family: inherit;
    border: none;
    border-bottom: 1px solid #e5e5e5;
    background-color: transparent;
    color: #111111;
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
}

select:hover {
    border-color: #111111;
}

/* 境界線のないテキストボタン */
.btn-plain {
    background: none;
    border: none;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: #111111;
    cursor: pointer;
    padding: 4px 0;
    border-bottom: 1px solid #111111;
    transition: opacity 0.15s;
}

.btn-plain:hover {
    opacity: 0.6;
}

#updateTime {
    font-size: 10px;
    color: #aaaaaa;
    margin-top: 6px;
    text-align: right;
}

/* 線を極限まで省いたリスト（テーブル） */
.list-table {
    width: 100%;
    border-collapse: collapse;
}

.list-table th {
    padding: 8px 0;
    font-size: 11px;
    font-weight: 500;
    color: #888888;
    text-align: left;
    border-bottom: 1px solid #f0f0f0;
}

.list-table td {
    padding: 16px 0;
    font-size: 14px;
    border-bottom: 1px solid #f9f9f9;
}

/* リスト内のテキストリンク */
.item-btn {
    font-size: 14px;
    font-family: inherit;
    font-weight: 400;
    color: #111111;
    background: none;
    border: none;
    cursor: pointer;
    text-align: left;
    transition: opacity 0.15s;
}

.item-btn:hover {
    opacity: 0.5;
}

/* 選択行：背景は変えず、文字の太さとわずかな左余白だけで表現 */
.row-active .item-btn {
    font-weight: 600;
    padding-left: 8px;
    border-left: 2px solid #111111;
}

/* グレーのシンプルなカウント表示 */
.count-text {
    font-size: 13px;
    color: #888888;
}

/* 右側：記録リスト */
.history-title {
    font-size: 16px;
    font-weight: 600;
    color: #111111;
    margin-bottom: 24px;
    letter-spacing: -0.01em;
}

.history-container {
    display: flex;
    flex-direction: column;
    gap: 24px;
}

/* 枠線のないフラットなカード */
.history-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 16px;
    border-bottom: 1px solid #f0f0f0;
}

.history-main {
    font-size: 14px;
    font-weight: 500;
    color: #111111;
}

.history-meta {
    font-size: 12px;
    color: #888888;
    text-align: right;
}

/* 未選択状態（何もない空間を贅沢に使う） */
.blank-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #888888;
}

.blank-text {
    font-size: 13px;
    font-weight: 400;
    line-height: 1.6;
}

/* スタイリッシュなフェードローダー（CSSのみ） */
.minimal-loader {
    width: 16px;
    height: 16px;
    border: 1px solid #111111;
    border-radius: 50%;
    border-right-color: transparent;
    animation: rotate 0.6s linear infinite;
    margin-bottom: 16px;
}

@keyframes rotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* スクロールバーの非表示（モバイルライクな挙動） */
.panel-body::-webkit-scrollbar {
    display: none;
}
.panel-body {
    -ms-overflow-style: none;
    scrollbar-width: none;
}
</style>

</head>

<body>

<!-- ヘッダー -->
<div class="header">
    <div class="brand-title">Directory</div>
    <div class="app-status">Standard Portal</div>
</div>

<!-- ワークスペース -->
<div class="workspace">

    <!-- 左パネル：リスト一覧 -->
    <div class="panel">
        <div class="panel-header">Students</div>
        <div class="panel-body">
            
            <div class="control-bar">
                <div class="filter-group">
                    <span>Sort by</span>
                    <select id="sortSelect" onchange="loadSummary()">
                        <option value="count">Count</option>
                        <option value="id">ID</option>
                    </select>
                </div>
                <div>
                    <button class="btn-plain" onclick="refreshData()">Sync</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <table class="list-table" id="summaryTable">
                <thead>
                    <tr>
                        <th>Identifier</th>
                        <th style="text-align: right; width: 80px;">Sessions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JS展開 -->
                </tbody>
            </table>

        </div>
    </div>

    <!-- 右パネル：履歴詳細 -->
    <div class="panel">
        <div class="panel-header">Activity</div>
        <div id="historyArea" class="panel-body">
            
            <!-- 初期状態 -->
            <div class="blank-state">
                <p class="blank-text">
                    Select a student ID to view session logs.
                </p>
            </div>

        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = "Updated: " + now.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", second: "2-digit", hour12: false });
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";
        let students = [];
        
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="item-btn" onclick="showHistory('${student.id}')">
                        ${student.id}
                    </button>
                </td>
                <td style="text-align: right;">
                    <span class="count-text">${student.count}</span>
                </td>
            </tr>
            `;
        });

        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // アクティブな行のスタイリング切り替え
    document.querySelectorAll('.list-table tbody tr').forEach(tr => tr.classList.remove('row-active'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('row-active');
    }

    // ロード中表示
    document.getElementById("historyArea").innerHTML = `
        <div class="blank-state" style="flex-direction: column;">
            <div class="minimal-loader"></div>
            <p class="blank-text">Loading ${studentId}...</p>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <div class="history-title">${studentId}</div>
        <div class="history-container">
        `;

        for(let i = 0; i < data.length; i++){
            let d = new Date(data[i].date);
            let dateStr = d.toLocaleDateString("en-US", { year: 'numeric', month: 'short', day: 'numeric' });

            html += `
            <div class="history-row">
                <div class="history-main">
                    Instructor: ${data[i].teacher}
                </div>
                <div class="history-meta">
                    ${dateStr}
                </div>
            </div>
            `;
        }

        html += "</div>";
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="blank-state">
                <p class="blank-text" style="color: #ff0000;">Failed to load data. Please try again.</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
