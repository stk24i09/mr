<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面接練習回数管理システム</title>

<style>
/* 共通リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: "Impact", "Arial Black", "Hiragino Kaku Gothic ProN", "Helvetica Neue", sans-serif;
    background-color: #FFFCEB; /* 明るいレモンクリーム */
    color: #1E1E1E; /* 濃いブラック */
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 20px;
}

/* ヘッダー：大胆な帯デザイン */
.app-header {
    background-color: #A78BFA; /* ポップなパープル */
    border: 3px solid #1E1E1E;
    box-shadow: 5px 5px 0px #1E1E1E;
    height: 70px;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    border-radius: 12px;
    flex-shrink: 0;
}

.brand-title {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
}

.brand-icon {
    font-size: 28px;
    transform: rotate(-10deg); /* 遊び心で少し傾ける */
}

.app-badge {
    background-color: #34D399; /* ビビッドミント */
    color: #1E1E1E;
    font-size: 13px;
    font-weight: 800;
    padding: 6px 16px;
    border: 2px solid #1E1E1E;
    border-radius: 8px;
    box-shadow: 2px 2px 0px #1E1E1E;
}

/* 2カラムレイアウト */
.app-content {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 24px;
    width: 100%;
}

/* 太フチ・ベタ影のカード */
.brutal-card {
    flex: 1;
    background-color: #FFFFFF;
    border: 3px solid #1E1E1E;
    border-radius: 16px;
    box-shadow: 8px 8px 0px #1E1E1E; /* ぼかさない極太影 */
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
    transition: transform 0.1s;
}

.card-header {
    padding: 20px 24px;
    background-color: #F3F4F6;
    border-bottom: 3px solid #1E1E1E;
    flex-shrink: 0;
}

.card-title {
    font-size: 18px;
    font-weight: 900;
    display: flex;
    align-items: center;
    gap: 10px;
}

.card-body {
    overflow-y: auto;
    flex: 1;
    padding: 24px;
}

/* コントロールパネル */
.control-panel {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
}

.filter-group {
    display: flex;
    align-items: center;
    gap: 10px;
}

.filter-label {
    font-size: 13px;
    font-weight: 800;
}

/* 押し心地抜群のボタン＆セレクト */
select {
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 800;
    border: 3px solid #1E1E1E;
    border-radius: 10px;
    background-color: #FFFFFF;
    color: #1E1E1E;
    outline: none;
    cursor: pointer;
    box-shadow: 3px 3px 0px #1E1E1E;
    transition: all 0.1s;
}

select:hover {
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0px #1E1E1E;
}

select:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0px #1E1E1E;
}

.btn-brutal {
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 900;
    background-color: #FF8A5B; /* ポップなオレンジ */
    color: #1E1E1E;
    border: 3px solid #1E1E1E;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 4px 4px 0px #1E1E1E;
    transition: all 0.1s;
    letter-spacing: 0.05em;
}

.btn-brutal:hover {
    transform: translate(-1px, -1px);
    box-shadow: 5px 5px 0px #1E1E1E;
}

.btn-brutal:active {
    transform: translate(3px, 3px);
    box-shadow: 1px 1px 0px #1E1E1E;
}

#updateTime {
    font-size: 12px;
    font-weight: 800;
    color: #6B7280;
    margin-top: 6px;
    text-align: right;
}

/* クッキリした太枠テーブル */
.brutal-table {
    width: 100%;
    border-collapse: collapse;
    border: 3px solid #1E1E1E;
}

.brutal-table th {
    padding: 14px 16px;
    font-size: 13px;
    font-weight: 900;
    background-color: #F3F4F6;
    color: #1E1E1E;
    text-align: left;
    border-bottom: 3px solid #1E1E1E;
    border-right: 3px solid #1E1E1E;
}

.brutal-table th:last-child {
    border-right: none;
}

.brutal-table td {
    padding: 14px 16px;
    font-size: 14px;
    font-weight: 800;
    background-color: #FFFFFF;
    border-bottom: 3px solid #1E1E1E;
    border-right: 3px solid #1E1E1E;
}

.brutal-table td:last-child {
    border-right: none;
}

.brutal-table tr:last-child td {
    border-bottom: none;
}

/* 生徒リンクボタン：太い下線 */
.student-btn {
    font-size: 15px;
    font-weight: 900;
    color: #1E1E1E;
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    text-decoration-thickness: 3px;
    text-underline-offset: 4px;
    transition: color 0.1s;
}

.student-btn:hover {
    color: #8B5CF6; /* パープルにチェンジ */
}

/* 行選択時の「アクティブ・カラー」 */
.row-selected td {
    background-color: #FEF3C7 !important; /* 目立つライトイエロー */
}

/* ポップな丸型カウントバッジ */
.brutal-badge {
    background-color: #34D399;
    color: #1E1E1E;
    border: 2px solid #1E1E1E;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 900;
    box-shadow: 2px 2px 0px #1E1E1E;
    display: inline-block;
}

/* 右側：履歴リスト */
.history-title {
    font-size: 18px;
    font-weight: 900;
    margin-bottom: 20px;
    background-color: #FEE2E2; /* ピンクの蛍光ペン風背景 */
    display: inline-block;
    padding: 4px 12px;
    border: 2px solid #1E1E1E;
    border-radius: 6px;
    box-shadow: 3px 3px 0px #1E1E1E;
}

.history-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.history-item {
    background-color: #FFFFFF;
    border: 3px solid #1E1E1E;
    border-radius: 12px;
    padding: 16px 20px;
    box-shadow: 4px 4px 0px #1E1E1E;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.history-info {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.history-number {
    font-size: 11px;
    font-weight: 900;
    color: #FFFFFF;
    background-color: #1E1E1E;
    padding: 2px 8px;
    border-radius: 4px;
    width: max-content;
}

.history-teacher {
    font-size: 15px;
    font-weight: 900;
}

.history-date {
    font-size: 12px;
    font-weight: 800;
    color: #4B5563;
    background-color: #F3F4F6;
    border: 2px solid #1E1E1E;
    padding: 4px 10px;
    border-radius: 8px;
}

/* 空状態のポップなプレースホルダー */
.brutal-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
}

.brutal-empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
    animation: bounce 1s infinite alternate;
}

@keyframes bounce {
    0% { transform: translateY(0) rotate(-5deg); }
    100% { transform: translateY(-10px) rotate(5deg); }
}

.brutal-empty-text {
    font-size: 14px;
    font-weight: 900;
    background-color: #F3F4F6;
    border: 2px solid #1E1E1E;
    padding: 8px 16px;
    border-radius: 8px;
    box-shadow: 3px 3px 0px #1E1E1E;
}
</style>

</head>

<body>

<!-- ヘッダー -->
<div class="app-header">
    <div class="brand-title">
        <span class="brand-icon">💥</span>
        <span>MEISET-SU STRIKE!</span>
    </div>
    <span class="app-badge">TEACHER CONSOLE</span>
</div>

<!-- メインエリア -->
<div class="app-content">

    <!-- 左パネル -->
    <div class="brutal-card">
        <div class="card-header">
            <div class="card-title">👥 STUDENTS LIST</div>
        </div>
        <div class="card-body">
            <div class="control-panel">
                <div class="filter-group">
                    <span class="filter-label">SORT:</span>
                    <select id="sortSelect" onchange="loadSummary()">
                        <option value="count">面接回数が多い順</option>
                        <option value="id">生徒ID順</option>
                    </select>
                </div>
                <div>
                    <button class="btn-brutal" onclick="refreshData()">RELOAD</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <table class="brutal-table" id="summaryTable">
                <thead>
                    <tr>
                        <th>生徒ID</th>
                        <th style="text-align: right; width: 120px;">練習回数</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JSで展開 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 右パネル -->
    <div class="brutal-card">
        <div class="card-header">
            <div class="card-title">⚡ PRACTICE LOG</div>
        </div>
        <div id="historyArea" class="card-body">
            <!-- 未選択時の表示 -->
            <div class="brutal-empty">
                <div class="brutal-empty-icon">👉</div>
                <p class="brutal-empty-text">生徒IDをクリックして、特訓履歴をロードせよ！</p>
            </div>
        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = now.toLocaleTimeString("ja-JP") + " 同期完了";
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";

        let students = [];
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="student-btn" onclick="showHistory('${student.id}')">
                        ${student.id}
                    </button>
                </td>
                <td style="text-align: right;">
                    <span class="brutal-badge">${student.count} 回目</span>
                </td>
            </tr>
            `;
        });

        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // アクティブ行の切り替え
    document.querySelectorAll('.brutal-table tbody tr').forEach(tr => tr.classList.remove('row-selected'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('row-selected');
    }

    // ロード表示
    document.getElementById("historyArea").innerHTML = `
        <div class="brutal-empty">
            <div class="brutal-empty-icon">🛰️</div>
            <p class="brutal-empty-text">データを引き抜いています...</p>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <h2 class="history-title">
            🔥 ${studentId} の特訓ログ
        </h2>
        <div class="history-list">
        `;

        for(let i = 0; i < data.length; i++){
            let date = new Date(data[i].date);
            html += `
            <div class="history-item">
                <div class="history-info">
                    <span class="history-number">ROUND 0${i+1}</span>
                    <span class="history-teacher">試験官: ${data[i].teacher} 先生</span>
                </div>
                <div class="history-date">
                    ${date.toLocaleString("ja-JP")}
                </div>
            </div>
            `;
        }

        html += "</div>";
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="brutal-empty" style="color: #EF4444;">
                <div class="brutal-empty-icon">☠️</div>
                <p class="brutal-empty-text">通信エラー！再度リロードボタンを押してください。</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
