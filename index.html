<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lounge / Interview Record</title>

<style>
/* 共通リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    /* シックで気品のあるフォント選定 */
    font-family: "Times New Roman", Georgia, "Yu Mincho", "游明朝", serif;
    background-color: #0a0705; /* 深夜のバーの暗闇 */
    color: #f5f5f4; /* わずかに温かみのある白 */
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 28px;
    letter-spacing: 0.08em;
}

/* ヘッダー：ヴィンテージネオン看板風 */
.bar-header {
    border-bottom: 1px solid rgba(217, 119, 6, 0.3);
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-shrink: 0;
}

.brand-title {
    font-size: 22px;
    font-weight: bold;
    color: #f5f5f4;
    text-shadow: 0 0 8px rgba(217, 119, 6, 0.6), 0 0 20px rgba(217, 119, 6, 0.4); /* 琥珀色のネオングロウ */
    font-style: italic;
}

.brand-title span {
    color: #d97706; /* アンバーゴールド */
}

.bar-status {
    font-size: 11px;
    color: #a8a29e;
    letter-spacing: 0.2em;
    text-transform: uppercase;
}

/* 2カラムレイアウト */
.bar-workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 32px;
    width: 100%;
}

/* ラウンジシートのようなシックなカード */
.lounge-card {
    flex: 1;
    background-color: rgba(18, 13, 10, 0.8); /* わずかに透ける漆黒 */
    border: 1px solid rgba(217, 119, 6, 0.15);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    transition: border-color 0.4s ease;
}

.lounge-card:hover {
    border-color: rgba(217, 119, 6, 0.4);
}

.card-header {
    padding: 24px;
    border-bottom: 1px solid rgba(217, 119, 6, 0.1);
    flex-shrink: 0;
}

.card-title {
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 0.2em;
    color: #d97706;
    text-transform: uppercase;
}

.card-body {
    overflow-y: auto;
    flex: 1;
    padding: 24px;
}

/* コントロールパネル */
.control-panel {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
}

.filter-group {
    display: flex;
    align-items: center;
    gap: 12px;
}

.filter-label {
    font-size: 11px;
    color: #a8a29e;
}

/* 落ち着いた琥珀のセレクト＆ボタン */
select {
    padding: 8px 14px;
    font-size: 12px;
    font-family: inherit;
    border: 1px solid rgba(217, 119, 6, 0.2);
    border-radius: 6px;
    background-color: #120d0a;
    color: #f5f5f4;
    outline: none;
    cursor: pointer;
    transition: all 0.3s;
}

select:hover {
    border-color: #d97706;
}

.btn-lounge {
    padding: 8px 18px;
    font-size: 12px;
    font-family: inherit;
    font-weight: bold;
    background-color: transparent;
    color: #d97706;
    border: 1px solid #d97706;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn-lounge:hover {
    background-color: #d97706;
    color: #0a0705;
    box-shadow: 0 0 12px rgba(217, 119, 6, 0.5);
}

#updateTime {
    font-size: 11px;
    color: #78716c;
    margin-top: 6px;
    text-align: right;
    font-style: italic;
}

/* メニュー表風テーブル */
.bar-table {
    width: 100%;
    border-collapse: collapse;
}

.bar-table th {
    padding: 12px 8px;
    font-size: 11px;
    color: #78716c;
    text-transform: uppercase;
    text-align: left;
    border-bottom: 1px solid rgba(217, 119, 6, 0.2);
}

.bar-table td {
    padding: 16px 8px;
    font-size: 14px;
    border-bottom: 1px solid rgba(217, 119, 6, 0.05);
}

/* キャスト（生徒名）ボタン：静かな美しさ */
.student-btn {
    font-size: 14px;
    font-family: inherit;
    color: #f5f5f4;
    background: none;
    border: none;
    cursor: pointer;
    transition: color 0.3s, transform 0.3s;
    text-align: left;
}

.student-btn:hover {
    color: #d97706;
    transform: translateX(4px);
}

/* 選択されたシート：優しく光るアンバーのハイライト */
.row-selected td {
    background-color: rgba(217, 119, 6, 0.08) !important;
    border-bottom-color: rgba(217, 119, 6, 0.4);
}

.row-selected .student-btn {
    color: #d97706;
    font-weight: bold;
}

/* 琥珀色のショット数バッジ */
.count-badge {
    font-size: 12px;
    font-style: italic;
    color: #d97706;
    background-color: rgba(217, 119, 6, 0.1);
    padding: 2px 10px;
    border-radius: 4px;
    border: 1px solid rgba(217, 119, 6, 0.2);
}

/* 右側：ボトルキープ（ログ）表示 */
.log-header {
    font-size: 16px;
    font-weight: bold;
    color: #f5f5f4;
    margin-bottom: 24px;
    border-bottom: 1px solid rgba(217, 119, 6, 0.2);
    padding-bottom: 12px;
    font-style: italic;
}

.log-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.log-card {
    background-color: rgba(217, 119, 6, 0.02);
    border: 1px solid rgba(217, 119, 6, 0.1);
    border-radius: 8px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: all 0.3s;
}

.log-card:hover {
    background-color: rgba(217, 119, 6, 0.04);
    border-color: rgba(217, 119, 6, 0.25);
}

.log-num {
    font-size: 10px;
    color: #78716c;
    letter-spacing: 0.15em;
    text-transform: uppercase;
}

.log-teacher {
    font-size: 15px;
    color: #f5f5f4;
}

.log-date {
    font-size: 11px;
    color: #a8a29e;
}

/* 空白状態：キャンドルが静かに佇むプレースホルダー */
.empty-lounge {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #78716c;
    text-align: center;
}

.empty-icon {
    font-size: 24px;
    color: #d97706;
    margin-bottom: 16px;
    opacity: 0.6;
    animation: flicker 2s infinite ease-in-out; /* キャンドルのような揺らぎ */
}

@keyframes flicker {
    0%, 100% { opacity: 0.4; transform: scale(0.98); }
    50% { opacity: 0.8; transform: scale(1.02); }
}

.empty-text {
    font-size: 12px;
    line-height: 1.8;
}
</style>

</head>

<body>

<!-- ヘッダー -->
<div class="bar-header">
    <div class="brand-title">THE <span>LOUNGE</span></div>
    <div class="bar-status">Midnight Edition // 2:00 AM</div>
</div>

<!-- メインエリア -->
<div class="bar-workspace">

    <!-- 左パネル：ボトル棚 -->
    <div class="lounge-card">
        <div class="card-header">
            <div class="card-title">Selected Guests</div>
        </div>
        <div class="card-body">
            <div class="control-panel">
                <div class="filter-group">
                    <span class="filter-label">Sort by</span>
                    <select id="sortSelect" onchange="loadSummary()">
                        <option value="count">Active Order</option>
                        <option value="id">Alphabetical</option>
                    </select>
                </div>
                <div>
                    <button class="btn-lounge" onclick="refreshData()">Refill</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <table class="bar-table" id="summaryTable">
                <thead>
                    <tr>
                        <th>Guest Name</th>
                        <th style="text-align: right; width: 120px;">Sessions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JSで展開 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 右パネル：ボトルキープ履歴 -->
    <div class="lounge-card">
        <div class="card-header">
            <div class="card-title">Chronicle Book</div>
        </div>
        <div id="historyArea" class="card-body">
            <!-- 未選択時の表示 -->
            <div class="empty-lounge">
                <div class="empty-icon">🕯️</div>
                <p class="empty-text">
                    静寂の中に、記録が眠っています。<br>
                    ゲストを選択すると、琥珀色の履歴が蘇ります。
                </p>
            </div>
        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = "Updated " + now.toLocaleTimeString("ja-JP");
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";

        let students = [];
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="student-btn" onclick="showHistory('${student.id}')">
                        ${student.id}
                    </button>
                </td>
                <td style="text-align: right;">
                    <span class="count-badge">${student.count} shots</span>
                </td>
            </tr>
            `;
        });

        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // アクティブ行の切り替え
    document.querySelectorAll('.bar-table tbody tr').forEach(tr => tr.classList.remove('row-selected'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('row-selected');
    }

    // ロード表示
    document.getElementById("historyArea").innerHTML = `
        <div class="empty-lounge">
            <div class="empty-icon">🥃</div>
            <p class="empty-text">グラスを傾け、サーバーから抽出中...</p>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <div class="log-header">
            <span>The Footsteps of ${studentId}</span>
        </div>
        <div class="log-list">
        `;

        for(let i = 0; i < data.length; i++){
            let date = new Date(data[i].date);
            html += `
            <div class="log-card">
                <div class="log-num">Session // 0${i+1}</div>
                <div class="log-teacher">Coached by ${data[i].teacher}</div>
                <div class="log-date">Time / ${date.toLocaleString("ja-JP")}</div>
            </div>
            `;
        }

        html += "</div>";
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="empty-lounge" style="color: #ef4444;">
                <div class="empty-icon">💔</div>
                <p class="empty-text">ボトルの取得に失敗しました。もう一度、注文（更新）してください。</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
