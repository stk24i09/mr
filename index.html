<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面接とっくんクラブ</title>

<style>
/* 共通リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
    background-color: #FFDEE9; /* あまーいストロベリーピンク */
    background-image: radial-gradient(#ffb6c1 20%, transparent 20%), radial-gradient(#ffb6c1 20%, transparent 20%);
    background-size: 20px 20px;
    background-position: 0 0, 10px 10px; /* ポップなドット背景 */
    color: #2D2D2D;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 24px;
}

/* ヘッダー：おもちゃのパッケージ風ステッカー */
.app-header {
    background-color: #3B82F6; /* スカイブルー */
    border: 4px solid #2D2D2D;
    box-shadow: 6px 6px 0px #2D2D2D;
    height: 64px;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    border-radius: 16px;
    flex-shrink: 0;
    transform: rotate(-1deg); /* ちょっぴり傾けてルーズに */
}

.brand-title {
    font-size: 22px;
    font-weight: 900;
    color: #FFFFFF;
    text-shadow: 2px 2px 0px #2D2D2D;
    display: flex;
    align-items: center;
    gap: 10px;
}

.brand-icon {
    font-size: 28px;
    animation: wiggle 2s infinite ease-in-out;
}

@keyframes wiggle {
    0%, 100% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
}

.app-badge {
    background-color: #FBBF24; /* レモンイエロー */
    color: #2D2D2D;
    font-size: 13px;
    font-weight: 900;
    padding: 6px 14px;
    border: 3px solid #2D2D2D;
    border-radius: 12px;
    box-shadow: 3px 3px 0px #2D2D2D;
}

/* 2カラムレイアウト */
.app-content {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 28px;
    width: 100%;
}

/* ぷっくり丸っこいカード */
.pop-card {
    flex: 1;
    background-color: #FFFFFF;
    border: 4px solid #2D2D2D;
    border-radius: 24px;
    box-shadow: 8px 8px 0px #2D2D2D;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
    transition: transform 0.15s ease;
}

.card-header {
    padding: 20px 24px;
    background-color: #34D399; /* メロンソーダ */
    border-bottom: 4px solid #2D2D2D;
    flex-shrink: 0;
}

.card-title {
    font-size: 18px;
    font-weight: 900;
    color: #2D2D2D;
    display: flex;
    align-items: center;
    gap: 8px;
}

.card-body {
    overflow-y: auto;
    flex: 1;
    padding: 24px;
}

/* コントロール */
.control-panel {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
}

.filter-group {
    display: flex;
    align-items: center;
    gap: 10px;
}

.filter-label {
    font-size: 13px;
    font-weight: 900;
}

/* おもちゃ風の選択メニュー＆ボタン */
select {
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 900;
    border: 3px solid #2D2D2D;
    border-radius: 14px;
    background-color: #FFFFFF;
    color: #2D2D2D;
    outline: none;
    cursor: pointer;
    box-shadow: 3px 3px 0px #2D2D2D;
    transition: all 0.1s;
}

select:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0px #2D2D2D;
}

.btn-pop {
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 900;
    background-color: #FF6B6B; /* ジューシーレッド */
    color: #FFFFFF;
    border: 3px solid #2D2D2D;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 4px 4px 0px #2D2D2D;
    text-shadow: 1px 1px 0px #2D2D2D;
    transition: all 0.1s;
}

.btn-pop:hover {
    transform: translateY(-2px);
    box-shadow: 5px 5px 0px #2D2D2D;
}

.btn-pop:active {
    transform: translate(3px, 3px);
    box-shadow: 1px 1px 0px #2D2D2D;
}

#updateTime {
    font-size: 11px;
    font-weight: 900;
    color: #888;
    margin-top: 6px;
    text-align: right;
}

/* 丸いポップなテーブル */
.pop-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 8px; /* 行と行の間にスキマを作る */
}

.pop-table th {
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 900;
    color: #888;
    text-align: left;
}

.pop-table td {
    padding: 14px 16px;
    font-size: 14px;
    font-weight: 900;
    background-color: #F3F4F6;
    border-top: 3px solid #2D2D2D;
    border-bottom: 3px solid #2D2D2D;
}

.pop-table td:first-child {
    border-left: 3px solid #2D2D2D;
    border-radius: 14px 0 0 14px;
}

.pop-table td:last-child {
    border-right: 3px solid #2D2D2D;
    border-radius: 0 14px 14px 0;
}

/* 生徒名ボタン：ステッカー風 */
.student-btn {
    font-size: 15px;
    font-weight: 900;
    color: #2D2D2D;
    background: #FBBF24; /* ひよこイエロー */
    border: 2px solid #2D2D2D;
    padding: 4px 12px;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 2px 2px 0px #2D2D2D;
    transition: all 0.1s;
}

.student-btn:hover {
    background-color: #F59E0B;
    transform: scale(1.05);
}

/* 行選択時 */
.row-selected td {
    background-color: #E0F2FE !important; /* さわやかライトブルー */
}

/* まるいバッジ */
.pop-badge {
    background-color: #EC4899; /* ビビッドピンク */
    color: #FFFFFF;
    border: 2px solid #2D2D2D;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 900;
    box-shadow: 2px 2px 0px #2D2D2D;
}

/* 右側：履歴のふせん風リスト */
.history-title {
    font-size: 18px;
    font-weight: 900;
    margin-bottom: 20px;
    background-color: #FFFF99; /* まるで本物の黄色いふせん */
    border: 3px solid #2D2D2D;
    padding: 6px 16px;
    border-radius: 10px;
    box-shadow: 3px 3px 0px #2D2D2D;
    display: inline-block;
    transform: rotate(-1.5deg);
}

.history-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.history-item {
    background-color: #FFFFFF;
    border: 3px solid #2D2D2D;
    border-radius: 16px;
    padding: 16px 20px;
    box-shadow: 4px 4px 0px #2D2D2D;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
}

/* ふせんピンをイメージしたワンポイント */
.history-item::before {
    content: "📌";
    position: absolute;
    top: -10px;
    left: 12px;
    font-size: 16px;
}

.history-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.history-number {
    font-size: 11px;
    font-weight: 900;
    color: #3B82F6;
}

.history-teacher {
    font-size: 15px;
    font-weight: 900;
}

.history-date {
    font-size: 12px;
    font-weight: 900;
    color: #6B7280;
}

/* キャラクター風待機画面 */
.pop-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
}

.pop-empty-icon {
    font-size: 56px;
    margin-bottom: 16px;
    animation: float 3s infinite ease-in-out;
}

@keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-10px) rotate(3deg); }
}

.pop-empty-text {
    font-size: 14px;
    font-weight: 900;
    background-color: #FEE2E2;
    border: 3px solid #2D2D2D;
    padding: 8px 16px;
    border-radius: 12px;
    box-shadow: 3px 3px 0px #2D2D2D;
}
</style>

</head>

<body>

<!-- ヘッダー -->
<div class="app-header">
    <div class="brand-title">
        <span class="brand-icon">📣</span>
        <span>MEISETSU STAR CLUB!</span>
    </div>
    <span class="app-badge">COACH PANEL</span>
</div>

<!-- メインエリア -->
<div class="app-content">

    <!-- 左パネル -->
    <div class="pop-card">
        <div class="card-header">
            <div class="card-title">🎖️ MEMBER ARCHIVES</div>
        </div>
        <div class="card-body">
            <div class="control-panel">
                <div class="filter-group">
                    <span class="filter-label">ならべかえ:</span>
                    <select id="sortSelect" onchange="loadSummary()">
                        <option value="count">特訓数が多い順</option>
                        <option value="id">名簿IDの順</option>
                    </select>
                </div>
                <div>
                    <button class="btn-pop" onclick="refreshData()">更新する！</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <table class="pop-table" id="summaryTable">
                <thead>
                    <tr>
                        <th>生徒ID</th>
                        <th style="text-align: right; width: 120px;">とっくん回数</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JSで展開 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 右パネル -->
    <div class="pop-card">
        <div class="card-header" style="background-color: #F87171;">
            <div class="card-title" style="color: white;">📖 TRAINING NOTES</div>
        </div>
        <div id="historyArea" class="card-body">
            <!-- 未選択時の表示 -->
            <div class="pop-empty">
                <div class="pop-empty-icon">🍦</div>
                <p class="pop-empty-text">生徒IDをクリックして、日々の成長履歴を見よう！</p>
            </div>
        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = now.toLocaleTimeString("ja-JP") + " お待たせ！";
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";

        let students = [];
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="student-btn" onclick="showHistory('${student.id}')">
                        ${student.id}
                    </button>
                </td>
                <td style="text-align: right;">
                    <span class="pop-badge">${student.count} 突破！</span>
                </td>
            </tr>
            `;
        });

        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // アクティブ行の切り替え
    document.querySelectorAll('.pop-table tbody tr').forEach(tr => tr.classList.remove('row-selected'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('row-selected');
    }

    // ロード表示
    document.getElementById("historyArea").innerHTML = `
        <div class="pop-empty">
            <div class="pop-empty-icon">🪁</div>
            <p class="pop-empty-text">データをひっぱってきています...</p>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <h2 class="history-title">
            📝 ${studentId} の特訓カルテ
        </h2>
        <div class="history-list">
        `;

        for(let i = 0; i < data.length; i++){
            let date = new Date(data[i].date);
            html += `
            <div class="history-item">
                <div class="history-info">
                    <span class="history-number">STEP 0${i+1}</span>
                    <span class="history-teacher">${data[i].teacher} 先生と挑戦！</span>
                </div>
                <div class="history-date">
                    ${date.toLocaleString("ja-JP")}
                </div>
            </div>
            `;
        }

        html += "</div>";
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="pop-empty" style="color: #EF4444;">
                <div class="pop-empty-icon">💥</div>
                <p class="pop-empty-text">接続エラー！もう一回更新してみてね。</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
