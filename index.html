<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面接とっくんノート</title>

<style>
/* 共通リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    /* ぬくもりのある丸ゴシック */
    font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
    background-color: #f7ebe1; /* やさしいミルクティーベージュ */
    /* 背景にうっすら木目調のストライプ */
    background-image: repeating-linear-gradient(90deg, rgba(139,115,85, 0.03) 0px, rgba(139,115,85, 0.03) 2px, transparent 2px, transparent 40px);
    color: #5c4033; /* チョコレートブラウン */
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 24px;
}

/* ヘッダー：黒板のネームプレート風 */
.app-header {
    background-color: #ffffff;
    border: 3px solid #bba38a;
    border-radius: 16px;
    height: 60px;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    box-shadow: 0 4px 0px rgba(187, 163, 138, 0.3);
    flex-shrink: 0;
}

.brand-title {
    font-size: 18px;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 8px;
}

.brand-icon {
    font-size: 26px;
}

.app-badge {
    background-color: #fceade;
    color: #c68b59;
    font-size: 11px;
    font-weight: bold;
    padding: 4px 12px;
    border-radius: 20px;
    border: 2px solid #e8ccb5;
}

/* スケッチブック風2カラム */
.app-content {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 12px;
    width: 100%;
    position: relative;
}

/* ノートの真ん中の「ダブルリング」を表現する擬似要素 */
.app-content::before {
    content: "➰ ➰ ➰ ➰ ➰ ➰ ➰ ➰ ➰";
    position: absolute;
    left: 50%;
    top: 5%;
    transform: translateX(-50%) rotate(90deg);
    color: #8c8c8c;
    font-size: 24px;
    letter-spacing: 12px;
    z-index: 10;
    pointer-events: none;
    opacity: 0.8;
}

/* スケッチブックのページ */
.sketch-page {
    flex: 1;
    background-color: #faf8f5; /* 画用紙のやさしい白 */
    border: 3px solid #bba38a;
    border-radius: 24px;
    box-shadow: 0 6px 12px rgba(139, 115, 85, 0.15);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
    position: relative;
}

/* ページ上部のミシン目 */
.sketch-page::after {
    content: "";
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 6px;
    background-image: radial-gradient(circle, #bba38a 2px, transparent 3px);
    background-size: 12px 12px;
    opacity: 0.5;
}

.page-header {
    padding: 24px 24px 12px 24px;
    flex-shrink: 0;
}

.page-title {
    font-size: 16px;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 2px dashed #d9c5b2;
    padding-bottom: 8px;
}

.page-body {
    overflow-y: auto;
    flex: 1;
    padding: 24px;
}

/* コントロール（落書き風） */
.control-panel {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
}

.filter-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
}

/* 丸っこい選択メニュー＆ボタン */
select {
    padding: 8px 14px;
    font-size: 12px;
    font-family: inherit;
    font-weight: bold;
    border: 2px solid #bba38a;
    border-radius: 12px;
    background-color: #ffffff;
    color: #5c4033;
    outline: none;
    cursor: pointer;
}

.btn-crayon {
    padding: 8px 16px;
    font-size: 12px;
    font-family: inherit;
    font-weight: bold;
    background-color: #e8ccb5; /* クレヨンのオレンジがかったベージュ */
    color: #5c4033;
    border: 2px solid #bba38a;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 0 3px 0px #bba38a;
    transition: all 0.1s;
}

.btn-crayon:hover {
    background-color: #fceade;
}

.btn-crayon:active {
    transform: translateY(3px);
    box-shadow: none;
}

#updateTime {
    font-size: 11px;
    color: #a38f80;
    margin-top: 4px;
    font-style: italic;
}

/* 手書き罫線風テーブル */
.crayon-table {
    width: 100%;
    border-collapse: collapse;
}

.crayon-table th {
    padding: 8px 12px;
    font-size: 12px;
    font-weight: bold;
    color: #a38f80;
    text-align: left;
}

.crayon-table td {
    padding: 14px 12px;
    font-size: 14px;
    border-bottom: 2px dotted #e8ccb5; /* ドットの罫線 */
}

/* 生徒名ボタン：シールを貼ったようなデザイン */
.student-btn {
    font-size: 14px;
    font-family: inherit;
    font-weight: bold;
    color: #5c4033;
    background: #ffffff;
    border: 2px solid #bba38a;
    padding: 4px 12px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 2px 0px #bba38a;
}

.student-btn:hover {
    background-color: #fff9f5;
}

/* 選択行：色鉛筆でぐるぐる塗ったような黄色バック */
.row-selected td {
    background-color: #fff9db !important; /* やさしいひよこイエロー */
}

/* どんぐりのような回数マーク */
.count-badge {
    background-color: #fff0e0;
    color: #c68b59;
    border: 2px solid #e8ccb5;
    padding: 2px 10px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: bold;
}

/* 右側：思い出アルバム風ログ */
.diary-title {
    font-size: 15px;
    font-weight: bold;
    margin-bottom: 16px;
    color: #c68b59;
}

.diary-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.diary-card {
    background-color: #ffffff;
    border: 2px solid #bba38a;
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 4px 0px rgba(187, 163, 138, 0.1);
    position: relative;
}

/* クリップで留めたようなデザイン */
.diary-card::before {
    content: "📎";
    position: absolute;
    top: -12px;
    left: 20px;
    font-size: 20px;
}

.diary-num {
    font-size: 11px;
    font-weight: bold;
    color: #a38f80;
    margin-bottom: 4px;
}

.diary-teacher {
    font-size: 14px;
    font-weight: bold;
    margin-bottom: 4px;
}

.diary-date {
    font-size: 12px;
    color: #a38f80;
}

/* 手書きイラスト風待機画面 */
.page-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #bba38a;
    text-align: center;
}

.empty-drawing {
    font-size: 48px;
    margin-bottom: 16px;
    animation: sway 3s infinite ease-in-out;
}

@keyframes sway {
    0%, 100% { transform: rotate(-8deg); }
    50% { transform: rotate(8deg); }
}

.empty-text {
    font-size: 12px;
    line-height: 1.6;
}
</style>

</head>

<body>

<!-- ヘッダー -->
<div class="app-header">
    <div class="brand-title">
        <span class="brand-icon">🎨</span>
        <span>面接とっくんノート</span>
    </div>
    <span class="app-badge">たいせつなきろく</span>
</div>

<!-- メインエリア（リングノート） -->
<div class="app-content">

    <!-- 左ページ（名簿） -->
    <div class="sketch-page">
        <div class="page-header">
            <div class="page-title">🌳 とっくんメンバー</div>
        </div>
        <div class="page-body">
            <div class="control-panel">
                <div class="filter-group">
                    <span>ならびかえ:</span>
                    <select id="sortSelect" onchange="loadSummary()">
                        <option value="count">たくさん練習した順</option>
                        <option value="id">名簿のID順</option>
                    </select>
                </div>
                <div>
                    <button class="btn-crayon" onclick="refreshData()">ノートをひらく</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <table class="crayon-table" id="summaryTable">
                <thead>
                    <tr>
                        <th>生徒ID</th>
                        <th style="text-align: right; width: 120px;">がんばった数</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JSで展開 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 右ページ（思い出のアルバム） -->
    <div class="sketch-page">
        <div class="page-header">
            <div class="page-title">📖 がんばったきろく</div>
        </div>
        <div id="historyArea" class="page-body">
            <!-- 未選択時の表示 -->
            <div class="page-empty">
                <div class="empty-drawing">✏️</div>
                <p class="empty-text">
                    ひだりのページから生徒IDをえらぶと、<br>
                    これまでの特訓の思い出がここにひらきます。
                </p>
            </div>
        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = now.toLocaleTimeString("ja-JP") + " にひらいたよ";
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";

        let students = [];
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="student-btn" onclick="showHistory('${student.id}')">
                        🙋 ${student.id}
                    </button>
                </td>
                <td style="text-align: right;">
                    <span class="count-badge">${student.count} 回</span>
                </td>
            </tr>
            `;
        });

        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // アクティブ行の切り替え
    document.querySelectorAll('.crayon-table tbody tr').forEach(tr => tr.classList.remove('row-selected'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('row-selected');
    }

    // ロード表示
    document.getElementById("historyArea").innerHTML = `
        <div class="page-empty">
            <div class="empty-drawing" style="animation: none;">🔍</div>
            <p class="empty-text">おもいでを探しちゅう...</p>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <div class="diary-title">🌟 ${studentId} の思い出メモ</div>
        <div class="diary-list">
        `;

        for(let i = 0; i < data.length; i++){
            let date = new Date(data[i].date);
            html += `
            <div class="diary-card">
                <div class="diary-num">たいせつな思い出 0${i+1}</div>
                <div class="diary-teacher">担当：${data[i].teacher} 先生</div>
                <div class="diary-date">時間：${date.toLocaleString("ja-JP")}</div>
            </div>
            `;
        }

        html += "</div>";
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="page-empty" style="color: #c97a7a;">
                <div class="empty-drawing">🍂</div>
                <p class="empty-text">ノートが風で飛ばされたみたい...もう一回リロードしてみてね。</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
