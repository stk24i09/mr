<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>面接練習回数一覧</title>

<style>

body{
    font-family:sans-serif;
    padding:20px;
}

table{
    border-collapse:collapse;
}

th,td{
    border:1px solid #000;
    padding:8px;
    text-align:center;
}

th{
    background:#eeeeee;
}

</style>

</head>

<body>

<h2>面接練習回数一覧</h2>

<table id="table">
<tr>
<th>生徒ID</th>
<th>面接回数</th>
</tr>
</table>

<script>

const apiUrl =
"https://script.google.com/macros/s/AKfycbygGcjEbmmHe3KaoRXFL0GB_68YLnXK-jgcIHn4Ezy5Dhnb0By6cyjqEKo_60ExOdik/exec?mode=summary";

fetch(apiUrl)
.then(response => response.json())
.then(data => {

    let html =
    "<tr><th>生徒ID</th><th>面接回数</th></tr>";

    for(let id in data){

        html += `
        <tr>
            <td>${id}</td>
            <td>${data[id]}回</td>
        </tr>
        `;
    }

    document.getElementById("table").innerHTML =
    html;

})
.catch(error => {

    document.getElementById("table").innerHTML =
    "<tr><td colspan='2'>データ取得失敗</td></tr>";

    console.log(error);

});

</script>

</body>
</html>
