<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TACTICAL_CONSOLE://MEISETSU_CORE_v9</title>

<style>
/* 共通リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    /* 近未来的なサンセリフフォント */
    font-family: "Segoe UI", Roboto, "Helvetica Neue", "Hiragino Kaku Gothic ProN", sans-serif;
    background-color: #030812; /* 漆黒に近いスペースブルー */
    /* 近未来グリッド背景 */
    background-image: 
        linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
    background-size: 20px 20px;
    color: #a5f3fc; /* 淡いシアン */
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 20px;
    letter-spacing: 0.08em;
}

/* ヘッダー：ホログラムインターフェース */
.hud-header {
    border-bottom: 2px solid #00f0ff;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding: 0 10px;
    flex-shrink: 0;
    text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
}

.brand-title {
    font-size: 18px;
    font-weight: 900;
    color: #00f0ff;
    letter-spacing: 3px;
}

.brand-title span {
    color: #ff6b00; /* 警告オレンジ */
}

.system-status {
    font-size: 11px;
    background-color: rgba(0, 240, 255, 0.1);
    border: 1px solid #00f0ff;
    padding: 3px 12px;
    border-radius: 2px;
    color: #00f0ff;
    font-weight: bold;
    box-shadow: 0 0 8px rgba(0, 240, 255, 0.2);
}

/* 2カラムレイアウト */
.hud-workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 20px;
    width: 100%;
}

/* タクティカルホロパネル */
.hud-panel {
    flex: 1;
    background: rgba(4, 15, 30, 0.65);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(0, 240, 255, 0.2);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
    box-shadow: 0 0 20px rgba(0, 240, 255, 0.05), inset 0 0 15px rgba(0, 240, 255, 0.1);
}

.panel-header {
    background-color: rgba(0, 240, 255, 0.08);
    padding: 10px 16px;
    border-bottom: 1px solid rgba(0, 240, 255, 0.2);
    font-size: 11px;
    color: #00f0ff;
    font-weight: bold;
    letter-spacing: 2px;
    display: flex;
    justify-content: space-between;
}

.panel-body {
    overflow-y: auto;
    flex: 1;
    padding: 20px;
}

/* コントロール（パラメータ調整風） */
.control-panel {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
    background-color: rgba(0, 240, 255, 0.02);
    border: 1px solid rgba(0, 240, 255, 0.1);
    padding: 10px;
}

.filter-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: #00f0ff;
}

/* シアンのアウトラインセレクト */
select {
    padding: 5px 10px;
    font-size: 11px;
    font-family: inherit;
    border: 1px solid #00f0ff;
    background-color: #030812;
    color: #00f0ff;
    outline: none;
    cursor: pointer;
}

select:hover {
    background-color: rgba(0, 240, 255, 0.1);
}

/* タクティカルボタン */
.btn-hud {
    padding: 5px 15px;
    font-size: 11px;
    font-family: inherit;
    font-weight: bold;
    background-color: transparent;
    color: #ff6b00;
    border: 1px solid #ff6b00;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s ease;
}

.btn-hud:hover {
    background-color: #ff6b00;
    color: #030812;
    box-shadow: 0 0 15px rgba(255, 107, 0, 0.5);
}

#updateTime {
    font-size: 10px;
    color: rgba(0, 240, 255, 0.5);
    margin-top: 4px;
}

/* フライトログテーブル */
.hud-table {
    width: 100%;
    border-collapse: collapse;
}

.hud-table th {
    padding: 8px;
    font-size: 11px;
    color: #00f0ff;
    text-align: left;
    border-bottom: 2px solid #00f0ff;
}

.hud-table td {
    padding: 12px 8px;
    font-size: 13px;
    border-bottom: 1px solid rgba(0, 240, 255, 0.08);
}

/* ターゲットロックオン（選択時） */
.row-selected td {
    background-color: rgba(255, 107, 0, 0.08) !important;
    border-bottom-color: #ff6b00;
}

.row-selected .student-btn {
    color: #ff6b00 !important;
    font-weight: bold;
}

.row-selected .student-btn::before {
    content: "[LOCK] ";
    color: #ff6b00;
}

/* ターゲットリンク */
.student-btn {
    font-size: 13px;
    font-family: inherit;
    color: #00f0ff;
    background: none;
    border: none;
    cursor: pointer;
    text-align: left;
}

.student-btn::before {
    content: "[SCAN] ";
    color: rgba(0, 240, 255, 0.4);
}

.student-btn:hover {
    color: #ff6b00;
    text-shadow: 0 0 8px rgba(255, 107, 0, 0.4);
}

/* ステータスドット */
.status-dot-container {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: flex-end;
}

.frequency-bar {
    width: 50px;
    height: 6px;
    background-color: rgba(0, 240, 255, 0.1);
    border: 1px solid rgba(0, 240, 255, 0.3);
}

.frequency-fill {
    height: 100%;
    background-color: #00f0ff;
    box-shadow: 0 0 8px #00f0ff;
}

/* 右側：ターゲットログ解析 */
.analysis-title {
    font-size: 14px;
    font-weight: bold;
    color: #ff6b00;
    margin-bottom: 16px;
    border-bottom: 1px solid #ff6b00;
    padding-bottom: 8px;
    text-shadow: 0 0 8px rgba(255, 107, 0, 0.3);
}

.analysis-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.analysis-card {
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(0, 240, 255, 0.15);
    padding: 14px;
    position: relative;
}

.analysis-card:hover {
    border-color: #00f0ff;
    box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.1);
}

.analysis-num {
    font-size: 10px;
    color: rgba(0, 240, 255, 0.5);
    margin-bottom: 4px;
}

.analysis-data {
    font-size: 12px;
    line-height: 1.6;
}

.analysis-highlight {
    color: #00f0ff;
    font-weight: bold;
}

/* スタンバイ（未選択）画面 */
.hud-idle {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: rgba(0, 240, 255, 0.4);
    text-align: center;
}

.hud-radar {
    width: 60px;
    height: 60px;
    border: 2px solid rgba(0, 240, 255, 0.2);
    border-radius: 50%;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
}

.hud-radar::before {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: conic-gradient(from 0deg, rgba(0, 240, 255, 0.4) 0deg, transparent 90deg);
    border-radius: 50%;
    animation: radar-sweep 4s infinite linear;
}

@keyframes radar-sweep {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.hud-idle-text {
    font-size: 11px;
    line-height: 1.8;
}
</style>

</head>

<body>

<!-- ヘッダー -->
<div class="hud-header">
    <div class="brand-title">TACTICAL // <span>COGNITIVE_HUB</span></div>
    <div class="system-status">SECTOR_STATUS: STABLE</div>
</div>

<!-- メインエリア -->
<div class="hud-workspace">

    <!-- 左ホロパネル -->
    <div class="hud-panel">
        <div class="panel-header">
            <span>[TARGETS_ACQUIRED]</span>
            <span>GRID_SEC: A-04</span>
        </div>
        <div class="panel-body">
            <div class="control-panel">
                <div class="filter-group">
                    <span>SORT_ALGORITHM:</span>
                    <select id="sortSelect" onchange="loadSummary()">
                        <option value="count">FREQ_DENSITY (DESC)</option>
                        <option value="id">SECTOR_ID (ASC)</option>
                    </select>
                </div>
                <div style="text-align: right;">
                    <button class="btn-hud" onclick="refreshData()">re-align</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <table class="hud-table" id="summaryTable">
                <thead>
                    <tr>
                        <th>SECTOR ID</th>
                        <th style="text-align: right; width: 130px;">METRIC INTENSITY</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JSで展開 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 右ホロパネル -->
    <div class="hud-panel">
        <div class="panel-header">
            <span>[ANALYSIS_SHEETS]</span>
            <span>LOCK_ON: STANDBY</span>
        </div>
        <div id="historyArea" class="panel-body">
            <!-- 未選択表示 -->
            <div class="hud-idle">
                <div class="hud-radar"></div>
                <p class="hud-idle-text">
                    [WARNING] SYSTEM IDLE<br>
                    ターゲットを選択し、データ・フィードを同期してください。
                </p>
            </div>
        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = "SYNC_TIME: " + now.toLocaleTimeString("ja-JP");
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";

        let students = [];
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            // カウントバー計算 (最大10回想定)
            let percent = Math.min((student.count / 10) * 100, 100);

            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="student-btn" onclick="showHistory('${student.id}')">
                        ${student.id}
                    </button>
                </td>
                <td style="text-align: right;">
                    <div class="status-dot-container">
                        <span style="color: #00f0ff; font-weight: bold;">${student.count}</span>
                        <div class="frequency-bar">
                            <div class="frequency-fill" style="width: ${percent}%;"></div>
                        </div>
                    </div>
                </td>
            </tr>
            `;
        });

        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // アクティブ行の切り替え
    document.querySelectorAll('.hud-table tbody tr').forEach(tr => tr.classList.remove('row-selected'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('row-selected');
    }

    // ロード表示
    document.getElementById("historyArea").innerHTML = `
        <div class="hud-idle">
            <div class="hud-radar" style="border-color: #ff6b00;"></div>
            <p class="hud-idle-text" style="color: #ff6b00;">
                [SYNCHRONIZING] TARGET LOCK ACQUIRED...<br>
                DOWNLOADING ${studentId} LOG-DATA PACKETS.
            </p>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <div class="analysis-title">[ TARGET LOCK: ${studentId} // RETRIEVED_LOGS ]</div>
        <div class="analysis-list">
        `;

        for(let i = 0; i < data.length; i++){
            let date = new Date(data[i].date);
            html += `
            <div class="analysis-card">
                <div class="analysis-num">TELEMETRY DATA PACKET // 0${i+1}</div>
                <div class="analysis-data">
                    OPERATOR: <span class="analysis-highlight">${data[i].teacher}</span> CO-PILOT<br>
                    TIMESTAMP: <span style="color: #ffffff;">${date.toLocaleString("ja-JP")}</span>
                </div>
            </div>
            `;
        }

        html += "</div>";
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="hud-idle" style="color: #ff3c00;">
                <div class="hud-radar" style="border-color: #ff3c00;"></div>
                <p class="hud-idle-text">
                    [CONNECTION FAILURE] DATASTREAM INTERRUPTED.<br>
                    PLEASE TRIGGER "RE-ALIGN" COMMAND TO RESET INTERFACE.
                </p>
            </div>
        `;
    });
}
</script>

</body>
</html>
