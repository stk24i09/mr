<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面接練習回数管理システム</title>

<style>
/* 共通リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
    background-color: #f7f5f0; /* 生成り（ウォームグレー） */
    color: #2f3e36; /* 深いオリーブブラウン */
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ぬくもりのあるナチュラルヘッダー */
.app-header {
    background-color: #ffffff;
    height: 64px;
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid #e9e5db;
    flex-shrink: 0;
}

.brand-title {
    font-size: 16px;
    font-weight: 700;
    color: #3a5a40; /* セージグリーン */
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: 0.02em;
}

.brand-icon {
    font-size: 20px;
}

.app-badge {
    background-color: #f4ebe1; /* やわらかなベージュ */
    color: #b56576; /* くすみピンク・テラコッタ */
    font-size: 11px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
}

/* メインフレーム（2カラム） */
.app-content {
    display: flex;
    flex: 1;
    overflow: hidden;
    padding: 28px;
    gap: 28px;
    max-width: 1400px;
    width: 100%;
    margin: 0 auto;
}

/* 温かみのある白カード */
.natural-card {
    flex: 1;
    background-color: #ffffff;
    border-radius: 16px;
    border: 2px solid #e9e5db;
    box-shadow: 0 8px 16px rgba(47, 62, 54, 0.03);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
}

.card-header {
    padding: 20px 28px;
    background-color: #fbfbfa;
    border-bottom: 2px solid #e9e5db;
    flex-shrink: 0;
}

.card-title {
    font-size: 15px;
    font-weight: 700;
    color: #3a5a40;
    display: flex;
    align-items: center;
    gap: 8px;
}

.card-body {
    overflow-y: auto;
    flex: 1;
    padding: 24px 28px;
}

/* 操作バー */
.control-panel {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
}

.filter-group {
    display: flex;
    align-items: center;
    gap: 8px;
}

.filter-label {
    font-size: 12px;
    font-weight: 700;
    color: #58705f;
}

/* コロンとした可愛いセレクト＆ボタン */
select {
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    border: 2px solid #e9e5db;
    border-radius: 20px;
    background-color: #ffffff;
    color: #2f3e36;
    outline: none;
    cursor: pointer;
    transition: all 0.2s;
}

select:hover {
    border-color: #cbd1c5;
}

.btn-natural {
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 700;
    background-color: #3a5a40;
    color: #ffffff;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 8px rgba(58, 90, 64, 0.15);
}

.btn-natural:hover {
    background-color: #2f4733;
    transform: translateY(1px);
    box-shadow: 0 2px 4px rgba(58, 90, 64, 0.1);
}

#updateTime {
    font-size: 11px;
    color: #8fa89b;
    margin-top: 4px;
    text-align: right;
}

/* 素朴で綺麗なテーブル */
.natural-table {
    width: 100%;
    border-collapse: collapse;
}

.natural-table th {
    padding: 12px 16px;
    font-size: 12px;
    font-weight: 700;
    color: #58705f;
    text-align: left;
    border-bottom: 2px solid #e9e5db;
}

.natural-table td {
    padding: 14px 16px;
    border-bottom: 1px solid #f2efea;
    transition: all 0.15s;
}

.natural-table tr:hover td {
    background-color: #fbfbfa;
}

/* 生徒IDのボタンスタイル */
.student-link-btn {
    font-size: 14px;
    font-weight: 700;
    color: #2f3e36;
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    text-decoration-color: #cbd1c5;
    text-underline-offset: 4px;
    transition: all 0.15s;
    padding: 4px 0;
}

.student-link-btn:hover {
    color: #3a5a40;
    text-decoration-color: #3a5a40;
}

/* 選択された生徒のアクティブ表示 */
.row-selected td {
    background-color: #f4f7f4 !important;
}

.row-selected .student-link-btn {
    color: #3a5a40;
    text-decoration-color: #3a5a40;
}

/* ほっこりテラコッタの丸badge */
.warm-badge {
    background-color: #f7ede2; /* 薄いアプリコット */
    color: #f28482; /* テラコッタピンク */
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    display: inline-block;
}

.row-selected .warm-badge {
    background-color: #f28482;
    color: #ffffff;
}

/* 右側：詳細履歴のウッドテイスト風リスト */
.history-title {
    font-size: 15px;
    font-weight: 700;
    color: #3a5a40;
    margin-bottom: 20px;
}

.history-card-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.history-item-box {
    background-color: #fbfbfa;
    border: 2px solid #e9e5db;
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.history-meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.history-count-tag {
    font-size: 11px;
    font-weight: 700;
    color: #b5838d; /* くすみピンク */
    text-transform: uppercase;
}

.history-teacher {
    font-size: 14px;
    font-weight: 700;
    color: #2f3e36;
}

.history-time {
    font-size: 12px;
    color: #7f9c8d;
}

/* プレースホルダー */
.warm-empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #8fa89b;
    text-align: center;
}

.warm-empty-icon {
    font-size: 32px;
    margin-bottom: 12px;
}

.warm-empty-text {
    font-size: 13px;
    font-weight: 600;
}
</style>

</head>

<body>

<!-- ヘッダー -->
<div class="app-header">
    <div class="brand-title">
        <span class="brand-icon">✏️</span>
        <span>面接練習きろく</span>
    </div>
    <span class="app-badge">先生用ノート</span>
</div>

<!-- メインエリア -->
<div class="app-content">

    <!-- 左パネル -->
    <div class="natural-card">
        <div class="card-header">
            <div class="card-title">📖 生徒一覧</div>
        </div>
        <div class="card-body">
            <div class="control-panel">
                <div class="filter-group">
                    <span class="filter-label">並び替え</span>
                    <select id="sortSelect" onchange="loadSummary()">
                        <option value="count">面接回数が多い順</option>
                        <option value="id">生徒ID順</option>
                    </select>
                </div>
                <div>
                    <button class="btn-natural" onclick="refreshData()">リスト更新</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <table class="natural-table" id="summaryTable">
                <thead>
                    <tr>
                        <th>生徒ID</th>
                        <th style="text-align: right; width: 100px;">面接回数</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JSによりデータが展開されます -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 右パネル -->
    <div class="natural-card">
        <div class="card-header">
            <div class="card-title">🔍 練習の履歴</div>
        </div>
        <div id="historyArea" class="card-body">
            <!-- 未選択時の表示 -->
            <div class="warm-empty-state">
                <div class="warm-empty-icon">☕</div>
                <p class="warm-empty-text">生徒IDを選ぶと、ここに面接の履歴が表示されます。</p>
            </div>
        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = now.toLocaleTimeString("ja-JP") + " 更新済み";
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";

        let students = [];
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="student-link-btn" onclick="showHistory('${student.id}')">
                        ${student.id}
                    </button>
                </td>
                <td style="text-align: right;">
                    <span class="warm-badge">${student.count} 回</span>
                </td>
            </tr>
            `;
        });

        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // アクティブ行の切り替え
    document.querySelectorAll('.natural-table tbody tr').forEach(tr => tr.classList.remove('row-selected'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('row-selected');
    }

    // ロード表示
    document.getElementById("historyArea").innerHTML = `
        <div class="warm-empty-state">
            <div class="warm-empty-icon">🌱</div>
            <p class="warm-empty-text">のんびり読み込んでいます...</p>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <h2 class="history-title">
            🌿 ${studentId} さんの面接ログ
        </h2>
        <div class="history-card-group">
        `;

        for(let i = 0; i < data.length; i++){
            let date = new Date(data[i].date);
            html += `
            <div class="history-item-box">
                <div class="history-meta">
                    <span class="history-count-tag">Lesson 0${i+1}</span>
                    <span class="history-teacher">担当：${data[i].teacher} 先生</span>
                </div>
                <div class="history-time">
                    ${date.toLocaleString("ja-JP")}
                </div>
            </div>
            `;
        }

        html += "</div>";
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="warm-empty-state" style="color: #e07a5f;">
                <div class="warm-empty-icon">🍂</div>
                <p class="warm-empty-text">接続エラーが起きました。もう一度お試しください。</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
