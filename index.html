<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面接練習回数管理システム</title>

<style>
/* ゼロベースのリセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background-color: #f8fafc; /* 極薄のブルーグレー */
    color: #0f172a;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* アプリケーションヘッダー */
.app-bar {
    background-color: #ffffff;
    height: 64px;
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
    z-index: 10;
    flex-shrink: 0;
}

.brand {
    display: flex;
    align-items: center;
    gap: 10px;
}

.brand-icon {
    width: 28px;
    height: 28px;
    background-color: #4f46e5; /* インディゴブルー */
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
    font-weight: bold;
    font-size: 14px;
}

.brand-name {
    font-size: 16px;
    font-weight: 700;
    color: #1e293b;
    letter-spacing: -0.025em;
}

.badge {
    background-color: #e0e7ff;
    color: #4338ca;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 9999px;
}

/* 2カラムレイアウト */
.app-viewport {
    display: flex;
    flex: 1;
    overflow: hidden;
    padding: 32px;
    gap: 32px;
    max-width: 1500px;
    width: 100%;
    margin: 0 auto;
}

/* 左右のパネル */
.card-panel {
    flex: 1;
    background-color: #ffffff;
    border-radius: 16px;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.02), 0 4px 6px -4px rgba(0, 0, 0, 0.02), 0 0 0 1px rgba(0, 0, 0, 0.03);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
}

.card-header {
    padding: 24px 32px;
    background-color: #ffffff;
    border-bottom: 1px solid #f1f5f9;
    flex-shrink: 0;
}

.card-title {
    font-size: 16px;
    font-weight: 700;
    color: #1e293b;
}

.card-body {
    overflow-y: auto;
    flex: 1;
    padding: 24px 32px;
}

/* 洗練された操作バー */
.action-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    gap: 16px;
}

.select-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
}

.select-label {
    font-size: 13px;
    font-weight: 600;
    color: #64748b;
}

select {
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    background-color: #ffffff;
    color: #334155;
    outline: none;
    cursor: pointer;
    transition: all 0.2s;
}

select:hover {
    border-color: #cbd5e1;
}

select:focus {
    border-color: #4f46e5;
    box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
}

.btn-refresh {
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    background-color: #4f46e5;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
}

.btn-refresh:hover {
    background-color: #4338ca;
    transform: translateY(-1px);
}

.btn-refresh:active {
    transform: translateY(0);
}

#updateTime {
    font-size: 11px;
    color: #94a3b8;
    text-align: right;
    margin-top: 4px;
}

/* 生徒一覧テーブルの刷新 */
.custom-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 8px; /* 行間に隙間を作る */
    margin-top: -8px;
}

.custom-table th {
    padding: 12px 16px;
    font-size: 12px;
    font-weight: 600;
    color: #64748b;
    text-align: left;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 1px solid #f1f5f9;
}

.custom-table td {
    padding: 16px;
    background-color: #ffffff;
    border-top: 1px solid #f1f5f9;
    border-bottom: 1px solid #f1f5f9;
    transition: all 0.2s;
}

.custom-table td:first-child {
    border-left: 1px solid #f1f5f9;
    border-top-left-radius: 12px;
    border-bottom-left-radius: 12px;
}

.custom-table td:last-child {
    border-right: 1px solid #f1f5f9;
    border-top-right-radius: 12px;
    border-bottom-right-radius: 12px;
    text-align: right; /* 回数は右寄せにしてスッキリ */
}

/* ホバー時の美しいバウンス */
.custom-table tr:hover td {
    background-color: #f8fafc;
    border-color: #e2e8f0;
}

/* 生徒IDのリンクボタン化 */
.student-btn {
    font-size: 14px;
    font-weight: 600;
    color: #4f46e5;
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px 8px;
    border-radius: 6px;
    transition: all 0.15s;
}

.student-btn:hover {
    background-color: #f5f3ff;
}

/* 選択された生徒のアクティブ状態 */
.selected-row td {
    background-color: #f5f3ff !important;
    border-color: #ddd6fe !important;
}

.selected-row .student-btn {
    color: #6d28d9;
}

/* 回数バッジ */
.count-chip {
    background-color: #f1f5f9;
    color: #475569;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    display: inline-block;
}

.selected-row .count-chip {
    background-color: #ede9fe;
    color: #6d28d9;
}

/* タイムライン風の面接詳細履歴 */
.history-timeline {
    position: relative;
    padding-left: 24px;
    margin-top: 16px;
}

.history-timeline::before {
    content: '';
    position: absolute;
    left: 7px;
    top: 8px;
    bottom: 8px;
    width: 2px;
    background-color: #e2e8f0;
}

.timeline-item {
    position: relative;
    padding-bottom: 24px;
}

.timeline-item:last-child {
    padding-bottom: 0;
}

.timeline-dot {
    position: absolute;
    left: -21px;
    top: 5px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background-color: #4f46e5;
    border: 3px solid #ffffff;
    box-shadow: 0 0 0 1px #4f46e5;
}

.timeline-content {
    background-color: #f8fafc;
    border-radius: 12px;
    padding: 16px 20px;
    border: 1px solid #f1f5f9;
}

.timeline-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
}

.timeline-title {
    font-size: 14px;
    font-weight: 700;
    color: #1e293b;
}

.timeline-date {
    font-size: 12px;
    color: #64748b;
}

.timeline-teacher {
    font-size: 13px;
    color: #475569;
}

/* プレースホルダー（未選択・読み込み中） */
.empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #94a3b8;
    text-align: center;
    padding: 32px;
}

.empty-state-icon {
    font-size: 36px;
    margin-bottom: 12px;
    background-color: #f1f5f9;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.empty-state-text {
    font-size: 13px;
    font-weight: 500;
}
</style>

</head>

<body>

<!-- アプリヘッダー -->
<div class="app-bar">
    <div class="brand">
        <div class="brand-icon">M</div>
        <div class="brand-name">面接練習管理</div>
        <span class="badge">教員用</span>
    </div>
</div>

<!-- メイン画面 -->
<div class="app-viewport">

    <!-- 左：生徒一覧カード -->
    <div class="card-panel">
        <div class="card-header">
            <div class="card-title">生徒一覧</div>
        </div>
        <div class="card-body">
            <div class="action-bar">
                <div class="select-wrapper">
                    <span class="select-label">並び替え</span>
                    <select id="sortSelect" onchange="loadSummary()">
                        <option value="count">面接回数順</option>
                        <option value="id">生徒ID順</option>
                    </select>
                </div>
                <div>
                    <button class="btn-refresh" onclick="refreshData()">
                        🔄 データを更新
                    </button>
                    <p id="updateTime"></p>
                </div>
            </div>

            <table class="custom-table" id="summaryTable">
                <thead>
                    <tr>
                        <th>生徒ID</th>
                        <th style="text-align: right;">面接回数</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JSで挿入されます -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 右：履歴詳細カード -->
    <div class="card-panel">
        <div class="card-header">
            <div class="card-title">履歴詳細</div>
        </div>
        <div id="historyArea" class="card-body">
            <!-- 初期状態の表示 -->
            <div class="empty-state">
                <div class="empty-state-icon">🔍</div>
                <p class="empty-state-text">生徒をクリックすると、ここに面接履歴が表示されます。</p>
            </div>
        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

// 更新ボタン
function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = now.toLocaleTimeString("ja-JP") + " 更新";
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";

        let students = [];
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        // 面接回数順
        if(sortType == "count"){
            students.sort(function(a, b){
                return b.count - a.count;
            });
        }
        // 生徒ID順
        else {
            students.sort(function(a, b){
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(function(student){
            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="student-btn" onclick="showHistory('${student.id}')">
                        ${student.id}
                    </button>
                </td>
                <td>
                    <span class="count-chip">${student.count}回</span>
                </td>
            </tr>
            `;
        });

        // プレースホルダーの table タグを維持するためにヘッダーと統合
        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // クリックされた行をハイライト（selected-rowクラスを付与）
    document.querySelectorAll('#summaryTable tr').forEach(tr => tr.classList.remove('selected-row'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('selected-row');
    }

    // 読み込み中
    document.getElementById("historyArea").innerHTML = `
        <div class="empty-state">
            <div class="empty-state-icon">🔄</div>
            <p class="empty-state-text">履歴を読み込んでいます...</p>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <h2 style="font-size: 16px; font-weight: 700; margin-bottom: 24px; color: #0f172a;">
            ${studentId} の履歴
        </h2>
        <div class="history-timeline">
        `;

        for(let i = 0; i < data.length; i++){
            let date = new Date(data[i].date);
            html += `
            <div class="timeline-item">
                <div class="timeline-dot"></div>
                <div class="timeline-content">
                    <div class="timeline-header">
                        <span class="timeline-title">${i+1}回目</span>
                        <span class="timeline-date">${date.toLocaleString("ja-JP")}</span>
                    </div>
                    <div class="timeline-teacher">担当：<strong>${data[i].teacher}</strong> 先生</div>
                </div>
            </div>
            `;
        }

        html += "</div>";
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="empty-state" style="color: #ef4444;">
                <div class="empty-state-icon">⚠️</div>
                <p class="empty-state-text">データの取得に失敗しました。再度お試しください。</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
