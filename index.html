<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>面接練習回数管理システム</title>

<style>

body{
    font-family:sans-serif;
    margin:30px;
    max-width:1400px;
}

.container{
    display:flex;
    flex-direction:row;
    align-items:flex-start;
    gap:30px;
}

.left-panel{
    flex:1;
    min-width:400px;
}

.right-panel{
    flex:1;
    min-width:400px;
}

table{
    border-collapse:collapse;
    width:100%;
}

th,td{
    border:1px solid #000;
    padding:10px;
    text-align:center;
}

th{
    background:#eeeeee;
}

.student-link{
    color:blue;
    cursor:pointer;
    text-decoration:underline;
}

.student-link:hover{
    color:red;
}

#historyArea{
    border:1px solid #ccc;
    padding:15px;
    min-height:300px;
    background:#fafafa;
}

</style>

</head>

<body>

<div class="container">

    <div class="left-panel">

        <h1>面接練習回数一覧</h1>

        <table id="summaryTable">

            <tr>
                <th>生徒ID</th>
                <th>面接回数</th>
            </tr>

        </table>

    </div>

    <div class="right-panel">

        <div id="historyArea">

            <h2>面接履歴</h2>

            <p>生徒IDをクリックしてください。</p>

        </div>

    </div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function loadSummary(){

    fetch(API_URL + "?mode=summary")

    .then(response => response.json())

    .then(data => {

        let html =
        `
        <tr>
            <th>生徒ID</th>
            <th>面接回数</th>
        </tr>
        `;

        for(let id in data){

            html +=
            `
            <tr>
                <td>
                    <span
                    class="student-link"
                    onclick="showHistory('${id}')">
                    ${id}
                    </span>
                </td>

                <td>${data[id]}回</td>
            </tr>
            `;
        }

        document.getElementById("summaryTable").innerHTML =
        html;

    });

}

function showHistory(studentId){

    fetch(
        API_URL +
        "?mode=history&id=" +
        encodeURIComponent(studentId)
    )

    .then(response => response.json())

    .then(data => {

        let html =
        `
        <h2>${studentId} の面接履歴</h2>

        <table>

            <tr>
                <th>回数</th>
                <th>日時</th>
                <th>担当先生</th>
            </tr>
        `;

        for(let i=0;i<data.length;i++){

            let date =
            new Date(data[i].date);

            html +=
            `
            <tr>
                <td>${i+1}回目</td>
                <td>${date.toLocaleString("ja-JP")}</td>
                <td>${data[i].teacher}</td>
            </tr>
            `;
        }

        html += "</table>";

        document.getElementById("historyArea").innerHTML =
        html;

    });

}

</script>

</body>
</html>
