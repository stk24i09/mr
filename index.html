<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROOT://MEISETSU_CORE_v3.9</title>

<style>
/* 共通リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    /* 開発者用の等幅フォント */
    font-family: "Courier New", Courier, Monaco, "Consolas", "MS Gothic", monospace;
    background-color: #050505; /* 深い闇 */
    color: #39ff14; /* ネオングリーン（サイバーフォントカラー） */
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 16px;
    position: relative;
}

/* CRTモニターの走査線ノイズを表現するオーバーレイ */
body::before {
    content: " ";
    display: block;
    position: absolute;
    top: 0; left: 0; bottom: 0; right: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
    z-index: 999;
    background-size: 100% 4px, 6px 100%;
    pointer-events: none;
}

/* ヘッダー：システムのシェルプロンプト風 */
.terminal-header {
    border-bottom: 2px solid #39ff14;
    height: 50px;
    padding: 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-shrink: 0;
}

.brand-title {
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 1px;
}

.system-status {
    font-size: 11px;
    color: #ffffff;
    background-color: #004400;
    padding: 2px 8px;
    border: 1px solid #39ff14;
}

/* 2カラムレイアウト */
.terminal-workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 16px;
    width: 100%;
}

/* ターミナルパネル */
.terminal-panel {
    flex: 1;
    border: 1px solid #39ff14;
    background-color: #000000;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
    box-shadow: 0 0 15px rgba(57, 255, 20, 0.15);
}

.panel-header {
    background-color: #111111;
    padding: 6px 16px;
    border-bottom: 1px solid #39ff14;
    font-size: 11px;
    color: #ffffff;
    display: flex;
    justify-content: space-between;
}

.panel-body {
    overflow-y: auto;
    flex: 1;
    padding: 16px;
}

/* コントロール（コンソールコマンド風） */
.control-panel {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 16px;
    background-color: #080808;
    border: 1px dashed #39ff14;
    padding: 10px;
}

.filter-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
}

/* 黒背景にグリーンのセレクト */
select {
    padding: 4px 8px;
    font-size: 11px;
    font-family: inherit;
    border: 1px solid #39ff14;
    background-color: #000000;
    color: #39ff14;
    outline: none;
    cursor: pointer;
}

/* コマンド実行ボタン */
.btn-console {
    padding: 4px 12px;
    font-size: 11px;
    font-family: inherit;
    background-color: #003300;
    color: #39ff14;
    border: 1px solid #39ff14;
    cursor: pointer;
}

.btn-console:hover {
    background-color: #39ff14;
    color: #000000;
}

#updateTime {
    font-size: 9px;
    color: #888888;
    margin-top: 4px;
}

/* ログ調テーブル */
.term-table {
    width: 100%;
    border-collapse: collapse;
}

.term-table th {
    padding: 8px;
    font-size: 11px;
    color: #ffffff;
    text-align: left;
    border-bottom: 1px solid #39ff14;
}

.term-table td {
    padding: 10px 8px;
    font-size: 12px;
    border-bottom: 1px solid #111111;
}

/* 選択時のハッカー風反転ハイライト */
.row-selected td {
    background-color: #39ff14 !important;
    color: #000000 !important;
}

.row-selected .student-btn {
    color: #000000 !important;
}

/* コマンドライン実行のような生徒リンク */
.student-btn {
    font-size: 12px;
    font-family: inherit;
    color: #39ff14;
    background: none;
    border: none;
    cursor: pointer;
    text-align: left;
}

.student-btn::before {
    content: "$ cat ./profiles/";
}

.student-btn:hover {
    text-decoration: underline;
}

/* 進捗バー表示（[#####.....]） */
.progress-bar {
    font-weight: bold;
}

/* 右側：コマンドログ展開エリア */
.cmd-line {
    color: #ffffff;
    font-size: 12px;
    margin-bottom: 16px;
}

.log-entry {
    border-left: 2px solid #39ff14;
    padding-left: 12px;
    margin-bottom: 16px;
    font-size: 11px;
}

.log-meta {
    color: #888888;
    margin-bottom: 4px;
}

.log-value {
    color: #ffffff;
}

/* 待機プレースホルダー（点滅カーソル） */
.terminal-idle {
    font-size: 12px;
    color: #888888;
    line-height: 1.8;
}

.cursor-blink {
    display: inline-block;
    width: 8px;
    height: 15px;
    background-color: #39ff14;
    animation: blink 1s infinite steps(1);
    vertical-align: middle;
    margin-left: 4px;
}

@keyframes blink {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
}
</style>

</head>

<body>

<!-- ヘッダー -->
<div class="terminal-header">
    <div class="brand-title">CORE-SHELL://MEISETSU_DATABASE_CLI</div>
    <div class="system-status">SYS_STATUS: ONLINE</div>
</div>

<!-- メインエリア -->
<div class="terminal-workspace">

    <!-- 左パネル -->
    <div class="terminal-panel">
        <div class="panel-header">
            <span>[STUDENT_INDEX_MODULE]</span>
            <span>MEM_USE: 4.2%</span>
        </div>
        <div class="panel-body">
            <div class="control-panel">
                <div class="filter-group">
                    <span>QUERY_SORT:</span>
                    <select id="sortSelect" onchange="loadSummary()">
                        <option value="count">SESSION_COUNT (DESC)</option>
                        <option value="id">SYSTEM_ID (ASC)</option>
                    </select>
                </div>
                <div style="text-align: right;">
                    <button class="btn-console" onclick="refreshData()">re-execute</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <table class="term-table" id="summaryTable">
                <thead>
                    <tr>
                        <th>TARGET_NODE_ID</th>
                        <th style="text-align: right; width: 140px;">METRIC_SESSIONS</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- 動的挿入 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 右パネル -->
    <div class="terminal-panel">
        <div class="panel-header">
            <span>[SHELL_OUTPUT]</span>
            <span>TTY: PTS/01</span>
        </div>
        <div id="historyArea" class="panel-body">
            <!-- 待機画面 -->
            <div class="terminal-idle">
                meisetsu-server login: root<br>
                Last login: Wed Jul 15 14:30:08 on console<br><br>
                $ select_target_node --run<br>
                Waiting for target selection input<span class="cursor-blink"></span>
            </div>
        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = "SYS_TIME: " + now.toLocaleTimeString("ja-JP");
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";

        let students = [];
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            // カウントバーの視覚化 ([#####.....])
            let filled = Math.min(student.count, 10);
            let empty = Math.max(0, 10 - filled);
            let bar = "[" + "#".repeat(filled) + ".".repeat(empty) + "]";

            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="student-btn" onclick="showHistory('${student.id}')">
                        ${student.id}
                    </button>
                </td>
                <td style="text-align: right;" class="progress-bar">
                    ${bar} [${student.count}]
                </td>
            </tr>
            `;
        });

        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // アクティブ選択行の表示
    document.querySelectorAll('.term-table tbody tr').forEach(tr => tr.classList.remove('row-selected'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('row-selected');
    }

    // ロード表示
    document.getElementById("historyArea").innerHTML = `
        <div class="terminal-idle">
            $ query_logs --id="${studentId}"<br>
            [STATUS] REQUEST SENT. RETRIEVING DATA FROM REMOTE API...<br>
            Please wait<span class="cursor-blink"></span>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <div class="cmd-line">
            $ query_logs --id="${studentId}" --display=all<br>
            [SUCCESS] RESOLVED ${data.length} MATCHING LOG ENTRIES.
        </div>
        `;

        for(let i = 0; i < data.length; i++){
            let date = new Date(data[i].date);
            html += `
            <div class="log-entry">
                <div class="log-meta"># RECORD_INDEX [0${i+1}]</div>
                <div>EXAMINER: <span class="log-value">${data[i].teacher}</span></div>
                <div>TIMESTAMP: <span class="log-value">${date.toLocaleString("ja-JP")}</span></div>
            </div>
            `;
        }

        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="terminal-idle" style="color: #ff0000;">
                $ status --check<br>
                [ERROR] CONNECTION TIMED OUT OR REMOTE HOST RESOLUTION FAILED.<br>
                EXECUTE 're-execute' TO RESET CORE.
            </div>
        `;
    });
}
</script>

</body>
</html>
