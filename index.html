<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TWILIGHT LINE // 乗車特訓記録</title>

<style>
/* 共通リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Segoe UI", sans-serif;
    /* 夕陽から夜に沈みゆくグラデーション背景 */
    background: linear-gradient(135deg, #2b1055 0%, #75225b 40%, #b53e4c 75%, #e16b4c 100%);
    color: #f7ebe1; /* 温かみのあるオフホワイト */
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 24px;
    letter-spacing: 0.05em;
}

/* ヘッダー：レトロな駅名標風 */
.station-header {
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding: 0 12px;
    border-bottom: 1px solid rgba(247, 235, 225, 0.2);
    flex-shrink: 0;
}

.brand-title {
    font-size: 20px;
    font-weight: bold;
    color: #f7ebe1;
    display: flex;
    align-items: center;
    gap: 10px;
}

.brand-icon {
    font-size: 24px;
    animation: sway 4s infinite ease-in-out; /* 電車の揺れ */
}

@keyframes sway {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
}

.station-status {
    font-size: 11px;
    background-color: rgba(247, 235, 225, 0.15);
    border-radius: 4px;
    padding: 4px 12px;
    font-weight: bold;
    letter-spacing: 0.1em;
}

/* 2カラムレイアウト */
.train-workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 24px;
    width: 100%;
}

/* 車窓（スモークガラス）をイメージしたコンテナ */
.window-panel {
    flex: 1;
    background: rgba(18, 9, 26, 0.65); /* 濃い紫がかったガラス */
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(247, 235, 225, 0.15);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
    transition: transform 0.3s, border-color 0.3s;
}

.window-panel:hover {
    border-color: rgba(225, 107, 76, 0.5); /* 夕暮れオレンジの微光 */
}

.panel-header {
    background-color: rgba(0, 0, 0, 0.2);
    padding: 16px 24px;
    border-bottom: 1px solid rgba(247, 235, 225, 0.1);
    flex-shrink: 0;
}

.panel-title {
    font-size: 13px;
    font-weight: bold;
    color: #e16b4c; /* 夕陽オレンジ */
    letter-spacing: 0.15em;
    text-transform: uppercase;
}

.panel-body {
    overflow-y: auto;
    flex: 1;
    padding: 24px;
}

/* コントロール（切符売り場風のUI） */
.control-panel {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
    background-color: rgba(247, 235, 225, 0.04);
    border: 1px solid rgba(247, 235, 225, 0.1);
    border-radius: 12px;
    padding: 12px;
}

.filter-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #cbb9ad;
}

/* 落ち着いたスモーキーセレクト */
select {
    padding: 6px 12px;
    font-size: 12px;
    font-family: inherit;
    border: 1px solid rgba(247, 235, 225, 0.2);
    border-radius: 6px;
    background-color: #12091a;
    color: #f7ebe1;
    outline: none;
    cursor: pointer;
}

select:hover {
    border-color: #e16b4c;
}

/* 特急券のような旅情ボタン */
.btn-ticket {
    padding: 6px 16px;
    font-size: 12px;
    font-family: inherit;
    font-weight: bold;
    background-color: rgba(225, 107, 76, 0.2);
    color: #e16b4c;
    border: 1px solid #e16b4c;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s;
}

.btn-ticket:hover {
    background-color: #e16b4c;
    color: #12091a;
    box-shadow: 0 0 15px rgba(225, 107, 76, 0.4);
}

#updateTime {
    font-size: 11px;
    color: #cbb9ad;
    margin-top: 4px;
}

/* タイムテーブル（時刻表）風のリスト */
.train-table {
    width: 100%;
    border-collapse: collapse;
}

.train-table th {
    padding: 12px 8px;
    font-size: 11px;
    color: #cbb9ad;
    text-transform: uppercase;
    text-align: left;
    border-bottom: 1px solid rgba(247, 235, 225, 0.2);
}

.train-table td {
    padding: 16px 8px;
    font-size: 14px;
    border-bottom: 1px solid rgba(247, 235, 225, 0.05);
}

/* 乗車券風ボタン（生徒名） */
.student-btn {
    font-size: 14px;
    font-family: inherit;
    font-weight: bold;
    color: #f7ebe1;
    background: none;
    border: none;
    cursor: pointer;
    text-align: left;
    transition: color 0.3s, transform 0.2s;
}

.student-btn:hover {
    color: #e16b4c;
    transform: translateX(4px);
}

/* 選択行：夕焼けがガラスに反射したような優しいオレンジハイライト */
.row-selected td {
    background-color: rgba(225, 107, 76, 0.08) !important;
    border-bottom-color: rgba(225, 107, 76, 0.4);
}

.row-selected .student-btn {
    color: #e16b4c;
    text-shadow: 0 0 8px rgba(225, 107, 76, 0.3);
}

/* 乗車カウントバッジ */
.ticket-badge {
    background-color: rgba(225, 107, 76, 0.1);
    color: #e16b4c;
    border: 1px solid rgba(225, 107, 76, 0.3);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: bold;
}

/* 右側：古い紙のきっぷ風 履歴 */
.ticket-title {
    font-size: 15px;
    font-weight: bold;
    color: #e16b4c;
    margin-bottom: 20px;
    border-bottom: 1px solid rgba(247, 235, 225, 0.2);
    padding-bottom: 8px;
}

.ticket-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

/* レトロな硬券きっぷ風カード */
.ticket-card {
    background-color: #eeddc5; /* レトロなアイボリー色の硬券 */
    color: #2b1a10; /* インクのようなこげ茶色 */
    border-radius: 4px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
    border-left: 10px solid #c8a27b; /* 切符のパンチ穴代わりの飾りライン */
    box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
}

/* きっぷの改札はさみ穴（パンチ）を疑似的に表現 */
.ticket-card::after {
    content: "";
    position: absolute;
    right: -6px;
    top: 50%;
    transform: translateY(-50%);
    width: 12px;
    height: 12px;
    background-color: #12091a; /* 背後のガラスの色で削り取る */
    border-radius: 50%;
}

.ticket-num {
    font-size: 10px;
    font-weight: bold;
    color: #8c765c;
    letter-spacing: 0.15em;
}

.ticket-main {
    font-size: 14px;
    font-weight: bold;
}

.ticket-date {
    font-size: 11px;
    color: #5c4a3b;
    border-top: 1px dashed rgba(43, 26, 16, 0.2);
    padding-top: 6px;
}

/* 未選択：車窓からの景色 */
.scenery-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #cbb9ad;
    text-align: center;
}

.scenery-icon {
    font-size: 32px;
    margin-bottom: 16px;
    opacity: 0.5;
    animation: sunset-float 6s infinite ease-in-out;
}

@keyframes sunset-float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
}

.scenery-text {
    font-size: 12px;
    line-height: 1.8;
}
</style>

</head>

<body>

<!-- ヘッダー -->
<div class="station-header">
    <div class="brand-title">
        <span class="brand-icon">🚂</span>
        <span>TWILIGHT LINE // 特訓乗車ログ</span>
    </div>
    <div class="station-status">NEXT STATION // FUTURE</div>
</div>

<!-- メインエリア -->
<div class="train-workspace">

    <!-- 左車窓：乗客名簿 -->
    <div class="window-panel">
        <div class="panel-header">
            <div class="panel-title">👥 PASSENGER REGISTRY (乗客名簿)</div>
        </div>
        <div class="panel-body">
            <div class="control-panel">
                <div class="filter-group">
                    <span>時刻表ソート:</span>
                    <select id="sortSelect" onchange="loadSummary()">
                        <option value="count">特訓乗車数の多い順</option>
                        <option value="id">乗客 ID 順</option>
                    </select>
                </div>
                <div>
                    <button class="btn-ticket" onclick="refreshData()">ダイヤ改正 (同期)</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <table class="train-table" id="summaryTable">
                <thead>
                    <tr>
                        <th>乗客識別 ID</th>
                        <th style="text-align: right; width: 120px;">乗車 (特訓) 回数</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JSで展開 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 右車窓：きっぷホルダー -->
    <div class="window-panel">
        <div class="panel-header">
            <div class="panel-title">🎫 TICKET HOLDER (使用済み乗車券)</div>
        </div>
        <div id="historyArea" class="panel-body">
            <!-- 未選択表示 -->
            <div class="scenery-state">
                <div class="scenery-icon">🌇</div>
                <p class="scenery-text">
                    車窓の外には夕焼け空が広がっています。<br>
                    左の乗客IDを選択し、これまでの乗車特訓券（ログ）を取り出してください。
                </p>
            </div>
        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = "改正時刻: " + now.toLocaleTimeString("ja-JP");
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";

        let students = [];
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="student-btn" onclick="showHistory('${student.id}')">
                        🎫 ${student.id}
                    </button>
                </td>
                <td style="text-align: right;">
                    <span class="ticket-badge">${student.count} 回乗車</span>
                </td>
            </tr>
            `;
        });

        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // アクティブ行の切り替え
    document.querySelectorAll('.train-table tbody tr').forEach(tr => tr.classList.remove('row-selected'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('row-selected');
    }

    // ロード表示
    document.getElementById("historyArea").innerHTML = `
        <div class="scenery-state">
            <div class="scenery-icon">🚂</div>
            <p class="scenery-text">カタン、コトン。改札機をとおして履歴を発券しています...</p>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <div class="ticket-title">ROUTE LOGS // ${studentId} の旅路</div>
        <div class="ticket-list">
        `;

        for(let i = 0; i < data.length; i++){
            let date = new Date(data[i].date);
            html += `
            <div class="ticket-card">
                <div class="ticket-num">TICKET NO. 0${i+1}</div>
                <div class="ticket-main">担当車掌：${data[i].teacher} 先生</div>
                <div class="ticket-date">乗車確認：${date.toLocaleString("ja-JP")}</div>
            </div>
            `;
        }

        html += "</div>";
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="scenery-state" style="color: #ff9e9e;">
                <div class="scenery-icon">⚠️</div>
                <p class="scenery-text">通信信号が途絶えました。ダイヤ改正（同期）を実行してください。</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
