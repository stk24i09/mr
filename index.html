<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面接練習回数管理システム</title>

<style>
/* ゼロベースリセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

/* スムーズなスクロールとスクロールバーのカスタマイズ（ダークモード用） */
::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
::-webkit-scrollbar-track {
    background: #0d0e12;
}
::-webkit-scrollbar-thumb {
    background: #2a2d3d;
    border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover {
    background: #3f445e;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-color: #090a0f; /* 深宇宙ブラック */
    color: #e2e8f0; /* 明るいグレー文字 */
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* サイバーなトップバー */
.app-topbar {
    background: rgba(13, 14, 18, 0.8);
    backdrop-filter: blur(12px);
    height: 60px;
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    z-index: 10;
    flex-shrink: 0;
}

.brand-wrapper {
    display: flex;
    align-items: center;
    gap: 12px;
}

.brand-icon {
    width: 24px;
    height: 24px;
    background: linear-gradient(135deg, #6366f1, #3b82f6);
    border-radius: 6px;
    position: relative;
}

/* システム稼働中のグリーンドット */
.live-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #10b981;
    font-weight: 600;
    background-color: rgba(16, 185, 129, 0.1);
    padding: 4px 10px;
    border-radius: 9999px;
    border: 1px solid rgba(16, 185, 129, 0.2);
}

.pulse-dot {
    width: 6px;
    height: 6px;
    background-color: #10b981;
    border-radius: 50%;
    animation: pulse 1.8s infinite;
}

@keyframes pulse {
    0% { transform: scale(0.9); opacity: 0.6; }
    50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 8px #10b981; }
    100% { transform: scale(0.9); opacity: 0.6; }
}

/* メインコンテンツエリア */
.app-container {
    display: flex;
    flex: 1;
    overflow: hidden;
    padding: 24px;
    gap: 24px;
    max-width: 1600px;
    width: 100%;
    margin: 0 auto;
}

/* サイバーカード（パネル） */
.cyber-card {
    flex: 1;
    background-color: #0d0e12;
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.05);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}

.card-top {
    padding: 20px 24px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    background: rgba(13, 14, 18, 0.4);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.card-title-text {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: #94a3b8;
    text-transform: uppercase;
}

.card-main {
    overflow-y: auto;
    flex: 1;
    padding: 24px;
}

/* コントロールエリア */
.control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
}

select {
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 600;
    background-color: #15171f;
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #cbd5e1;
    border-radius: 8px;
    outline: none;
    cursor: pointer;
    transition: all 0.2s;
}

select:hover {
    border-color: rgba(99, 102, 241, 0.5);
}

.cyber-btn {
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 600;
    background: linear-gradient(135deg, #6366f1, #3b82f6);
    color: #ffffff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
}

.cyber-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
}

#updateTime {
    font-size: 11px;
    color: #64748b;
    margin-top: 4px;
    text-align: right;
}

/* リストテーブル */
.cyber-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 8px;
    margin-top: -8px;
}

.cyber-table th {
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 600;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    text-align: left;
    border-bottom: 1px solid rgba(255, 255, 255, 0.03);
}

.cyber-table td {
    padding: 14px 16px;
    background-color: #13151c;
    border-top: 1px solid rgba(255, 255, 255, 0.02);
    border-bottom: 1px solid rgba(255, 255, 255, 0.02);
    transition: all 0.2s;
}

.cyber-table td:first-child {
    border-left: 1px solid rgba(255, 255, 255, 0.02);
    border-top-left-radius: 10px;
    border-bottom-left-radius: 10px;
}

.cyber-table td:last-child {
    border-right: 1px solid rgba(255, 255, 255, 0.02);
    border-top-right-radius: 10px;
    border-bottom-right-radius: 10px;
    text-align: right;
}

/* ホバー時の美しい発光（サイバー感） */
.cyber-table tr:hover td {
    background-color: #181b24;
    border-color: rgba(99, 102, 241, 0.2);
}

.id-text-btn {
    font-size: 14px;
    font-weight: 700;
    color: #e2e8f0;
    background: none;
    border: none;
    cursor: pointer;
    transition: color 0.2s;
    letter-spacing: 0.05em;
}

.id-text-btn:hover {
    color: #38bdf8; /* ライトブルー */
}

/* アクティブ時の光るボーダーエフェクト */
.row-active td {
    background-color: #171926 !important;
    border-color: rgba(99, 102, 241, 0.4) !important;
}

.row-active .id-text-btn {
    color: #6366f1;
}

/* ネオンバッジ */
.neon-badge {
    background: rgba(59, 130, 246, 0.1);
    color: #60a5fa;
    border: 1px solid rgba(59, 130, 246, 0.2);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    display: inline-block;
    box-shadow: 0 0 10px rgba(59, 130, 246, 0.1);
}

.row-active .neon-badge {
    background: rgba(99, 102, 241, 0.2);
    color: #818cf8;
    border-color: rgba(99, 102, 241, 0.4);
    box-shadow: 0 0 12px rgba(99, 102, 241, 0.2);
}

/* 右側：面接履歴のサイバーなグリッド表示 */
.history-title {
    font-size: 15px;
    font-weight: 700;
    color: #f8fafc;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.history-card-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.cyber-history-item {
    background-color: #13151c;
    border: 1px solid rgba(255, 255, 255, 0.03);
    border-radius: 10px;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    overflow: hidden;
}

/* カードの左端に細いアクセントカラーの線を引く */
.cyber-history-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: linear-gradient(to bottom, #6366f1, #3b82f6);
}

.history-info-left {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.history-tag {
    font-size: 10px;
    font-weight: 700;
    color: #6366f1;
    text-transform: uppercase;
    letter-spacing: 0.08em;
}

.history-teacher-name {
    font-size: 14px;
    font-weight: 600;
    color: #e2e8f0;
}

.history-date-stamp {
    font-size: 12px;
    color: #64748b;
    text-align: right;
}

/* プレースホルダー（未選択） */
.cyber-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #475569;
    text-align: center;
}

.cyber-empty-icon {
    font-size: 32px;
    margin-bottom: 12px;
    color: #334155;
    background: #13151c;
    width: 56px;
    height: 56px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255, 255, 255, 0.03);
}

.cyber-empty-text {
    font-size: 13px;
    font-weight: 500;
}
</style>

</head>

<body>

<!-- トップバー -->
<div class="app-topbar">
    <div class="brand-wrapper">
        <div class="brand-icon"></div>
        <span style="font-size: 15px; font-weight: 800; letter-spacing: 0.05em; color: #ffffff;">INTERVIEW CONSOLE</span>
    </div>
    <div class="live-indicator">
        <div class="pulse-dot"></div>
        SYSTEM ACTIVE
    </div>
</div>

<!-- メインエリア -->
<div class="app-container">

    <!-- 左パネル -->
    <div class="cyber-card">
        <div class="card-top">
            <div class="card-title-text">生徒データ一覧</div>
        </div>
        <div class="card-main">
            <div class="control-row">
                <select id="sortSelect" onchange="loadSummary()">
                    <option value="count">面接回数 順</option>
                    <option value="id">生徒ID 順</option>
                </select>
                <div>
                    <button class="cyber-btn" onclick="refreshData()">RELOAD</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <table class="cyber-table" id="summaryTable">
                <thead>
                    <tr>
                        <th>生徒ID</th>
                        <th style="text-align: right;">総面接数</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JSによりデータが展開されます -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 右パネル -->
    <div class="cyber-card">
        <div class="card-top">
            <div class="card-title-text">練習履歴ログ</div>
        </div>
        <div id="historyArea" class="card-main">
            <!-- 未選択時の表示 -->
            <div class="cyber-empty">
                <div class="cyber-empty-icon">📂</div>
                <p class="cyber-empty-text">生徒IDを選択して、詳細ログを展開してください。</p>
            </div>
        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = now.toLocaleTimeString("ja-JP") + " 更新済み";
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";

        let students = [];
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="id-text-btn" onclick="showHistory('${student.id}')">
                        ${student.id}
                    </button>
                </td>
                <td>
                    <span class="neon-badge">${student.count} 回</span>
                </td>
            </tr>
            `;
        });

        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // アクティブ行の切り替え
    document.querySelectorAll('.cyber-table tbody tr').forEach(tr => tr.classList.remove('row-active'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('row-active');
    }

    // ロード表示
    document.getElementById("historyArea").innerHTML = `
        <div class="cyber-empty">
            <div class="cyber-empty-icon">🔄</div>
            <p class="cyber-empty-text">データを受信中...</p>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <h2 class="history-title">
            <span style="color: #6366f1;">●</span> ${studentId} の活動ログ
        </h2>
        <div class="history-card-list">
        `;

        for(let i = 0; i < data.length; i++){
            let date = new Date(data[i].date);
            html += `
            <div class="cyber-history-item">
                <div class="history-info-left">
                    <span class="history-tag">RECORD 0${i+1}</span>
                    <span class="history-teacher-name">面接官: ${data[i].teacher} 先生</span>
                </div>
                <div class="history-date-stamp">
                    ${date.toLocaleString("ja-JP")}
                </div>
            </div>
            `;
        }

        html += "</div>";
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="cyber-empty" style="color: #ef4444;">
                <div class="cyber-empty-icon">⚠️</div>
                <p class="cyber-empty-text">セッションの接続エラーが発生しました。</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
