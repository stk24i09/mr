<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📻 MidNight Lo-Fi Chill // Record Station</title>

<style>
/* 共通リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    /* 丸みのある優しいフォント */
    font-family: "Helvetica Neue", Arial, "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
    background-color: #110f18; /* 深夜の室内を思わせるアッシュブラック */
    background-image: 
        radial-gradient(circle at 80% 20%, rgba(255, 154, 98, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 20% 80%, rgba(167, 139, 250, 0.08) 0%, transparent 50%);
    color: #e2e0e9;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 24px;
    letter-spacing: 0.04em;
}

/* ヘッダー：深夜ラジオのON AIRサイン風 */
.lofi-header {
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding: 0 10px;
    border-bottom: 1.5px dashed rgba(167, 139, 250, 0.2);
    flex-shrink: 0;
}

.brand-title {
    font-size: 18px;
    font-weight: 700;
    color: #ff9a62; /* 暖かいアンバーオレンジ */
    display: flex;
    align-items: center;
    gap: 8px;
    text-shadow: 0 0 10px rgba(255, 154, 98, 0.3);
}

.on-air {
    font-size: 10px;
    background-color: #ef4444;
    color: #ffffff;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: bold;
    letter-spacing: 0.1em;
    animation: pulse 2.5s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
}

/* 2カラムレイアウト */
.lofi-workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 24px;
    width: 100%;
}

/* カフェテーブルをイメージした温かいパネル */
.lofi-panel {
    flex: 1;
    background: rgba(24, 22, 35, 0.75);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(167, 139, 250, 0.15);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}

.panel-header {
    background-color: rgba(167, 139, 250, 0.04);
    padding: 16px 20px;
    border-bottom: 1px solid rgba(167, 139, 250, 0.1);
    font-size: 12px;
    color: #a78bfa;
    font-weight: bold;
    letter-spacing: 0.1em;
}

.panel-body {
    overflow-y: auto;
    flex: 1;
    padding: 20px;
}

/* コントロール（ラジカセのつまみ風） */
.control-panel {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
    background-color: rgba(255, 154, 98, 0.03);
    border: 1px solid rgba(255, 154, 98, 0.1);
    border-radius: 10px;
    padding: 12px;
}

.filter-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #c0bdd3;
}

/* 丸くてマットなセレクトボックス */
select {
    padding: 6px 12px;
    font-size: 12px;
    font-family: inherit;
    border: 1px solid rgba(167, 139, 250, 0.3);
    border-radius: 8px;
    background-color: #181623;
    color: #e2e0e9;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
}

select:hover {
    border-color: #ff9a62;
}

/* チルなカセットレーベル調ボタン */
.btn-chill {
    padding: 6px 14px;
    font-size: 11px;
    font-family: inherit;
    font-weight: bold;
    background-color: rgba(167, 139, 250, 0.1);
    color: #a78bfa;
    border: 1px solid #a78bfa;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
}

.btn-chill:hover {
    background-color: #a78bfa;
    color: #110f18;
    box-shadow: 0 0 12px rgba(167, 139, 250, 0.3);
}

#updateTime {
    font-size: 10px;
    color: #8c88a5;
    margin-top: 4px;
}

/* チルな手書き風テーブル */
.lofi-table {
    width: 100%;
    border-collapse: collapse;
}

.lofi-table th {
    padding: 10px 8px;
    font-size: 11px;
    color: #8c88a5;
    text-align: left;
    border-bottom: 1px solid rgba(167, 139, 250, 0.15);
}

.lofi-table td {
    padding: 14px 8px;
    font-size: 13px;
    border-bottom: 1px solid rgba(167, 139, 250, 0.05);
}

/* 音楽トラックを選択するようなボタン（生徒名） */
.student-btn {
    font-size: 13.5px;
    font-family: inherit;
    font-weight: bold;
    color: #e2e0e9;
    background: none;
    border: none;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: color 0.2s;
}

.student-btn::before {
    content: "♪";
    color: rgba(167, 139, 250, 0.5);
}

.student-btn:hover {
    color: #ff9a62;
}

/* 選択中のトラック：ココアのような温かいカラー */
.row-selected td {
    background-color: rgba(255, 154, 98, 0.05) !important;
    border-bottom-color: rgba(255, 154, 98, 0.3);
}

.row-selected .student-btn {
    color: #ff9a62;
}

.row-selected .student-btn::before {
    content: "▶";
    color: #ff9a62;
    animation: spin-slow 4s infinite linear; /* レコード風 */
}

/* 再生カウント表示 */
.track-badge {
    background-color: rgba(167, 139, 250, 0.08);
    color: #a78bfa;
    border: 1px solid rgba(167, 139, 250, 0.2);
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: bold;
}

/* 右側：カフェのメモ用紙・カセットインデックス風 */
.history-title {
    font-size: 14px;
    font-weight: bold;
    color: #ff9a62;
    margin-bottom: 18px;
    border-bottom: 1px solid rgba(255, 154, 98, 0.2);
    padding-bottom: 8px;
}

.cassette-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
}

/* カセットのインデックスカード風の癒やしデザイン */
.cassette-card {
    background-color: #201e2d;
    border-left: 4px solid #ff9a62;
    border-radius: 6px;
    padding: 14px 16px;
    position: relative;
    box-shadow: 3px 5px 15px rgba(0, 0, 0, 0.2);
}

.cassette-card:hover {
    background-color: #242233;
}

.cassette-side {
    position: absolute;
    top: 14px;
    right: 16px;
    font-size: 10px;
    font-weight: bold;
    color: rgba(167, 139, 250, 0.6);
    background: rgba(167, 139, 250, 0.1);
    padding: 1px 6px;
    border-radius: 3px;
}

.cassette-num {
    font-size: 10px;
    color: #8c88a5;
    margin-bottom: 4px;
}

.cassette-teacher {
    font-size: 13px;
    font-weight: bold;
    color: #e2e0e9;
    margin-bottom: 4px;
}

.cassette-date {
    font-size: 11px;
    color: #8c88a5;
}

/* 未選択：窓辺で眠る猫 */
.chill-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #8c88a5;
    text-align: center;
}

.chill-cat {
    font-size: 44px;
    margin-bottom: 16px;
    animation: cat-breathe 4s infinite ease-in-out;
    transform-origin: bottom center;
}

@keyframes cat-breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05) translateY(-2px); }
}

.chill-text {
    font-size: 12px;
    line-height: 1.8;
}
</style>

</head>

<body>

<!-- ヘッダー -->
<div class="lofi-header">
    <div class="brand-title">
        <span>☕</span>
        <span>MIDNIGHT LO-FI // COGNITIVE LAB</span>
    </div>
    <div class="on-air">CHILLING</div>
</div>

<!-- メインエリア -->
<div class="lofi-workspace">

    <!-- 左パネル：トラック（生徒）選択 -->
    <div class="lofi-panel">
        <div class="panel-header">
            <span>💿 TRACK LIST (生徒名簿)</span>
        </div>
        <div class="panel-body">
            <div class="control-panel">
                <div class="filter-group">
                    <span>再生ソート:</span>
                    <select id="sortSelect" onchange="loadSummary()">
                        <option value="count">特訓回数の多い順</option>
                        <option value="id">生徒 ID 順</option>
                    </select>
                </div>
                <div style="text-align: right;">
                    <button class="btn-chill" onclick="refreshData()">再チューニング</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <table class="lofi-table" id="summaryTable">
                <thead>
                    <tr>
                        <th>生徒識別 ID</th>
                        <th style="text-align: right; width: 100px;">特訓数</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JSで展開 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 右パネル：カセットインデックス（履歴） -->
    <div class="lofi-panel">
        <div class="panel-header">
            <span>📝 CASSETTE INDEX (指導履歴)</span>
        </div>
        <div id="historyArea" class="panel-body">
            <!-- チルな未選択画面 -->
            <div class="chill-state">
                <div class="chill-cat">🐈‍⬛💤</div>
                <p class="chill-text">
                    静かな雨音が聞こえています。<br>
                    左の生徒を選択して、レコード針を落としてください。
                </p>
            </div>
        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = "TUNED: " + now.toLocaleTimeString("ja-JP");
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";

        let students = [];
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="student-btn" onclick="showHistory('${student.id}')">
                        ${student.id}
                    </button>
                </td>
                <td style="text-align: right;">
                    <span class="track-badge">${student.count} tracks</span>
                </td>
            </tr>
            `;
        });

        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // アクティブ行の切り替え
    document.querySelectorAll('.lofi-table tbody tr').forEach(tr => tr.classList.remove('row-selected'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('row-selected');
    }

    // チルなロード表示
    document.getElementById("historyArea").innerHTML = `
        <div class="chill-state">
            <div class="chill-cat" style="animation: cat-breathe 1s infinite ease-in-out;">🎧</div>
            <p class="chill-text">カセットテープを A 面から B 面にひっくり返しています...</p>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <div class="history-title">📻 ARCHIVE SESSIONS // ${studentId}</div>
        <div class="cassette-list">
        `;

        for(let i = 0; i < data.length; i++){
            let date = new Date(data[i].date);
            html += `
            <div class="cassette-card">
                <span class="cassette-side">SIDE B_0${i+1}</span>
                <div class="cassette-num">TRACK NO. 0${i+1}</div>
                <div class="cassette-teacher">SESSION WITH: ${data[i].teacher} 先生</div>
                <div class="cassette-date">RECORDED: ${date.toLocaleString("ja-JP")}</div>
            </div>
            `;
        }

        html += "</div>";
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="chill-state" style="color: #ef4444;">
                <div class="chill-cat">⚠️</div>
                <p class="chill-text">電波が少し乱れたようです。もう一度「再チューニング」を試してみてください。</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
