<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
<title>📱 教員用 指導カルテ App</title>

<style>
/* iOS / iPadOS ネイティブアプリ風リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", "Hiragino Sans", sans-serif;
    background-color: #f2f2f7; /* iOS標準システム背景色 */
    color: #1c1c1e;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
}

/* ナビゲーションバー（アプリのTop Bar） */
.app-navbar {
    height: 60px;
    background-color: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(60, 60, 67, 0.12);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    flex-shrink: 0;
    z-index: 100;
}

.app-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 17px;
    font-weight: 700;
    color: #000000;
}

.app-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, #007aff, #5856d6);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
    font-size: 16px;
    box-shadow: 0 2px 8px rgba(0, 122, 255, 0.3);
}

.sync-button {
    background-color: #e5e5ea;
    color: #007aff;
    border: none;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
}

.sync-button:active {
    background-color: #d1d1d6;
    transform: scale(0.96);
}

/* メインキャンバス（2カラム） */
.app-view {
    display: flex;
    flex: 1;
    overflow: hidden;
    padding: 20px;
    gap: 20px;
}

/* アプリ風カードアイランド */
.app-card {
    flex: 1;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid rgba(60, 60, 67, 0.06);
}

/* セクションヘッダー */
.card-header {
    padding: 16px 20px;
    background-color: #ffffff;
    border-bottom: 1px solid #f2f2f7;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.card-title {
    font-size: 15px;
    font-weight: 700;
    color: #8e8e93;
    text-transform: uppercase;
    letter-spacing: -0.2px;
}

/* アプリ特有の「セグメントコントロール（タブスイッチ）」 */
.segmented-control {
    background-color: #e3e3e8;
    padding: 3px;
    border-radius: 9px;
    display: flex;
    gap: 2px;
}

.segment-btn {
    border: none;
    background: transparent;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    color: #3c3c43;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.2s;
}

.segment-btn.active {
    background: #ffffff;
    color: #000000;
    box-shadow: 0 2px 6px rgba(0,0,0,0.12);
}

.card-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
}

/* 生徒リスト（アプリのセル表示） */
.student-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.student-cell {
    background-color: #f9f9fb;
    border-radius: 14px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
    border: 1.5px solid transparent;
}

.student-cell:hover {
    background-color: #f2f2f7;
}

.student-cell:active {
    transform: scale(0.98);
}

/* 選択中のセル（アプリのハイライト） */
.student-cell.selected {
    background-color: #e8f2ff;
    border-color: #007aff;
}

.student-info {
    display: flex;
    align-items: center;
    gap: 12px;
}

.student-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: #e5e5ea;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
}

.student-cell.selected .student-avatar {
    background: #007aff;
    color: #ffffff;
}

.student-name {
    font-size: 15px;
    font-weight: 700;
    color: #1c1c1e;
}

/* 通知風カウントバッジ */
.badge-pill {
    background-color: #e5e5ea;
    color: #3a3a3c;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 12px;
}

.badge-pill.alert {
    background-color: #ff3b30; /* iOSレッド */
    color: #ffffff;
}

.student-cell.selected .badge-pill:not(.alert) {
    background-color: #007aff;
    color: #ffffff;
}

/* 右側：指導履歴（メッセージスレッド風） */
.history-thread {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.history-bubble {
    background-color: #f2f2f7;
    border-radius: 16px;
    padding: 16px;
    position: relative;
}

.history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
}

.teacher-tag {
    font-size: 14px;
    font-weight: 700;
    color: #007aff;
}

.date-tag {
    font-size: 11px;
    color: #8e8e93;
    font-weight: 500;
}

.history-content {
    font-size: 13px;
    color: #3a3a3c;
    line-height: 1.5;
}

/* 未選択状態（アプリのランディング画面） */
.app-empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #8e8e93;
    text-align: center;
}

.app-empty-icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.8;
}

.app-empty-text {
    font-size: 14px;
    font-weight: 600;
    color: #8e8e93;
}

/* iOS風スライドインローダー */
.spinner {
    width: 24px;
    height: 24px;
    border: 3px solid #e5e5ea;
    border-top-color: #007aff;
    border-radius: 50%;
    animation: spin 0.8s infinite linear;
    margin-bottom: 12px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* スクロールバーの非表示（ネイティブアプリ感の演出） */
::-webkit-scrollbar {
    width: 6px;
}
::-webkit-scrollbar-thumb {
    background: #c7c7cc;
    border-radius: 3px;
}
</style>

</head>

<body>

<!-- iOSアプリ風ナビゲーションバー -->
<div class="app-navbar">
    <div class="app-brand">
        <div class="app-icon">📚</div>
        <span>指導カルテ App</span>
    </div>
    <button class="sync-button" onclick="refreshData()">
        <span>🔄</span> 同期
    </button>
</div>

<!-- メインアプリビュー -->
<div class="app-view">

    <!-- 左カード：生徒リスト -->
    <div class="app-card">
        <div class="card-header">
            <span class="card-title">対象生徒</span>
            <!-- セグメントコントロール（並び替え） -->
            <div class="segmented-control">
                <button class="segment-btn active" id="btnSortCount" onclick="setSort('count')">指導順</button>
                <button class="segment-btn" id="btnSortId" onclick="setSort('id')">ID順</button>
            </div>
        </div>
        <div class="card-body">
            <div class="student-list" id="studentList">
                <!-- JSでアプリ風セルを生成 -->
            </div>
        </div>
    </div>

    <!-- 右カード：詳細カルテ -->
    <div class="app-card">
        <div class="card-header">
            <span class="card-title" id="historyTitle">カルテ詳細</span>
        </div>
        <div class="card-body" id="historyArea">
            <div class="app-empty-state">
                <div class="app-empty-icon">📇</div>
                <div class="app-empty-text">左の生徒をタップして<br>カルテを開いてください</div>
            </div>
        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

let currentSort = 'count';
let rawData = null;

loadSummary();

function refreshData() {
    loadSummary();
}

function setSort(type) {
    currentSort = type;
    document.getElementById('btnSortCount').classList.toggle('active', type === 'count');
    document.getElementById('btnSortId').classList.toggle('active', type === 'id');
    renderSummary();
}

function loadSummary() {
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        rawData = data;
        renderSummary();
    });
}

function renderSummary() {
    if (!rawData) return;
    
    let students = [];
    for (let id in rawData) {
        students.push({ id: id, count: rawData[id] });
    }

    if (currentSort === 'count') {
        students.sort((a, b) => b.count - a.count);
    } else {
        students.sort((a, b) => {
            const numA = parseInt(a.id.match(/\d+$/)[0]);
            const numB = parseInt(b.id.match(/\d+$/)[0]);
            return numA - numB;
        });
    }

    let html = "";
    students.forEach(student => {
        // 5回以上の指導がある場合は赤バッジ
        const isAlert = student.count >= 5;
        const badgeClass = isAlert ? "badge-pill alert" : "badge-pill";

        html += `
        <div class="student-cell" id="cell-${student.id}" onclick="showHistory('${student.id}')">
            <div class="student-info">
                <div class="student-avatar">👤</div>
                <div class="student-name">${student.id}</div>
            </div>
            <div class="${badgeClass}">${student.count} 回</div>
        </div>
        `;
    });

    document.getElementById("studentList").innerHTML = html;
}

function showHistory(studentId) {
    // セル選択のアニメーション
    document.querySelectorAll('.student-cell').forEach(cell => cell.classList.remove('selected'));
    const selectedCell = document.getElementById(`cell-${studentId}`);
    if (selectedCell) selectedCell.classList.add('selected');

    document.getElementById("historyTitle").innerText = `カルテ: ${studentId}`;
    
    // スピナー表示
    document.getElementById("historyArea").innerHTML = `
        <div class="app-empty-state">
            <div class="spinner"></div>
            <div class="app-empty-text">データを同期中...</div>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `<div class="history-thread">`;

        data.forEach((log, index) => {
            let d = new Date(log.date);
            let dateStr = d.toLocaleDateString("ja-JP", { year: 'numeric', month: '2-digit', day: '2-digit' }) + " " + d.toLocaleTimeString("ja-JP", { hour: '2-digit', minute: '2-digit' });

            html += `
            <div class="history-bubble">
                <div class="history-header">
                    <span class="teacher-tag">👨‍🏫 ${log.teacher} 先生</span>
                    <span class="date-tag">${dateStr}</span>
                </div>
                <div class="history-content">
                    個別指導の実施が記録されました。
                </div>
            </div>
            `;
        });

        html += `</div>`;
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="app-empty-state" style="color: #ff3b30;">
                <div class="app-empty-icon">⚠️</div>
                <div class="app-empty-text">通信エラーが発生しました</div>
            </div>
        `;
    });
}
</script>

</body>
</html>
