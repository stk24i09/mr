<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archive / Records</title>

<style>
/* 共通リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    /* 游明朝やセリフ体、クラシックなフォントスタック */
    font-family: "Yu Mincho", "YuMincho", "Hiragino Mincho ProN", "Georgia", serif;
    background-color: #fcfbfa; /* 生成りの紙の白 */
    color: #1c2024; /* 深い炭色 */
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 40px;
    -webkit-font-smoothing: antialiased;
}

/* ヘッダー：書物の標題紙のような美しさ */
.editorial-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding-bottom: 16px;
    border-bottom: 1px solid #1c2024; /* 細い黒の一本線 */
    margin-bottom: 32px;
    flex-shrink: 0;
}

.brand-title {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.1em;
}

.brand-subtitle {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: #706e6b;
    text-transform: uppercase;
}

/* メイン：2カラム */
.editorial-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 40px;
    width: 100%;
}

/* パネル */
.editorial-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
}

.panel-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: #706e6b;
    margin-bottom: 24px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
}

/* 控えめなドットマーク */
.panel-title::before {
    content: "•";
    color: #4a5d4e; /* 静かなオリーブ */
}

.panel-body {
    overflow-y: auto;
    flex: 1;
    padding-right: 12px; /* スクロールバーとの隙間 */
}

/* 操作エリア */
.control-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; /* 操作系はサンセリフ */
}

.filter-label {
    font-size: 12px;
    color: #706e6b;
    letter-spacing: 0.05em;
}

/* 書物の索引のようなクラシック・プルダウン */
select {
    background-color: transparent;
    color: #1c2024;
    border: none;
    border-bottom: 1px solid #c8c6c2;
    padding: 4px 16px 4px 4px;
    font-size: 12px;
    font-family: inherit;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
}

select:focus {
    border-color: #4a5d4e;
}

/* 額縁のようなクラシックボタン */
.btn-editorial {
    background-color: transparent;
    color: #4a5d4e;
    border: 1px solid #4a5d4e;
    padding: 6px 16px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
}

.btn-editorial:hover {
    background-color: #4a5d4e;
    color: #fcfbfa;
}

#updateTime {
    font-size: 10px;
    color: #a19f9c;
    margin-top: 6px;
    text-align: right;
    font-family: -apple-system, sans-serif;
}

/* テーブル（和本や辞典の罫線を意識） */
.editorial-table {
    width: 100%;
    border-collapse: collapse;
}

.editorial-table th {
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 600;
    color: #706e6b;
    letter-spacing: 0.1em;
    text-align: left;
    border-bottom: 1px solid #1c2024;
}

.editorial-table td {
    padding: 16px 12px;
    font-size: 14px;
    border-bottom: 1px solid #e8e6e3;
    transition: all 0.2s;
}

/* リストアイテム */
.item-link {
    background: none;
    border: none;
    color: #1c2024;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    text-align: left;
    width: 100%;
    transition: color 0.15s;
}

.item-link:hover {
    color: #4a5d4e;
}

/* 選択中の行：和紙を重ねたようなごく淡いベージュ */
.row-active td {
    background-color: #f4f2ee !important;
}

.row-active .item-link {
    color: #4a5d4e;
    font-weight: bold;
}

/* カウンター：昔の頁表示のような上品な数字 */
.number-counter {
    font-family: "Georgia", serif;
    font-style: italic;
    font-size: 14px;
    color: #706e6b;
}

.row-active .number-counter {
    color: #4a5d4e;
    font-weight: bold;
}

/* 右側：詳細表示 */
.detail-header-title {
    font-size: 18px;
    font-weight: 500;
    color: #1c2024;
    margin-bottom: 24px;
    letter-spacing: 0.05em;
    line-height: 1.4;
    border-bottom: 1px dashed #c8c6c2;
    padding-bottom: 12px;
}

.record-stack {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

/* 一枚の手紙のようなカード */
.record-card {
    border-left: 2px solid #4a5d4e; /* 本の栞（しおり）のようなライン */
    background-color: #f7f6f3;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.record-main {
    font-size: 13px;
    color: #1c2024;
}

.record-meta {
    font-family: "Georgia", serif;
    font-style: italic;
    font-size: 12px;
    color: #706e6b;
}

/* 未選択時の佇まい */
.empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #706e6b;
    text-align: center;
    padding: 40px;
}

.empty-prompt {
    font-size: 13px;
    line-height: 1.8;
    letter-spacing: 0.05em;
}

/* 繊細なローディング（CSSフェード） */
.classic-loader {
    width: 20px;
    height: 20px;
    border: 1px solid #c8c6c2;
    border-radius: 50%;
    border-top-color: #4a5d4e;
    animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    margin-bottom: 20px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* 上品な細身のスクロールバー */
::-webkit-scrollbar {
    width: 4px;
}
::-webkit-scrollbar-track {
    background: transparent;
}
::-webkit-scrollbar-thumb {
    background: #e8e6e3;
    border-radius: 2px;
}
::-webkit-scrollbar-thumb:hover {
    background: #c8c6c2;
}
</style>

</head>

<body>

<!-- エディトリアルヘッダー -->
<div class="editorial-header">
    <div class="brand-title">ARCHIVE</div>
    <div class="brand-subtitle">Index of Student Registries</div>
</div>

<!-- 2カラム構成 -->
<div class="editorial-layout">

    <!-- 左：目次（Index） -->
    <div class="editorial-panel">
        <div class="panel-title">Index Directory</div>
        <div class="panel-body">
            
            <div class="control-bar">
                <div class="filter-group">
                    <span class="filter-label">Order by:</span>
                    <select id="sortSelect" onchange="loadSummary()">
                        <option value="count">Most active records first</option>
                        <option value="id">Alphabetical identifier</option>
                    </select>
                </div>
                <div>
                    <button class="btn-editorial" onclick="refreshData()">Sync Archive</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <table class="editorial-table" id="summaryTable">
                <thead>
                    <tr>
                        <th style="padding-left: 12px;">Student Identifier</th>
                        <th style="text-align: right; padding-right: 12px; width: 80px;">Logs</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JS展開 -->
                </tbody>
            </table>

        </div>
    </div>

    <!-- 右：詳細（Details） -->
    <div class="editorial-panel">
        <div class="panel-title">Record Details</div>
        <div id="historyArea" class="panel-body">
            
            <!-- 初期状態 -->
            <div class="empty-state">
                <p class="empty-prompt">
                    Please select an identifier from the catalog on the left<br>
                    to reveal the corresponding historical ledger entries.
                </p>
            </div>

        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = "Last synchronized: " + now.toLocaleTimeString("en-US", {hour12: false});
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";
        let students = [];
        
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="item-link" onclick="showHistory('${student.id}')">
                        ${student.id}
                    </button>
                </td>
                <td style="text-align: right; padding-right: 12px;">
                    <span class="number-counter">${student.count}</span>
                </td>
            </tr>
            `;
        });

        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // 行ハイライトの変更
    document.querySelectorAll('.editorial-table tbody tr').forEach(tr => tr.classList.remove('row-active'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('row-active');
    }

    // ロード中表示
    document.getElementById("historyArea").innerHTML = `
        <div class="empty-state">
            <div class="classic-loader"></div>
            <p class="empty-prompt">Retrieving archives for ${studentId}...</p>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <div class="detail-header-title">${studentId} — Registry Stream</div>
        <div class="record-stack">
        `;

        for(let i = 0; i < data.length; i++){
            let d = new Date(data[i].date);
            let dateStr = d.toLocaleDateString("en-US", { year: 'numeric', month: 'short', day: 'numeric' }) + " " + d.toLocaleTimeString("en-US", { hour: '2-digit', minute: '2-digit', hour12: false });

            html += `
            <div class="record-card">
                <div class="record-main">
                    Logged by Instructor: <strong>${data[i].teacher}</strong>
                </div>
                <div class="record-meta">
                    ${dateStr}
                </div>
            </div>
            `;
        }

        html += "</div>";
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="empty-state" style="color: #c94a4a;">
                <p class="empty-prompt">Failed to decrypt archive. Please check the network bridge.</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
