<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>面接練習回数一覧</title>

<style>

body{
    font-family:sans-serif;
    padding:20px;
}

table{
    border-collapse:collapse;
}

th,td{
    border:1px solid #000;
    padding:8px;
}

th{
    background:#eeeeee;
}

</style>

</head>

<body>

<h2>面接練習回数一覧</h2>

<table id="table">

<tr>
<th>生徒ID</th>
<th>面接回数</th>
</tr>

</table>

<script>

google.script.run
.withSuccessHandler(function(data){

    let html =
    "<tr><th>生徒ID</th><th>面接回数</th></tr>";

    for(let id in data){

        html +=
        "<tr>" +
        "<td>" + id + "</td>" +
        "<td>" + data[id] + "</td>" +
        "</tr>";

    }

    document.getElementById("table").innerHTML =
    html;

})
.getSummary();

</script>

</body>
</html>
