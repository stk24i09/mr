<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOTANICAL // ECO-SYSTEM LOG v2.4</title>

<style>
/* 共通リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", sans-serif;
    /* 夜の温室をイメージした、深紫と深い緑のグラデーション背景 */
    background: radial-gradient(circle at top left, #0e1e12 0%, #06040a 60%), radial-gradient(circle at bottom right, #130a1c 0%, #06040a 100%);
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 24px;
    letter-spacing: 0.06em;
}

/* ヘッダー：ラボのモニタリングパネル風 */
.bio-header {
    border-bottom: 1px solid rgba(16, 185, 129, 0.2);
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-shrink: 0;
}

.brand-title {
    font-size: 16px;
    font-weight: bold;
    color: #10b981; /* ネオングリーン */
    text-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
    display: flex;
    align-items: center;
    gap: 8px;
}

.brand-icon {
    font-size: 20px;
    animation: pulse 3s infinite ease-in-out;
}

@keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.1); opacity: 1; }
}

.system-status {
    font-size: 11px;
    background-color: rgba(16, 185, 129, 0.1);
    color: #34d399;
    border: 1px solid rgba(16, 185, 129, 0.3);
    padding: 4px 10px;
    border-radius: 20px;
    text-transform: uppercase;
}

/* 2カラムレイアウト */
.bio-workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 24px;
    width: 100%;
}

/* ガラス製温室のような半透明カード */
.glass-panel {
    flex: 1;
    background: rgba(15, 11, 25, 0.45);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
    transition: border-color 0.4s;
}

.glass-panel:hover {
    border-color: rgba(16, 185, 129, 0.3);
}

.panel-header {
    padding: 20px 24px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.panel-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: #94a3b8;
    text-transform: uppercase;
}

.panel-body {
    overflow-y: auto;
    flex: 1;
    padding: 24px;
}

/* コントロール（培養コントロール風） */
.control-panel {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
    background-color: rgba(255, 255, 255, 0.02);
    border-radius: 12px;
    padding: 12px 16px;
    border: 1px solid rgba(255, 255, 255, 0.04);
}

.filter-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #94a3b8;
}

/* ネオンがかかったダークセレクト */
select {
    padding: 6px 12px;
    font-size: 12px;
    font-family: inherit;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    background-color: #0b0713;
    color: #e2e8f0;
    outline: none;
    cursor: pointer;
    transition: all 0.3s;
}

select:hover {
    border-color: #10b981;
    box-shadow: 0 0 8px rgba(16, 185, 129, 0.2);
}

/* バイオ栽培ボタン */
.btn-bio {
    padding: 6px 16px;
    font-size: 12px;
    font-family: inherit;
    font-weight: bold;
    background-color: rgba(16, 185, 129, 0.15);
    color: #10b981;
    border: 1px solid #10b981;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn-bio:hover {
    background-color: #10b981;
    color: #06040a;
    box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
}

#updateTime {
    font-size: 11px;
    color: #64748b;
    margin-top: 4px;
}

/* 培養インデックスリスト */
.bio-table {
    width: 100%;
    border-collapse: collapse;
}

.bio-table th {
    padding: 12px 8px;
    font-size: 11px;
    color: #64748b;
    text-transform: uppercase;
    text-align: left;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.bio-table td {
    padding: 16px 8px;
    font-size: 13px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.03);
}

/* 生徒ボタン */
.student-btn {
    font-size: 13px;
    font-family: inherit;
    font-weight: bold;
    color: #e2e8f0;
    background: none;
    border: none;
    cursor: pointer;
    text-align: left;
    transition: color 0.3s;
}

.student-btn:hover {
    color: #10b981;
}

/* 選択行：優雅なグリーンのグラデーション */
.row-selected td {
    background-color: rgba(16, 185, 129, 0.06) !important;
    border-bottom-color: rgba(16, 185, 129, 0.3);
}

.row-selected .student-btn {
    color: #10b981;
}

/* 成長度（回数）を示すバイオバッジ */
.grow-badge {
    background-color: rgba(16, 185, 129, 0.08);
    color: #34d399;
    border: 1px solid rgba(16, 185, 129, 0.2);
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: bold;
}

/* 右側：培養データ詳細 */
.specimen-title {
    font-size: 15px;
    font-weight: bold;
    color: #10b981;
    margin-bottom: 16px;
    border-left: 3px solid #10b981;
    padding-left: 10px;
}

.log-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.log-card {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: border-color 0.3s;
}

.log-card:hover {
    border-color: rgba(255, 255, 255, 0.15);
}

.log-num {
    font-size: 10px;
    color: #64748b;
    letter-spacing: 0.1em;
}

.log-detail {
    font-size: 13px;
    color: #cbd5e1;
}

.log-highlight {
    color: #10b981;
}

/* プレースホルダー */
.empty-glass {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #64748b;
    text-align: center;
}

.empty-icon {
    font-size: 32px;
    color: #10b981;
    opacity: 0.3;
    margin-bottom: 16px;
    animation: float 4s infinite ease-in-out;
}

@keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
}

.empty-text {
    font-size: 12px;
    line-height: 1.8;
}
</style>

</head>

<body>

<!-- ヘッダー -->
<div class="bio-header">
    <div class="brand-title">
        <span class="brand-icon">🌱</span>
        <span>MEISETSU // BIO-CONSOLE</span>
    </div>
    <div class="system-status">SYS_ECO: SECURE</div>
</div>

<!-- メインエリア -->
<div class="bio-workspace">

    <!-- 左ガラスパネル -->
    <div class="glass-panel">
        <div class="panel-header">
            <div class="panel-title">SPECIMEN LIST</div>
        </div>
        <div class="panel-body">
            <div class="control-panel">
                <div class="filter-group">
                    <span>SORT:</span>
                    <select id="sortSelect" onchange="loadSummary()">
                        <option value="count">GROWTH_RATE (DESC)</option>
                        <option value="id">SPECIMEN_ID (ASC)</option>
                    </select>
                </div>
                <div>
                    <button class="btn-bio" onclick="refreshData()">RE-SCAN</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <table class="bio-table" id="summaryTable">
                <thead>
                    <tr>
                        <th>NAME (ID)</th>
                        <th style="text-align: right; width: 120px;">GROWTH (TIMES)</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JSで展開 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 右ガラスパネル -->
    <div class="glass-panel">
        <div class="panel-header">
            <div class="panel-title">CHRONO-DATABASE</div>
        </div>
        <div id="historyArea" class="panel-body">
            <!-- 未選択表示 -->
            <div class="empty-glass">
                <div class="empty-icon">🍀</div>
                <p class="empty-text">
                    ポッドが休止状態にあります。<br>
                    左の検体を選択して、これまでの培養データを復元してください。
                </p>
            </div>
        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = "SCAN: " + now.toLocaleTimeString("ja-JP");
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";

        let students = [];
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="student-btn" onclick="showHistory('${student.id}')">
                        🟢 ${student.id}
                    </button>
                </td>
                <td style="text-align: right;">
                    <span class="grow-badge">${student.count} G_LEVEL</span>
                </td>
            </tr>
            `;
        });

        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // アクティブ行の切り替え
    document.querySelectorAll('.bio-table tbody tr').forEach(tr => tr.classList.remove('row-selected'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('row-selected');
    }

    // ロード表示
    document.getElementById("historyArea").innerHTML = `
        <div class="empty-glass">
            <div class="empty-icon" style="animation: none;">🧬</div>
            <p class="empty-text">波長を同調中。データをシーケンス化しています...</p>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <div class="specimen-title">RECORD FOR [ ${studentId} ]</div>
        <div class="log-list">
        `;

        for(let i = 0; i < data.length; i++){
            let date = new Date(data[i].date);
            html += `
            <div class="log-card">
                <div class="log-num">SEQUENCE // 0${i+1}</div>
                <div class="log-detail">
                    SUPERVISOR: <span class="log-highlight">${data[i].teacher}</span> 先生<br>
                    TIMESTAMP: ${date.toLocaleString("ja-JP")}
                </div>
            </div>
            `;
        }

        html += "</div>";
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="empty-glass" style="color: #ef4444;">
                <div class="empty-icon">⚠️</div>
                <p class="empty-text">バイオ通信エラー。シグナルが遮断されました。再スキャンしてください。</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
