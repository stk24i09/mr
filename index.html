<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE ARCHIVE // 蔵書と特訓の記録</title>

<style>
/* 共通リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    /* 格式高い明朝・セリフ体 */
    font-family: "Georgia", "Times New Roman", "YuMincho", "游明朝", serif;
    background-color: #1a120b; /* 重厚な書斎の闇 */
    /* 羊皮紙や古い洋紙のような、かすれたテクスチャ風の背景グラデーション */
    background-image: radial-gradient(rgba(139, 90, 43, 0.15) 1px, transparent 0), radial-gradient(rgba(139, 90, 43, 0.1) 2px, transparent 0);
    background-size: 32px 32px;
    background-position: 0 0, 16px 16px;
    color: #eed6b3; /* 落ち着いたゴールドベージュ */
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 24px;
    letter-spacing: 0.08em;
}

/* ヘッダー：ヴィンテージな図書館のネームプレート風 */
.archive-header {
    border-bottom: 2px solid #b38b4d; /* 鈍く輝く真鍮カラー */
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 8px;
    flex-shrink: 0;
}

.brand-title {
    font-size: 20px;
    font-weight: bold;
    color: #e5c185;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    display: flex;
    align-items: center;
    gap: 12px;
}

.brand-icon {
    font-size: 24px;
}

.app-badge {
    font-size: 11px;
    border: 1px solid #b38b4d;
    color: #b38b4d;
    padding: 2px 12px;
    border-radius: 2px;
    text-transform: uppercase;
    font-weight: bold;
}

/* 2カラムレイアウト */
.archive-workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 24px;
    width: 100%;
}

/* 古い本棚・キャビネット風の木製パネル */
.cabinet-panel {
    flex: 1;
    background-color: #271a10; /* 深いマホガニーブラウン */
    border: 1px solid rgba(179, 139, 77, 0.3);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6), inset 0 0 15px rgba(0, 0, 0, 0.5);
}

.panel-header {
    padding: 16px 24px;
    border-bottom: 1px solid rgba(179, 139, 77, 0.2);
    flex-shrink: 0;
    background-color: #1f140d;
}

.panel-title {
    font-size: 13px;
    font-weight: bold;
    color: #e5c185;
    letter-spacing: 0.15em;
}

.panel-body {
    overflow-y: auto;
    flex: 1;
    padding: 24px;
}

/* コントロール（真鍮の調整ツマミ風） */
.control-panel {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
    background-color: #1a100a;
    border: 1px solid rgba(179, 139, 77, 0.15);
    padding: 12px;
}

.filter-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #a08060;
}

/* アンティーク調セレクト */
select {
    padding: 6px 10px;
    font-size: 12px;
    font-family: inherit;
    border: 1px solid #b38b4d;
    border-radius: 2px;
    background-color: #271a10;
    color: #eed6b3;
    outline: none;
    cursor: pointer;
}

select:hover {
    background-color: #352417;
}

/* 押し込み式インクスタンプ調ボタン */
.btn-brass {
    padding: 6px 14px;
    font-size: 12px;
    font-family: inherit;
    font-weight: bold;
    background-color: transparent;
    color: #e5c185;
    border: 1px solid #b38b4d;
    cursor: pointer;
    box-shadow: inset 0 0 5px rgba(179, 139, 77, 0.3);
    transition: all 0.3s;
}

.btn-brass:hover {
    background-color: #e5c185;
    color: #1a120b;
    box-shadow: 0 0 10px rgba(229, 193, 133, 0.3);
}

#updateTime {
    font-size: 11px;
    color: #8c6e51;
    margin-top: 4px;
    font-style: italic;
}

/* 図書館の蔵書目録風テーブル */
.archive-table {
    width: 100%;
    border-collapse: collapse;
}

.archive-table th {
    padding: 10px 8px;
    font-size: 11px;
    color: #a08060;
    text-transform: uppercase;
    text-align: left;
    border-bottom: 2px solid #b38b4d;
}

.archive-table td {
    padding: 14px 8px;
    font-size: 14px;
    border-bottom: 1px dashed rgba(179, 139, 77, 0.2);
}

/* 蔵書インデックス（生徒ID）リンク */
.student-btn {
    font-size: 14px;
    font-family: inherit;
    font-weight: bold;
    color: #eed6b3;
    background: none;
    border: none;
    cursor: pointer;
    text-align: left;
    transition: color 0.3s, transform 0.2s;
}

.student-btn:hover {
    color: #e5c185;
    transform: translateX(3px);
}

/* 選択行：古いセピア紙が優しく光るような演出 */
.row-selected td {
    background-color: rgba(179, 139, 77, 0.1) !important;
    border-bottom-color: #b38b4d;
}

.row-selected .student-btn {
    color: #e5c185;
    text-shadow: 0 0 5px rgba(229, 193, 133, 0.4);
}

/* 貸出回数バッジ（真鍮プレート風） */
.count-badge {
    border: 1px solid rgba(179, 139, 77, 0.5);
    background-color: #1f140d;
    color: #e5c185;
    padding: 2px 8px;
    border-radius: 2px;
    font-size: 11px;
    font-weight: bold;
    box-shadow: 1px 1px 3px rgba(0,0,0,0.5);
}

/* 右側：貸出カード風（特訓ログ） */
.card-sheet-title {
    font-size: 16px;
    font-weight: bold;
    color: #e5c185;
    margin-bottom: 20px;
    border-bottom: 1px solid #b38b4d;
    padding-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.card-sheet-stamp {
    font-size: 11px;
    color: #a08060;
    border: 1px dashed #a08060;
    padding: 1px 6px;
}

.log-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

/* 古びた図書カード風コンテナ */
.log-card {
    background-color: #eed6b3; /* 羊皮紙のベージュ */
    color: #271a10; /* 文字はインクの焦げ茶 */
    border-radius: 2px;
    padding: 16px;
    box-shadow: 3px 3px 12px rgba(0,0,0,0.4);
    position: relative;
    border-left: 6px solid #b38b4d; /* 貸出カードのインデックススタンプを表現 */
}

.log-card::before {
    content: "APPROVED";
    position: absolute;
    right: 16px;
    bottom: 8px;
    font-size: 11px;
    font-weight: 900;
    color: rgba(139, 90, 43, 0.15); /* うっすらとした承認印 */
    border: 2px solid rgba(139, 90, 43, 0.15);
    padding: 2px 6px;
    transform: rotate(-8deg);
}

.log-num {
    font-size: 10px;
    font-weight: bold;
    color: #8c6e51;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
}

.log-teacher {
    font-size: 14px;
    font-weight: bold;
    margin-bottom: 4px;
}

.log-date {
    font-size: 11px;
    color: #5c4331;
}

/* 未選択：暗がりの中のキャンドルと古書 */
.empty-library {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #8c6e51;
    text-align: center;
}

.empty-icon {
    font-size: 32px;
    color: #b38b4d;
    margin-bottom: 16px;
    opacity: 0.6;
}

.empty-text {
    font-size: 12px;
    line-height: 1.8;
}
</style>

</head>

<body>

<!-- ヘッダー -->
<div class="archive-header">
    <div class="brand-title">
        <span class="brand-icon">📜</span>
        <span>THE ARCHIVE / 面接特訓目録</span>
    </div>
    <div class="app-badge">Classics v1.0</div>
</div>

<!-- メインエリア -->
<div class="archive-workspace">

    <!-- 左キャビネット：生徒名簿 -->
    <div class="cabinet-panel">
        <div class="panel-header">
            <div class="panel-title">📚 蔵書目録 (生徒索引)</div>
        </div>
        <div class="panel-body">
            <div class="control-panel">
                <div class="filter-group">
                    <span>並び替え:</span>
                    <select id="sortSelect" onchange="loadSummary()">
                        <option value="count">特訓回数の多い順</option>
                        <option value="id">名簿 ID 順</option>
                    </select>
                </div>
                <div>
                    <button class="btn-brass" onclick="refreshData()">図書整理 (同期)</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <table class="archive-table" id="summaryTable">
                <thead>
                    <tr>
                        <th>生徒識別番号</th>
                        <th style="text-align: right; width: 120px;">貸出 (特訓) 回数</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JSで展開 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 右キャビネット：貸出記録 -->
    <div class="cabinet-panel">
        <div class="panel-header">
            <div class="panel-title">📖 貸出記録簿</div>
        </div>
        <div id="historyArea" class="panel-body">
            <!-- 未選択表示 -->
            <div class="empty-library">
                <div class="empty-icon">🕯️</div>
                <p class="empty-text">
                    書棚は静かに閉じられています。<br>
                    左の識別番号を選択すると、過去の貸出（特訓）カードが引き出されます。
                </p>
            </div>
        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = "整理時刻: " + now.toLocaleTimeString("ja-JP");
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";

        let students = [];
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="student-btn" onclick="showHistory('${student.id}')">
                        ✒️ ${student.id}
                    </button>
                </td>
                <td style="text-align: right;">
                    <span class="count-badge">${student.count} 回</span>
                </td>
            </tr>
            `;
        });

        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // アクティブ行の切り替え
    document.querySelectorAll('.archive-table tbody tr').forEach(tr => tr.classList.remove('row-selected'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('row-selected');
    }

    // ロード表示
    document.getElementById("historyArea").innerHTML = `
        <div class="empty-library">
            <div class="empty-icon">⏳</div>
            <p class="empty-text">奥の書架から、該当する貸出カードを運んでいます...</p>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <div class="card-sheet-title">
            <span>REGISTRY: ${studentId}</span>
            <span class="card-sheet-stamp">ARCHIVED</span>
        </div>
        <div class="log-list">
        `;

        for(let i = 0; i < data.length; i++){
            let date = new Date(data[i].date);
            html += `
            <div class="log-card">
                <div class="log-num">ENTRY NO. 0${i+1}</div>
                <div class="log-teacher">指導司書：${data[i].teacher} 先生</div>
                <div class="log-date">調製日時：${date.toLocaleString("ja-JP")}</div>
            </div>
            `;
        }

        html += "</div>";
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="empty-library" style="color: #c97a7a;">
                <div class="empty-icon">⚠️</div>
                <p class="empty-text">インデックスの復元に失敗しました。書物整理（同期）をもう一度実行してください。</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
