<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面接練習データ管理 - LAB EDITION</title>

<style>
/* 共通リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
    /* 深い宇宙空間のようなダークグラデーション */
    background: radial-gradient(circle at 50% 50%, #0d111c 0%, #05070c 100%);
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 24px;
    position: relative;
}

/* 背景のSF調極細グリッド */
body::after {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: 
        linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
    background-size: 30px 30px;
    z-index: 1;
    pointer-events: none;
}

/* ヘッダー：極薄のフローティングバー */
.app-header {
    z-index: 2;
    background: rgba(13, 17, 28, 0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    height: 56px;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    border-radius: 12px;
    flex-shrink: 0;
}

.brand-title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.25em;
    color: #38bdf8; /* フューチャーブルー */
    text-transform: uppercase;
}

.app-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: rgba(255, 255, 255, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.15);
    padding: 4px 12px;
    border-radius: 6px;
}

/* 2カラムレイアウト */
.app-content {
    z-index: 2;
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 24px;
    width: 100%;
}

/* 磨りガラス調のフューチャリスティック・カード */
.glass-card {
    flex: 1;
    background: rgba(13, 17, 28, 0.45);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 16px;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
    transition: border-color 0.3s;
}

.glass-card:hover {
    border-color: rgba(56, 189, 248, 0.2); /* ほのかに青く光る */
}

.card-header {
    padding: 20px 24px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    flex-shrink: 0;
}

.card-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: rgba(255, 255, 255, 0.7);
    text-transform: uppercase;
}

.card-body {
    overflow-y: auto;
    flex: 1;
    padding: 24px;
}

/* コントロール */
.control-panel {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
}

.filter-group {
    display: flex;
    align-items: center;
    gap: 12px;
}

.filter-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: rgba(255, 255, 255, 0.4);
}

/* スマートなセレクト＆ボタン */
select {
    padding: 8px 16px;
    font-size: 11px;
    letter-spacing: 0.05em;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    background-color: rgba(13, 17, 28, 0.8);
    color: rgba(255, 255, 255, 0.8);
    outline: none;
    cursor: pointer;
    transition: all 0.2s;
}

select:hover {
    border-color: rgba(56, 189, 248, 0.4);
}

.btn-lab {
    padding: 8px 16px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    background-color: rgba(56, 189, 248, 0.1);
    color: #38bdf8;
    border: 1px solid rgba(56, 189, 248, 0.3);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
}

.btn-lab:hover {
    background-color: rgba(56, 189, 248, 0.2);
    box-shadow: 0 0 12px rgba(56, 189, 248, 0.3);
}

#updateTime {
    font-size: 10px;
    color: rgba(255, 255, 255, 0.3);
    margin-top: 6px;
    text-align: right;
    letter-spacing: 0.05em;
}

/* ミニマル・テーブル */
.lab-table {
    width: 100%;
    border-collapse: collapse;
}

.lab-table th {
    padding: 12px;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: rgba(255, 255, 255, 0.4);
    text-align: left;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.lab-table td {
    padding: 16px 12px;
    font-size: 13px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.03);
}

/* 生徒IDリンク */
.student-btn {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    color: #38bdf8;
    background: none;
    border: none;
    cursor: pointer;
    transition: color 0.2s;
}

.student-btn:hover {
    color: #7dd3fc;
    text-shadow: 0 0 8px rgba(56, 189, 248, 0.5);
}

/* 選択行のネオンフィードバック */
.row-selected td {
    background-color: rgba(56, 189, 248, 0.04) !important;
    border-bottom-color: rgba(56, 189, 248, 0.2);
}

/* カウント表示：小さなカプセル型 */
.lab-badge {
    background-color: rgba(56, 189, 248, 0.05);
    color: #38bdf8;
    border: 1px solid rgba(56, 189, 248, 0.2);
    padding: 2px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
}

/* 右側：特訓ログリスト */
.log-header {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.1em;
    margin-bottom: 24px;
    color: #e2e8f0;
}

.log-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.log-card {
    background-color: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 8px;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.2s;
}

.log-card:hover {
    background-color: rgba(255, 255, 255, 0.04);
}

.log-num {
    font-size: 10px;
    color: rgba(255, 255, 255, 0.3);
    letter-spacing: 0.1em;
    margin-bottom: 4px;
}

.log-teacher {
    font-size: 13px;
    font-weight: 500;
}

.log-date {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.4);
}

/* 静かな未選択プレースホルダー */
.empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: rgba(255, 255, 255, 0.25);
    text-align: center;
}

.empty-icon {
    font-size: 24px;
    margin-bottom: 12px;
    color: rgba(56, 189, 248, 0.4);
}

.empty-text {
    font-size: 11px;
    letter-spacing: 0.1em;
}
</style>

</head>

<body>

<!-- ヘッダー -->
<div class="app-header">
    <div class="brand-title">SYSTEM // ANALYTICS</div>
    <span class="app-badge">SECURE CONSOLE</span>
</div>

<!-- メインエリア -->
<div class="app-content">

    <!-- 左パネル -->
    <div class="glass-card">
        <div class="card-header">
            <div class="card-title">STUDENTS INDEX</div>
        </div>
        <div class="card-body">
            <div class="control-panel">
                <div class="filter-group">
                    <span class="filter-label">SORT</span>
                    <select id="sortSelect" onchange="loadSummary()">
                        <option value="count">PRACTICE COUNT</option>
                        <option value="id">STUDENT ID</option>
                    </select>
                </div>
                <div>
                    <button class="btn-lab" onclick="refreshData()">SYNC</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <table class="lab-table" id="summaryTable">
                <thead>
                    <tr>
                        <th>STUDENT ID</th>
                        <th style="text-align: right; width: 120px;">RECORDED</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JSで展開 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 右パネル -->
    <div class="glass-card">
        <div class="card-header">
            <div class="card-title">DATA STREAM</div>
        </div>
        <div id="historyArea" class="card-body">
            <!-- 未選択時の表示 -->
            <div class="empty-state">
                <div class="empty-icon">☉</div>
                <p class="empty-text">SELECT STUDENT PROFILE TO STREAM LOGS</p>
            </div>
        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = "LAST SYNC: " + now.toLocaleTimeString("ja-JP");
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";

        let students = [];
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="student-btn" onclick="showHistory('${student.id}')">
                        ${student.id}
                    </button>
                </td>
                <td style="text-align: right;">
                    <span class="lab-badge">${student.count} SESSIONS</span>
                </td>
            </tr>
            `;
        });

        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // アクティブ行の切り替え
    document.querySelectorAll('.lab-table tbody tr').forEach(tr => tr.classList.remove('row-selected'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('row-selected');
    }

    // ロード表示
    document.getElementById("historyArea").innerHTML = `
        <div class="empty-state">
            <div class="empty-icon">◌</div>
            <p class="empty-text">ESTABLISHING STREAM FOR ${studentId} ...</p>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <div class="log-header">
            <span>// PROFILE: ${studentId}</span>
        </div>
        <div class="log-list">
        `;

        for(let i = 0; i < data.length; i++){
            let date = new Date(data[i].date);
            html += `
            <div class="log-card">
                <div>
                    <div class="log-num">SESSION 0${i+1}</div>
                    <div class="log-teacher">CONDUCTED BY: ${data[i].teacher} SENSEI</div>
                </div>
                <div class="log-date">${date.toLocaleString("ja-JP")}</div>
            </div>
            `;
        }

        html += "</div>";
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="empty-state" style="color: #ef4444;">
                <div class="empty-icon">▲</div>
                <p class="empty-text">STREAMING INTERRUPTED. SYSTEM OFFLINE.</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
