<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面接管理ウィザード v1.0</title>

<style>
/* 共通リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: "Tahoma", "MS Sans Serif", "Arial", "Hiragino Kaku Gothic ProN", sans-serif;
    background-color: #008080; /* あの伝説のデスクトップ・グリーンティール */
    color: #000000;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 16px;
}

/* ヘッダー：タスクバー風 */
.task-bar {
    background-color: #c0c0c0;
    border-top: 2px solid #fff;
    border-left: 2px solid #fff;
    border-right: 2px solid #808080;
    border-bottom: 2px solid #808080;
    height: 46px;
    padding: 0 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-shrink: 0;
}

.start-button {
    font-size: 13px;
    font-weight: bold;
    background-color: #c0c0c0;
    border-top: 2px solid #fff;
    border-left: 2px solid #fff;
    border-right: 2px solid #000;
    border-bottom: 2px solid #000;
    box-shadow: inset 1px 1px 0px #dfdfdf;
    padding: 4px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
}

.start-button:active {
    border-top: 2px solid #000;
    border-left: 2px solid #000;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
    padding: 5px 9px 3px 11px;
}

.start-icon {
    font-size: 16px;
}

.system-clock {
    font-size: 12px;
    border-top: 2px solid #808080;
    border-left: 2px solid #808080;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
    padding: 4px 12px;
    background-color: #c0c0c0;
}

/* 2カラムレイアウト */
.desktop-workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 16px;
    width: 100%;
}

/* クラシック・OS・ウィンドウ */
.win95-window {
    flex: 1;
    background-color: #c0c0c0;
    border-top: 2px solid #fff;
    border-left: 2px solid #fff;
    border-right: 2px solid #000;
    border-bottom: 2px solid #000;
    box-shadow: inset 1px 1px 0px #dfdfdf, inset -1px -1px 0px #808080;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
    padding: 3px;
}

/* アクティブなタイトルバー */
.window-title-bar {
    background: linear-gradient(90deg, #000080, #1084d0); /* あの美しいブルーグラデーション */
    color: #ffffff;
    padding: 4px 8px;
    font-size: 12px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
}

.title-text {
    display: flex;
    align-items: center;
    gap: 6px;
}

.window-controls {
    display: flex;
    gap: 2px;
}

.win-btn {
    width: 16px;
    height: 14px;
    background-color: #c0c0c0;
    border-top: 1px solid #fff;
    border-left: 1px solid #fff;
    border-right: 1px solid #000;
    border-bottom: 1px solid #000;
    font-size: 9px;
    font-weight: bold;
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: default;
}

.win-btn:active {
    border-top: 1px solid #000;
    border-left: 1px solid #000;
    border-right: 1px solid #fff;
    border-bottom: 1px solid #fff;
}

/* ウィンドウ内コンテンツ */
.window-body {
    background-color: #ffffff; /* 中身は真っ白 */
    border-top: 2px solid #808080;
    border-left: 2px solid #808080;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
    margin: 4px;
    overflow-y: auto;
    flex: 1;
    padding: 16px;
}

/* コントロール（クラシックダイアログ調） */
.control-panel {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 16px;
    background-color: #c0c0c0;
    border: 2px solid #808080;
    padding: 8px;
}

.filter-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
}

/* 凹んだセレクトボックス */
select {
    padding: 3px 6px;
    font-size: 12px;
    font-family: inherit;
    border-top: 2px solid #808080;
    border-left: 2px solid #808080;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
    background-color: #ffffff;
    color: #000000;
    outline: none;
    cursor: pointer;
}

/* 3D押しボタン */
.btn-win95 {
    padding: 4px 14px;
    font-size: 12px;
    font-family: inherit;
    background-color: #c0c0c0;
    border-top: 2px solid #fff;
    border-left: 2px solid #fff;
    border-right: 2px solid #000;
    border-bottom: 2px solid #000;
    cursor: pointer;
}

.btn-win95:active {
    border-top: 2px solid #000;
    border-left: 2px solid #000;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
    padding: 5px 13px 3px 15px;
}

#updateTime {
    font-size: 11px;
    color: #555;
    margin-top: 4px;
}

/* クラシックOSのリストビューテーブル */
.win-table {
    width: 100%;
    border-collapse: collapse;
}

.win-table th {
    padding: 6px;
    font-size: 12px;
    background-color: #c0c0c0;
    border-top: 1px solid #fff;
    border-left: 1px solid #fff;
    border-right: 1px solid #808080;
    border-bottom: 1px solid #808080;
    text-align: left;
    font-weight: normal;
}

.win-table td {
    padding: 8px 6px;
    font-size: 13px;
    border-bottom: 1px solid #dfdfdf;
}

/* 行選択時の「あの真っ青」なハイライト */
.row-selected td {
    background-color: #000080 !important;
    color: #ffffff !important;
}

/* 生徒セルのボタン */
.student-btn {
    font-size: 13px;
    font-family: inherit;
    color: inherit;
    background: none;
    border: none;
    cursor: pointer;
    text-align: left;
    width: 100%;
}

.student-btn:hover {
    text-decoration: underline;
}

/* カウントセル */
.count-cell {
    text-align: right;
    font-weight: bold;
}

/* 右側：特訓ログ表示（プロパティ画面風） */
.log-tab-container {
    border-bottom: 1px solid #808080;
    display: flex;
    gap: 2px;
    margin-bottom: 16px;
}

.log-tab {
    background-color: #c0c0c0;
    border-top: 2px solid #fff;
    border-left: 2px solid #fff;
    border-right: 2px solid #808080;
    padding: 4px 12px;
    font-size: 11px;
    cursor: default;
}

.log-tab.active {
    border-bottom: 1px solid #c0c0c0;
    margin-bottom: -1px;
    z-index: 2;
    padding-bottom: 5px;
}

.log-item {
    border: 1px solid #808080;
    padding: 12px;
    margin-bottom: 12px;
    background-color: #f1f1f1;
}

.log-title {
    font-size: 12px;
    font-weight: bold;
    color: #000080;
    margin-bottom: 4px;
}

.log-detail {
    font-size: 12px;
}

/* 未選択のプレースホルダー */
.empty-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #808080;
    text-align: center;
}

.empty-icon {
    font-size: 42px;
    margin-bottom: 12px;
}

.empty-text {
    font-size: 12px;
}
</style>

</head>

<body>

<!-- ヘッダー（タスクバー風） -->
<div class="task-bar">
    <button class="start-button">
        <span class="start-icon">💾</span>
        <span>START</span>
    </button>
    <div class="system-clock" id="systemClock">00:00</div>
</div>

<!-- メインデスクトップ -->
<div class="desktop-workspace">

    <!-- 左ウィンドウ -->
    <div class="win95-window">
        <div class="window-title-bar">
            <div class="title-text">
                <span>📁</span>
                <span>Students_Database.exe</span>
            </div>
            <div class="window-controls">
                <div class="win-btn">_</div>
                <div class="win-btn">?</div>
            </div>
        </div>
        <div class="window-body">
            <div class="control-panel">
                <div class="filter-group">
                    <span>Sort:</span>
                    <select id="sortSelect" onchange="loadSummary()">
                        <option value="count">練習回数順 (降順)</option>
                        <option value="id">生徒ID順 (昇順)</option>
                    </select>
                </div>
                <div>
                    <button class="btn-win95" onclick="refreshData()">再読込</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <table class="win-table" id="summaryTable">
                <thead>
                    <tr>
                        <th>生徒ID (名前)</th>
                        <th style="text-align: right; width: 100px;">練習回数</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- 動的に読み込み -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 右ウィンドウ -->
    <div class="win95-window">
        <div class="window-title-bar">
            <div class="title-text">
                <span>📑</span>
                <span>Interview_Properties.inf</span>
            </div>
            <div class="window-controls">
                <div class="win-btn">_</div>
                <div class="win-btn">×</div>
            </div>
        </div>
        <div class="window-body">
            <div class="log-tab-container">
                <div class="log-tab active">指導記録ログ</div>
            </div>
            <div id="historyArea">
                <!-- 未選択時の表示 -->
                <div class="empty-placeholder">
                    <div class="empty-icon">💾</div>
                    <p class="empty-text">生徒IDをダブルクリック（選択）して詳細を開いてください。</p>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

// 時計の更新
function updateClock() {
    let now = new Date();
    document.getElementById("systemClock").innerHTML = now.toLocaleTimeString("ja-JP", {hour: '2-digit', minute:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = "更新: " + now.toLocaleTimeString("ja-JP");
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";

        let students = [];
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="student-btn" onclick="showHistory('${student.id}')">
                        📄 ${student.id}
                    </button>
                </td>
                <td class="count-cell">
                    ${student.count} 回
                </td>
            </tr>
            `;
        });

        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // アクティブ行の切り替え
    document.querySelectorAll('.win-table tbody tr').forEach(tr => tr.classList.remove('row-selected'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('row-selected');
    }

    // ロード中表示
    document.getElementById("historyArea").innerHTML = `
        <div class="empty-placeholder">
            <div class="empty-icon">⏳</div>
            <p class="empty-text">ファイルを読み込み中...</p>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = "";

        for(let i = 0; i < data.length; i++){
            let date = new Date(data[i].date);
            html += `
            <div class="log-item">
                <div class="log-title">[セッション 0${i+1}]</div>
                <div class="log-detail">
                    担当：${data[i].teacher} 先生<br>
                    日時：${date.toLocaleString("ja-JP")}
                </div>
            </div>
            `;
        }

        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="empty-placeholder" style="color: #ff0000;">
                <div class="empty-icon">❌</div>
                <p class="empty-text">データ転送エラーが発生しました。再度読み込んでください。</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
