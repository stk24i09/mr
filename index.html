<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYS.TERMINAL // DATA_CONNECTION</title>

<style>
/* 共通リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    /* 開発環境でよく使われる等幅フォントをベースに設定 */
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
    background-color: #121212; /* 深いチャコールグレー */
    color: #e0e0e0; /* オフホワイト */
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 16px;
    font-size: 13px;
    line-height: 1.5;
}

/* ヘッダー：ターミナルのステータスバー風 */
.term-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background-color: #1a1a1a;
    border-bottom: 1px solid #333;
    margin-bottom: 16px;
}

.brand-title {
    font-weight: bold;
    color: #00bcd4; /* ターミナルシアン */
    letter-spacing: 0.05em;
}

.brand-title::before {
    content: "> ";
    color: #4caf50; /* ターミナルグリーン */
}

.sys-info {
    color: #888;
    font-size: 11px;
}

/* 2カラムレイアウト */
.term-workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 16px;
    width: 100%;
}

/* 各種パネル */
.term-panel {
    flex: 1;
    background-color: #1e1e1e;
    border: 1px solid #333;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
}

.panel-header {
    background-color: #252526;
    padding: 8px 16px;
    border-bottom: 1px solid #333;
    color: #aaa;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
}

.panel-body {
    overflow-y: auto;
    flex: 1;
    padding: 16px;
}

/* ツールバー */
.control-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px dashed #444;
}

.filter-group {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #888;
}

/* コマンドプロンプト風セレクトボックス */
select {
    background-color: #121212;
    color: #e0e0e0;
    border: 1px solid #444;
    padding: 4px 8px;
    font-family: inherit;
    font-size: 12px;
    outline: none;
    cursor: pointer;
}

select:focus {
    border-color: #00bcd4;
}

/* ソリッドなボタン */
.btn-cmd {
    background-color: transparent;
    color: #00bcd4;
    border: 1px solid #00bcd4;
    padding: 4px 12px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.1s;
}

.btn-cmd:hover {
    background-color: #00bcd4;
    color: #121212;
}

.btn-cmd:active {
    transform: translateY(1px);
}

#updateTime {
    font-size: 10px;
    color: #666;
    margin-top: 4px;
    text-align: right;
}

/* テーブルスタイル */
.data-table {
    width: 100%;
    border-collapse: collapse;
}

.data-table th {
    padding: 8px;
    color: #888;
    font-size: 11px;
    font-weight: normal;
    text-align: left;
    border-bottom: 1px solid #333;
}

.data-table td {
    padding: 10px 8px;
    border-bottom: 1px solid #2a2a2a;
}

/* リストアイテム（ボタン） */
.list-item-btn {
    background: none;
    border: none;
    color: #e0e0e0;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    width: 100%;
    display: flex;
    align-items: center;
}

.list-item-btn::before {
    content: "[ ]";
    color: #555;
    margin-right: 8px;
    font-size: 12px;
}

.list-item-btn:hover {
    color: #fff;
}

.list-item-btn:hover::before {
    color: #00bcd4;
}

/* 選択状態 */
.row-active td {
    background-color: #2a2d33 !important;
}

.row-active .list-item-btn {
    color: #00bcd4;
}

.row-active .list-item-btn::before {
    content: "[x]";
    color: #00bcd4;
}

/* カウントバッジ（四角いブロック） */
.count-block {
    background-color: #333;
    color: #ccc;
    padding: 2px 6px;
    font-size: 11px;
    display: inline-block;
    min-width: 40px;
    text-align: center;
}

/* 右パネル：ログ表示エリア */
.log-header-title {
    color: #4caf50;
    font-size: 14px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid #333;
}

.log-container {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

/* ログエントリ（1行のブロック） */
.log-entry {
    background-color: #1a1a1a;
    border-left: 2px solid #555;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.log-entry:hover {
    border-left-color: #4caf50;
    background-color: #222;
}

.log-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #888;
}

.log-idx {
    color: #00bcd4;
}

.log-content {
    color: #ccc;
    font-size: 13px;
}

.log-content span {
    color: #fff;
}

/* ステート表示（プレースホルダー／ロード中） */
.sys-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #666;
    text-align: center;
}

.cursor-blink {
    display: inline-block;
    width: 8px;
    height: 14px;
    background-color: #00bcd4;
    animation: blink 1s step-end infinite;
    margin-right: 8px;
    vertical-align: middle;
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
}

.sys-state-text {
    font-size: 12px;
}

/* エラー時の表示 */
.error-text {
    color: #f44336;
}
.error-text::before {
    content: "ERR: ";
}

/* スクロールバーのカスタマイズ（Webkit） */
::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}
::-webkit-scrollbar-track {
    background: #121212; 
}
::-webkit-scrollbar-thumb {
    background: #444; 
}
::-webkit-scrollbar-thumb:hover {
    background: #666; 
}
</style>

</head>

<body>

<!-- トップバー -->
<div class="term-header">
    <div class="brand-title">SYSTEM.TERMINAL</div>
    <div class="sys-info">DATA_CONNECTION_ESTABLISHED // PORT:8080</div>
</div>

<!-- ワークスペース -->
<div class="term-workspace">

    <!-- パネル左：インデックス -->
    <div class="term-panel">
        <div class="panel-header">INDEX / STUDENTS</div>
        <div class="panel-body">
            
            <div class="control-bar">
                <div class="filter-group">
                    SORT_BY:
                    <select id="sortSelect" onchange="loadSummary()">
                        <option value="count">REC_COUNT (DESC)</option>
                        <option value="id">STUDENT_ID (ASC)</option>
                    </select>
                </div>
                <div>
                    <button class="btn-cmd" onclick="refreshData()">EXECUTE_SYNC</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <table class="data-table" id="summaryTable">
                <thead>
                    <tr>
                        <th>TARGET_ID</th>
                        <th style="text-align: right; width: 80px;">RECORDS</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JS展開 -->
                </tbody>
            </table>

        </div>
    </div>

    <!-- パネル右：詳細ログ -->
    <div class="term-panel">
        <div class="panel-header">OUTPUT / ACTIVITY_LOG</div>
        <div id="historyArea" class="panel-body">
            
            <!-- 初期状態 -->
            <div class="sys-state">
                <div>
                    <span class="cursor-blink"></span>
                    <span class="sys-state-text">WAITING_FOR_INPUT...</span>
                </div>
                <div style="margin-top: 8px; font-size: 11px;">
                    Select a target ID from the index panel.
                </div>
            </div>

        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

// 初期ロード
loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = "SYNC: " + now.toLocaleTimeString("en-US", { hour12: false });
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";
        let students = [];
        
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="list-item-btn" onclick="showHistory('${student.id}')">
                        ${student.id}
                    </button>
                </td>
                <td style="text-align: right;">
                    <span class="count-block">${student.count}</span>
                </td>
            </tr>
            `;
        });

        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // 選択行のハイライト変更
    document.querySelectorAll('.data-table tbody tr').forEach(tr => tr.classList.remove('row-active'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('row-active');
    }

    // ロード中表示
    document.getElementById("historyArea").innerHTML = `
        <div class="sys-state">
            <div>
                <span class="cursor-blink"></span>
                <span class="sys-state-text">FETCHING_DATA [${studentId}]...</span>
            </div>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <div class="log-header-title">QUERY_RESULT // TARGET: ${studentId}</div>
        <div class="log-container">
        `;

        for(let i = 0; i < data.length; i++){
            // 日付を少し機械的なフォーマットに変換
            let d = new Date(data[i].date);
            let dateStr = d.getFullYear() + "-" + 
                          String(d.getMonth()+1).padStart(2,'0') + "-" + 
                          String(d.getDate()).padStart(2,'0') + " " + 
                          String(d.getHours()).padStart(2,'0') + ":" + 
                          String(d.getMinutes()).padStart(2,'0') + ":" + 
                          String(d.getSeconds()).padStart(2,'0');

            let indexStr = String(i+1).padStart(3, '0');

            html += `
            <div class="log-entry">
                <div class="log-meta">
                    <span class="log-idx">SEQ_${indexStr}</span>
                    <span>TS: ${dateStr}</span>
                </div>
                <div class="log-content">
                    OPERATOR: <span>${data[i].teacher}</span>
                </div>
            </div>
            `;
        }

        html += "</div>";
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="sys-state">
                <div class="sys-state-text error-text">CONNECTION_FAILED. TRY_AGAIN.</div>
            </div>
        `;
    });
}
</script>

</body>
</html>
