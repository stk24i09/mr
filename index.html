<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冒険の書 // 面接とっくんクエスト</title>

<!-- 日本語ドットフォントの読み込み -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

<style>
/* 共通リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    /* レトロゲーム風ドットフォント */
    font-family: 'DotGothic16', "Courier New", Courier, monospace;
    background-color: #0b0b16; /* 宇宙や闇を感じるダークネイビー */
    /* ドット絵風の背景グリッド */
    background-image: radial-gradient(#202040 10%, transparent 10%);
    background-size: 16px 16px;
    color: #ffffff;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 24px;
    image-rendering: pixelated; /* ドットのシャープさを強調 */
}

/* ヘッダー：ゲームのタイトル画面ロゴ風 */
.game-header {
    background-color: #000000;
    border: 4px solid #ffffff;
    outline: 4px solid #000000;
    height: 64px;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-shrink: 0;
    box-shadow: 0 8px 0 rgba(0,0,0,0.4);
}

.brand-title {
    font-size: 20px;
    color: #ffff00; /* レトロゴールド */
    text-shadow: 2px 2px 0px #ff0000;
    letter-spacing: 2px;
}

.system-status {
    font-size: 14px;
    color: #00ff00; /* セーブ完了グリーン */
}

/* 2カラムレイアウト */
.game-workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 20px;
    width: 100%;
}

/* クラシックRPGコマンドウィンドウ */
.rpg-window {
    flex: 1;
    background: linear-gradient(180deg, #000080 0%, #000030 100%); /* 王道の青いウインドウ */
    border: 4px solid #ffffff;
    outline: 4px solid #000000;
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
    box-shadow: inset 0 0 10px rgba(255,255,255,0.2);
}

.window-header {
    background-color: #000000;
    padding: 8px 16px;
    border-bottom: 4px solid #ffffff;
    font-size: 14px;
    color: #ffff00;
    letter-spacing: 1px;
}

.window-body {
    overflow-y: auto;
    flex: 1;
    padding: 20px;
}

/* コントロール（コマンド選択メニュー風） */
.control-panel {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
    background-color: rgba(0, 0, 0, 0.4);
    border: 2px dashed #ffffff;
    padding: 12px;
}

.filter-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
}

/* レトロデザインなセレクト */
select {
    padding: 6px 12px;
    font-size: 14px;
    font-family: inherit;
    border: 2px solid #ffffff;
    background-color: #000000;
    color: #ffffff;
    outline: none;
    cursor: pointer;
}

/* コマンド実行（たたく）ボタン */
.btn-pixel {
    padding: 6px 16px;
    font-size: 14px;
    font-family: inherit;
    background-color: #000000;
    color: #ffffff;
    border: 2px solid #ffffff;
    box-shadow: 3px 3px 0px #ffffff;
    cursor: pointer;
    transition: all 0.1s;
}

.btn-pixel:hover {
    background-color: #ffff00;
    color: #000000;
    border-color: #000000;
    box-shadow: 3px 3px 0px #000000;
}

.btn-pixel:active {
    transform: translate(3px, 3px);
    box-shadow: none;
}

#updateTime {
    font-size: 12px;
    color: #aaaaaa;
    margin-top: 6px;
}

/* ステータステーブル */
.rpg-table {
    width: 100%;
    border-collapse: collapse;
}

.rpg-table th {
    padding: 10px;
    font-size: 14px;
    color: #00ff00;
    text-align: left;
    border-bottom: 4px double #ffffff;
}

.rpg-table td {
    padding: 12px 10px;
    font-size: 16px;
    border-bottom: 2px dotted rgba(255,255,255,0.2);
}

/* 選択行：点滅するようなゴールドカラー */
.row-selected td {
    background-color: rgba(255, 255, 0, 0.15) !important;
}

.row-selected .student-btn::before {
    content: "▶ "; /* コマンド選択カーソル */
    color: #ffff00;
    animation: bounce 0.6s infinite alternate;
    display: inline-block;
}

@keyframes bounce {
    0% { transform: translateX(0); }
    100% { transform: translateX(4px); }
}

/* ギルドメンバーボタン */
.student-btn {
    font-size: 16px;
    font-family: inherit;
    color: #ffffff;
    background: none;
    border: none;
    cursor: pointer;
    text-align: left;
}

.student-btn::before {
    content: "  "; /* 未選択時は等幅スペース */
}

.student-btn:hover {
    color: #ffff00;
}

/* ステータスバー風回数ゲージ */
.status-bar-container {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: flex-end;
}

.level-text {
    color: #ffaa00;
    font-weight: bold;
}

.hp-gauge {
    width: 60px;
    height: 10px;
    background-color: #555555;
    border: 1px solid #ffffff;
    position: relative;
    overflow: hidden;
}

.hp-fill {
    height: 100%;
    background-color: #00ff00; /* 回数が多いほど緑、少ないと赤…を簡易表現 */
}

/* 右側：冒険の記録（ログ） */
.quest-title {
    font-size: 18px;
    color: #ffff00;
    margin-bottom: 16px;
    border-bottom: 2px solid #ffffff;
    padding-bottom: 8px;
}

.quest-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.quest-card {
    background-color: rgba(0,0,0,0.5);
    border: 2px solid #ffffff;
    padding: 16px;
    position: relative;
}

.quest-num {
    font-size: 12px;
    color: #ff5555; /* 赤色のクエストナンバー */
    margin-bottom: 6px;
}

.quest-detail {
    font-size: 14px;
    line-height: 1.6;
}

.quest-meta {
    color: #00ffff;
}

/* 待機時のメッセージボックス風表示 */
.rpg-idle {
    font-size: 16px;
    line-height: 1.8;
    color: #ffffff;
}

.text-blink {
    animation: blink 1s infinite steps(1);
}

@keyframes blink {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
}
</style>

</head>

<body>

<!-- ヘッダー -->
<div class="game-header">
    <div class="brand-title">⚔️ 面接とっくんクエスト</div>
    <div class="system-status">PARTY ACTIVE // SAVE 01</div>
</div>

<!-- メインエリア -->
<div class="game-workspace">

    <!-- 左パネル -->
    <div class="rpg-window">
        <div class="window-header">▼ ギルドメンバー (なまえ)</div>
        <div class="window-body">
            <div class="control-panel">
                <div class="filter-group">
                    <span>ならびかえ:</span>
                    <select id="sortSelect" onchange="loadSummary()">
                        <option value="count">レベリング順（多）</option>
                        <option value="id">名簿の番号順</option>
                    </select>
                </div>
                <div style="text-align: right;">
                    <button class="btn-pixel" onclick="refreshData()">しらべる</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <table class="rpg-table" id="summaryTable">
                <thead>
                    <tr>
                        <th>なまえ (ID)</th>
                        <th style="text-align: right; width: 150px;">つよさ (Lv)</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JSで展開 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 右パネル -->
    <div class="rpg-window">
        <div class="window-header">▼ ぼうけんのきろく</div>
        <div id="historyArea" class="window-body">
            <!-- 待機画面 -->
            <div class="rpg-idle">
                * おお、冒険者たちよ！<br>
                * 左のリストから仲間をえらび、これまでの特訓ログをロードするのじゃ。<br>
                <span class="text-blink">▼</span>
            </div>
        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = "記録時間: " + now.toLocaleTimeString("ja-JP");
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";

        let students = [];
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            // 回数に応じてHPバー（的なもの）の幅と色を決定 (MAX 10回想定)
            let percent = Math.min((student.count / 10) * 100, 100);
            let barColor = "#00ff00"; // 緑（通常）
            if(percent < 30) barColor = "#ff0000"; // 赤（ピンチ）
            else if(percent < 60) barColor = "#ffff00"; // 黄色（警告）

            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="student-btn" onclick="showHistory('${student.id}')">
                        ${student.id}
                    </button>
                </td>
                <td style="text-align: right;">
                    <div class="status-bar-container">
                        <span class="level-text">Lv ${student.count}</span>
                        <div class="hp-gauge">
                            <div class="hp-fill" style="width: ${percent}%; background-color: ${barColor};"></div>
                        </div>
                    </div>
                </td>
            </tr>
            `;
        });

        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // アクティブ選択行の切り替え
    document.querySelectorAll('.rpg-table tbody tr').forEach(tr => tr.classList.remove('row-selected'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('row-selected');
    }

    // ロード中表示
    document.getElementById("historyArea").innerHTML = `
        <div class="rpg-idle">
            * '${studentId}' の ぼうけんのしょを よみこんでいます...<br>
            * じゅもんを となえています...<span class="text-blink">⏳</span>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <div class="quest-title">🛡️ ${studentId} のクリア済みクエスト</div>
        <div class="quest-list">
        `;

        for(let i = 0; i < data.length; i++){
            let date = new Date(data[i].date);
            html += `
            <div class="quest-card">
                <div class="quest-num">[QUEST 0${i+1}]</div>
                <div class="quest-detail">
                    ギルドマスター <span class="quest-meta">${data[i].teacher}</span> が特訓を認可。<br>
                    討伐日時：<span class="quest-meta">${date.toLocaleString("ja-JP")}</span>
                </div>
            </div>
            `;
        }

        html += "</div>";
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="rpg-idle" style="color: #ff5555;">
                * つうしんエラー！<br>
                * おおっと、冒険の書は 消えてしまいました（一時的な切断です）。<br>
                * もう一度「しらべる」コマンドを実行するのじゃ！
            </div>
        `;
    });
}
</script>

</body>
</html>
