<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBER_OS // INTERACTIVE_DATABASE</title>

<style>
/* 共通リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: "Courier New", Courier, "SFMono-Regular", Consolas, monospace;
    background-color: #050508; /* 深宇宙の暗闇 */
    color: #00f3ff; /* メインカラー：サイバーブルー */
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 24px;
    letter-spacing: 0.05em;
}

/* ヘッダー：ホログラム風のネオンライン */
.hud-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background-color: rgba(0, 243, 255, 0.03);
    border: 1px solid #00f3ff;
    box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
    margin-bottom: 24px;
    border-radius: 4px;
    flex-shrink: 0;
}

.hud-title {
    font-size: 16px;
    font-weight: 900;
    text-shadow: 0 0 8px rgba(0, 243, 255, 0.8);
}

.hud-title::after {
    content: " v4.09_RC";
    color: #ff5f00; /* オレンジ警告色 */
    font-size: 11px;
    text-shadow: 0 0 8px rgba(ff, 5f, 00, 0.8);
}

.hud-status {
    font-size: 11px;
    color: #00f3ff;
    text-transform: uppercase;
}

/* 2カラムワークスペース */
.hud-workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 24px;
    width: 100%;
}

/* パネル */
.hud-panel {
    flex: 1;
    background-color: rgba(5, 5, 8, 0.9);
    border: 1px solid #00f3ff;
    box-shadow: inset 0 0 15px rgba(0, 243, 255, 0.1);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
    position: relative;
}

/* SF調のコーナー装飾（擬似要素でメカっぽさを演出） */
.hud-panel::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 10px;
    height: 10px;
    border-top: 2px solid #ff5f00;
    border-left: 2px solid #ff5f00;
}

.panel-header {
    background-color: rgba(0, 243, 255, 0.05);
    padding: 12px 20px;
    border-bottom: 1px solid #00f3ff;
    color: #ffffff;
    font-size: 11px;
    font-weight: bold;
    text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
    text-transform: uppercase;
}

.panel-body {
    overflow-y: auto;
    flex: 1;
    padding: 20px;
}

/* コントロールバー */
.control-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
}

.filter-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #00f3ff;
}

/* ネオンセレクト */
select {
    background-color: #050508;
    color: #00f3ff;
    border: 1px solid #00f3ff;
    padding: 6px 12px;
    font-size: 11px;
    font-family: inherit;
    outline: none;
    cursor: pointer;
    box-shadow: 0 0 5px rgba(0, 243, 255, 0.2);
}

select:focus {
    box-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
}

/* グロッシー・ネオンボタン */
.btn-cyber {
    background-color: transparent;
    color: #ff5f00;
    border: 1px solid #ff5f00;
    padding: 6px 16px;
    font-family: inherit;
    font-size: 11px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 5px rgba(255, 95, 0, 0.2);
    text-transform: uppercase;
}

.btn-cyber:hover {
    background-color: #ff5f00;
    color: #050508;
    box-shadow: 0 0 15px rgba(255, 95, 0, 0.6);
}

#updateTime {
    font-size: 10px;
    color: rgba(0, 243, 255, 0.5);
    margin-top: 6px;
    text-align: right;
}

/* テーブルスタイル */
.cyber-table {
    width: 100%;
    border-collapse: collapse;
}

.cyber-table th {
    padding: 10px 8px;
    font-size: 11px;
    color: #ff5f00;
    text-shadow: 0 0 5px rgba(255, 95, 0, 0.5);
    text-align: left;
    border-bottom: 1px solid #00f3ff;
}

.cyber-table td {
    padding: 14px 8px;
    font-size: 13px;
    border-bottom: 1px solid rgba(0, 243, 255, 0.15);
}

/* リストアイテム */
.item-btn {
    background: none;
    border: none;
    color: #00f3ff;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    width: 100%;
    transition: all 0.15s;
    text-shadow: 0 0 4px rgba(0, 243, 255, 0.3);
}

.item-btn:hover {
    color: #ffffff;
    text-shadow: 0 0 8px #00f3ff;
}

/* アクティブターゲット行 */
.row-active td {
    background-color: rgba(0, 243, 255, 0.1) !important;
    border-top: 1px solid #00f3ff;
    border-bottom: 1px solid #00f3ff;
}

.row-active .item-btn {
    color: #ffffff;
    font-weight: bold;
    text-shadow: 0 0 10px #00f3ff, 0 0 20px #00f3ff;
}

/* ホログラムカウンターバッジ */
.badge-neon {
    border: 1px solid #00f3ff;
    background-color: rgba(0, 243, 255, 0.1);
    color: #00f3ff;
    padding: 2px 8px;
    font-size: 11px;
    display: inline-block;
    box-shadow: 0 0 8px rgba(0, 243, 255, 0.3);
}

.row-active .badge-neon {
    background-color: #00f3ff;
    color: #050508;
    box-shadow: 0 0 12px #00f3ff;
}

/* 右側：記録リスト */
.console-title {
    font-size: 14px;
    font-weight: bold;
    color: #ffffff;
    margin-bottom: 20px;
    text-shadow: 0 0 8px rgba(255,255,255,0.8);
    display: flex;
    align-items: center;
    gap: 8px;
}

.console-title::before {
    content: "■";
    color: #ff5f00;
    text-shadow: 0 0 8px #ff5f00;
}

.console-stack {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* 詳細データボックス */
.console-card {
    border: 1px solid rgba(0, 243, 255, 0.3);
    background-color: rgba(0, 243, 255, 0.02);
    padding: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.15s;
}

.console-card:hover {
    border-color: #00f3ff;
    background-color: rgba(0, 243, 255, 0.05);
    box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
}

.console-main {
    font-size: 13px;
    color: #ffffff;
}

.console-main span {
    color: #00f3ff;
}

.console-meta {
    font-size: 11px;
    color: #ff5f00;
    text-shadow: 0 0 5px rgba(255, 95, 0, 0.5);
}

/* スタンバイ状態 */
.standby-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: rgba(0, 243, 255, 0.4);
    text-align: center;
}

.standby-prompt {
    font-size: 12px;
    line-height: 1.8;
}

/* レーダースキャン風のロードローダー */
.radar-loader {
    width: 32px;
    height: 32px;
    border: 1px solid transparent;
    border-radius: 50%;
    border-top-color: #ff5f00;
    border-bottom-color: #ff5f00;
    animation: rotate 1s linear infinite;
    margin-bottom: 16px;
    box-shadow: 0 0 10px rgba(255, 95, 0, 0.4);
}

@keyframes rotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* スクロールバーのサイバー風スタイリング */
::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
::-webkit-scrollbar-track {
    background: #050508;
}
::-webkit-scrollbar-thumb {
    background: rgba(0, 243, 255, 0.3);
    border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover {
    background: #00f3ff;
    box-shadow: 0 0 8px #00f3ff;
}
</style>

</head>

<body>

<!-- HUDコントロールヘッダー -->
<div class="hud-header">
    <div class="hud-title">CYBER_OS // NETWORK_SCANNER</div>
    <div class="hud-status">DATALINK_STABLE // SECURE_MODE</div>
</div>

<!-- メインスペース -->
<div class="hud-workspace">

    <!-- 左：データベースパネル -->
    <div class="hud-panel">
        <div class="panel-header">Directory Matrix</div>
        <div class="panel-body">
            
            <div class="control-bar">
                <div class="filter-group">
                    <span>SORT:</span>
                    <select id="sortSelect" onchange="loadSummary()">
                        <option value="count">BY_LOG_COUNT [MAX]</option>
                        <option value="id">BY_TARGET_ID [ASC]</option>
                    </select>
                </div>
                <div>
                    <button class="btn-cyber" onclick="refreshData()">SYNC_SYSTEM</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <table class="cyber-table" id="summaryTable">
                <thead>
                    <tr>
                        <th>TARGET_SIGNATURE</th>
                        <th style="text-align: right; width: 100px;">LOG_ENTRIES</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JS展開 -->
                </tbody>
            </table>

        </div>
    </div>

    <!-- 右：ログアウトプット -->
    <div class="hud-panel">
        <div class="panel-header">Matrix Output Stream</div>
        <div id="historyArea" class="panel-body">
            
            <!-- 初期状態 -->
            <div class="standby-container">
                <p class="standby-prompt">
                    [SYS_PENDING]<br>
                    SELECT TARGET FROM THE DIRECTORY MATRIX TO INITIALIZE DATA STREAM.
                </p>
            </div>

        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = "LAST_SYNC: " + now.toLocaleTimeString("ja-JP");
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";
        let students = [];
        
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="item-btn" onclick="showHistory('${student.id}')">
                        >> ${student.id}
                    </button>
                </td>
                <td style="text-align: right;">
                    <span class="badge-neon">${student.count}</span>
                </td>
            </tr>
            `;
        });

        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // アクティブなマトリクス行のハイライト
    document.querySelectorAll('.cyber-table tbody tr').forEach(tr => tr.classList.remove('row-active'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('row-active');
    }

    // ロード中表示
    document.getElementById("historyArea").innerHTML = `
        <div class="standby-container">
            <div class="radar-loader"></div>
            <p class="standby-prompt">DOWNLOADING STREAM FROM TARGET: ${studentId}...</p>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <div class="console-title">STREAM_ACTIVE // TARGET: ${studentId}</div>
        <div class="console-stack">
        `;

        for(let i = 0; i < data.length; i++){
            let d = new Date(data[i].date);
            let dateStr = d.getFullYear() + "." + 
                          String(d.getMonth()+1).padStart(2,'0') + "." + 
                          String(d.getDate()).padStart(2,'0') + " " + 
                          String(d.getHours()).padStart(2,'0') + ":" + 
                          String(d.getMinutes()).padStart(2,'0');

            html += `
            <div class="console-card">
                <div class="console-main">
                    OPERATOR: <span>${data[i].teacher}</span>
                </div>
                <div class="console-meta">
                    [${dateStr}]
                </div>
            </div>
            `;
        }

        html += "</div>";
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="standby-container" style="color: #ff5f00;">
                <p class="standby-prompt">[FATAL_ERROR] STREAM DECRYPT FAILURE. RE-CONNECT REQUIRED.</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
