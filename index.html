<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍔 RETRO DINER // STUDENT LOG CONNECTION</title>

<style>
/* 共通リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    /* アメリカンレトロなサンセリフと可愛いポップフォント */
    font-family: "Futura", "Helvetica Neue", "Arial", "Comic Sans MS", cursive, sans-serif;
    background-color: #fdfcf5; /* バニラシェイク・クリーム */
    /* 薄いチェッカーフラッグ柄の背景 */
    background-image: 
        linear-gradient(45deg, #f8f6e9 25%, transparent 25%), 
        linear-gradient(-45deg, #f8f6e9 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #f8f6e9 75%),
        linear-gradient(-45deg, transparent 75%, #f8f6e9 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    color: #333;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 24px;
    letter-spacing: 0.02em;
}

/* ヘッダー：ダイナーのネオン看板風 */
.diner-header {
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding: 0 20px;
    background-color: #e74c3c; /* チェリーレッド */
    border: 4px solid #fff;
    border-radius: 12px;
    box-shadow: 0 6px 0 #c0392b, 0 8px 15px rgba(0,0,0,0.2);
    flex-shrink: 0;
}

.brand-title {
    font-size: 24px;
    font-weight: 900;
    color: #fff;
    text-shadow: 3px 3px 0 #c0392b, -1px -1px 0 #333, 1px -1px 0 #333, -1px 1px 0 #333, 1px 1px 0 #333;
    display: flex;
    align-items: center;
    gap: 12px;
}

.brand-icon {
    font-size: 32px;
}

.station-status {
    font-size: 14px;
    font-weight: bold;
    color: #f1c40f; /* サンシャインイエロー */
    background-color: #333;
    padding: 6px 16px;
    border-radius: 20px;
    border: 2px solid #fff;
    letter-spacing: 0.1em;
}

/* 2カラムレイアウト */
.diner-workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 24px;
    width: 100%;
}

/* ダイナーのカウンターや席をイメージしたパネル */
.diner-panel {
    flex: 1;
    background: #fff;
    border: 4px solid #333;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
    box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.1);
}

.panel-header {
    /* チェッカーフラッグ柄のヘッダー */
    background-image: 
        linear-gradient(45deg, #333 25%, transparent 25%), 
        linear-gradient(-45deg, #333 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #333 75%),
        linear-gradient(-45deg, transparent 75%, #333 75%);
    background-size: 16px 16px;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
    background-color: #fff;
    padding: 12px 20px;
    border-bottom: 4px solid #333;
}

.panel-title {
    font-size: 16px;
    font-weight: 900;
    color: #fff;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    background-color: rgba(0,0,0,0.7);
    padding: 4px;
    display: inline-block;
}

.panel-body {
    overflow-y: auto;
    flex: 1;
    padding: 24px;
}

/* コントロール（メニュー注文風） */
.control-panel {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
    background-color: #fcf8e3; /* 薄いイエロー */
    border: 2px dashed #e67e22; /* オレンジの破線 */
    border-radius: 12px;
    padding: 16px;
}

.filter-group {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: bold;
    color: #e67e22;
}

/* ポップなセレクトボックス */
select {
    padding: 8px 16px;
    font-size: 13px;
    font-family: inherit;
    border: 3px solid #333;
    border-radius: 8px;
    background-color: #fff;
    color: #333;
    outline: none;
    cursor: pointer;
    font-weight: bold;
}

select:hover {
    background-color: #fdfcf5;
}

/* ジュークボックスのボタン風同期ボタン */
.btn-diner {
    padding: 8px 20px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 900;
    background-color: #3498db; /* アクアブルー */
    color: #fff;
    border: 3px solid #333;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.1s;
    box-shadow: 0 4px 0 #333;
    text-transform: uppercase;
}

.btn-diner:hover {
    background-color: #5dade2;
    transform: translateY(2px);
    box-shadow: 0 2px 0 #333;
}

.btn-diner:active {
    transform: translateY(4px);
    box-shadow: none;
}

#updateTime {
    font-size: 11px;
    color: #7f8c8d;
    margin-top: 6px;
    text-align: right;
    font-weight: bold;
}

/* メニュー表風のテーブル */
.diner-table {
    width: 100%;
    border-collapse: collapse;
}

.diner-table th {
    padding: 12px 8px;
    font-size: 12px;
    color: #e74c3c;
    text-transform: uppercase;
    text-align: left;
    border-bottom: 3px solid #333;
}

.diner-table td {
    padding: 18px 8px;
    font-size: 15px;
    border-bottom: 1px solid #eee;
}

/* オーダーボタン風（生徒名） */
.student-btn {
    font-size: 16px;
    font-family: inherit;
    font-weight: 900;
    color: #3498db;
    background: none;
    border: none;
    cursor: pointer;
    text-align: left;
    transition: all 0.1s;
    display: flex;
    align-items: center;
    gap: 8px;
}

.student-btn:hover {
    color: #e74c3c;
    transform: scale(1.05);
}

/* 選択行：ケチャップとマスタードのような陽気な黄色ハイライト */
.row-selected td {
    background-color: #fef9e7 !important;
    border-bottom: 2px solid #f1c40f;
}

.row-selected .student-btn {
    color: #e74c3c;
}

/* オーダー数バッジ（ソーダのキャップ風） */
.order-badge {
    background-color: #f1c40f;
    color: #333;
    border: 2px solid #333;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 900;
}

/* 右側：履歴（オーダー伝票風） */
.order-slip-title {
    font-size: 18px;
    font-weight: 900;
    color: #e74c3c;
    margin-bottom: 24px;
    border-bottom: 3px solid #333;
    padding-bottom: 10px;
    text-align: center;
}

.order-stack {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

/* レトロな伝票・メニュー風カード */
.order-card {
    background-color: #fff;
    border: 3px solid #333;
    border-radius: 8px;
    padding: 16px;
    position: relative;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
}

.order-card:hover {
    background-color: #fdfcf5;
}

/* 伝票のパンチ穴を疑似表現 */
.order-card::before {
    content: "";
    position: absolute;
    top: 10px;
    right: 10px;
    width: 12px;
    height: 12px;
    background-color: #fdfcf5; /* 背景色で抜く */
    border: 2px solid #333;
    border-radius: 50%;
}

.order-num {
    font-size: 11px;
    font-weight: bold;
    color: #e67e22;
    margin-bottom: 6px;
}

.order-main {
    font-size: 14px;
    font-weight: bold;
    color: #333;
    margin-bottom: 6px;
}

.order-main span {
    color: #e74c3c;
}

.order-date {
    font-size: 12px;
    color: #7f8c8d;
    font-family: sans-serif;
}

/* 未選択：営業時間外のジュークボックス */
.closed-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #7f8c8d;
    text-align: center;
}

.closed-icon {
    font-size: 48px;
    margin-bottom: 20px;
    animation: jukebox-wobble 2s infinite ease-in-out;
}

@keyframes jukebox-wobble {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
}

.closed-text {
    font-size: 14px;
    line-height: 1.8;
    font-weight: bold;
}
</style>

</head>

<body>

<!-- ヘッダー -->
<div class="diner-header">
    <div class="brand-title">
        <span class="brand-icon">🍔</span>
        <span>RETRO DINER // LOG CONNECTION</span>
    </div>
    <div class="station-status">OPEN 24 HOURS</div>
</div>

<!-- メインエリア -->
<div class="diner-workspace">

    <!-- 左パネル：メニュー（生徒名簿） -->
    <div class="diner-panel">
        <div class="panel-header">
            <div class="panel-title">MENU: ACCESS ID List</div>
        </div>
        <div class="panel-body">
            <div class="control-panel">
                <div class="filter-group">
                    <span>SORT BY:</span>
                    <select id="sortSelect" onchange="loadSummary()">
                        <option value="count">Most Orders (指導回数)</option>
                        <option value="id">ID (Alphabetical)</option>
                    </select>
                </div>
                <div>
                    <button class="btn-diner" onclick="refreshData()">SYNC (同期)</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <table class="diner-table" id="summaryTable">
                <thead>
                    <tr>
                        <th>Identifier (ID)</th>
                        <th style="text-align: right; width: 100px;">Orders</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JSで展開 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 右パネル：オーダー伝票（指導履歴） -->
    <div class="diner-panel">
        <div class="panel-header">
            <div class="panel-title">Your Order History</div>
        </div>
        <div id="historyArea" class="panel-body">
            <!-- 未選択表示 -->
            <div class="closed-state">
                <div class="closed-icon">📻</div>
                <p class="closed-text">
                    Welcome to Retro Diner!<br>
                    左のID（メニュー）をクリックして、これまでの特訓オーダー（指導履歴）を呼び出してください。
                </p>
            </div>
        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = "SYNC TIME: " + now.toLocaleTimeString("en-US");
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";

        let students = [];
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="student-btn" onclick="showHistory('${student.id}')">
                        🥤 ${student.id}
                    </button>
                </td>
                <td style="text-align: right;">
                    <span class="order-badge">${student.count}</span>
                </td>
            </tr>
            `;
        });

        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // アクティブ行の切り替え
    document.querySelectorAll('.diner-table tbody tr').forEach(tr => tr.classList.remove('row-selected'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('row-selected');
    }

    // ロード表示
    document.getElementById("historyArea").innerHTML = `
        <div class="closed-state">
            <div class="closed-icon" style="animation: jukebox-wobble 0.5s infinite linear;">🍔</div>
            <p class="closed-text">Now Cooking... データをオーブンで焼いています...</p>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <div class="order-slip-title">ORDER SLIP // ${studentId}様</div>
        <div class="order-stack">
        `;

        for(let i = 0; i < data.length; i++){
            let date = new Date(data[i].date);
            html += `
            <div class="order-card">
                <div class="order-num">GUEST CHECK #0${i+1}</div>
                <div class="order-main">担当スタッフ：<span>${data[i].teacher}</span> 先生</div>
                <div class="order-date">日時：${date.toLocaleString("ja-JP")}</div>
            </div>
            `;
        }

        html += "</div>";
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="closed-state" style="color: #e74c3c;">
                <div class="closed-icon">💥</div>
                <p class="closed-text">Oops! 通信エラーです。オーブンの調子が悪いようです。「SYNC」ボタンを押してください。</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
