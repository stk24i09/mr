<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面接練習回数管理システム</title>

<style>
/* 共通リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-color: #fcfcfd; /* 超極薄グレー */
    color: #1e1e1e;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* シンプルなヘッダー（線の細いミニマルなデザイン） */
.app-navbar {
    background-color: #ffffff;
    height: 56px;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #ededed;
    flex-shrink: 0;
}

.app-logo {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #111111;
    display: flex;
    align-items: center;
    gap: 8px;
}

.logo-dot {
    width: 8px;
    height: 8px;
    background-color: #111111;
    border-radius: 50%;
}

.app-status {
    font-size: 11px;
    color: #666666;
    background: #f0f0f0;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 500;
}

/* メインフレーム */
.app-main {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: 100%;
}

/* 左：生徒リスト（ナビゲーション型） */
.sidebar-panel {
    width: 380px;
    background-color: #ffffff;
    border-right: 1px solid #ededed;
    display: flex;
    flex-direction: column;
    height: 100%;
    flex-shrink: 0;
}

/* 右：コンテンツ表示 */
.content-panel {
    flex: 1;
    background-color: #fbfbfb;
    display: flex;
    flex-direction: column;
    height: 100%;
}

/* 各エリアのヘッダー */
.area-header {
    padding: 20px 24px;
    border-bottom: 1px solid #ededed;
    background-color: #ffffff;
    flex-shrink: 0;
}

.area-title {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #666666;
}

/* スクロールする中身 */
.scroll-area {
    overflow-y: auto;
    flex: 1;
    padding: 24px;
}

/* すっきり整理されたツールバー */
.toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 20px;
}

.tool-select {
    font-size: 12px;
    padding: 6px 12px;
    border: 1px solid #dddddd;
    border-radius: 4px;
    background-color: #ffffff;
    color: #333333;
    outline: none;
    cursor: pointer;
}

.btn-update {
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    border: 1px solid #111111;
    background-color: #111111;
    color: #ffffff;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
}

.btn-update:hover {
    background-color: #333333;
    border-color: #333333;
}

#updateTime {
    font-size: 10px;
    color: #888888;
    margin-top: 4px;
    text-align: right;
}

/* Notion風テーブルリスト（行間に境界線を引かず、ブロックが並んでいるように見せる） */
.student-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.student-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background-color: #ffffff;
    border: 1px solid #ededed;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
}

.student-row:hover {
    border-color: #111111;
    background-color: #fafafa;
}

.student-row-active {
    background-color: #111111 !important;
    border-color: #111111 !important;
}

.student-row-id {
    font-size: 14px;
    font-weight: 600;
    color: #111111;
    transition: color 0.15s;
}

.student-row-active .student-row-id {
    color: #ffffff;
}

/* ミニマムな回数バッジ */
.badge-count {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 8px;
    background-color: #f0f0f0;
    color: #555555;
    border-radius: 4px;
    transition: all 0.15s;
}

.student-row-active .badge-count {
    background-color: rgba(255, 255, 255, 0.2);
    color: #ffffff;
}

/* 右側：詳細履歴のカード型デザイン */
.history-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 20px;
    color: #111111;
}

.history-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.history-card {
    background-color: #ffffff;
    border: 1px solid #ededed;
    border-radius: 8px;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.history-card-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.history-card-num {
    font-size: 11px;
    font-weight: 700;
    color: #888888;
    text-transform: uppercase;
}

.history-card-teacher {
    font-size: 14px;
    font-weight: 600;
    color: #111111;
}

.history-card-date {
    font-size: 12px;
    color: #666666;
    text-align: right;
}

/* プレースホルダー */
.state-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #888888;
    text-align: center;
}

.state-empty-icon {
    font-size: 24px;
    margin-bottom: 8px;
}

.state-empty-text {
    font-size: 13px;
}
</style>

</head>

<body>

<!-- アプリヘッダー -->
<div class="app-navbar">
    <div class="app-logo">
        <div class="logo-dot"></div>
        面接回数ダッシュボード
    </div>
    <span class="app-status">管理者用ツール</span>
</div>

<!-- メイン領域 -->
<div class="app-main">

    <!-- 左：サイドバー（生徒一覧） -->
    <div class="sidebar-panel">
        <div class="area-header">
            <div class="area-title">生徒リスト</div>
        </div>
        <div class="scroll-area">
            <div class="toolbar">
                <select id="sortSelect" class="tool-select" onchange="loadSummary()">
                    <option value="count">面接数順</option>
                    <option value="id">ID順</option>
                </select>
                <div>
                    <button class="btn-update" onclick="refreshData()">更新</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <div class="student-list" id="studentListContainer">
                <!-- JSで生徒リストが挿入されます -->
            </div>
        </div>
    </div>

    <!-- 右：履歴画面 -->
    <div class="content-panel">
        <div class="area-header">
            <div class="area-title">詳細情報</div>
        </div>
        <div id="historyArea" class="scroll-area">
            <!-- 初期表示 -->
            <div class="state-empty">
                <div class="state-empty-icon">📂</div>
                <p class="state-empty-text">生徒を選択すると、詳細な履歴を表示します。</p>
            </div>
        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = now.toLocaleTimeString("ja-JP") + " 更新";
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";

        let students = [];
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        // 並び替え処理
        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            html += `
            <div class="student-row" id="row-${student.id}" onclick="showHistory('${student.id}')">
                <span class="student-row-id">${student.id}</span>
                <span class="badge-count">${student.count}回</span>
            </div>
            `;
        });

        document.getElementById("studentListContainer").innerHTML = html;
    });
}

function showHistory(studentId){
    // アクティブな行のハイライト変更
    document.querySelectorAll('.student-row').forEach(row => row.classList.remove('student-row-active'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('student-row-active');
    }

    // 読み込み中表示
    document.getElementById("historyArea").innerHTML = `
        <div class="state-empty">
            <div class="state-empty-icon">🔄</div>
            <p class="state-empty-text">読み込み中...</p>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <h2 class="history-title">${studentId} の履歴詳細</h2>
        <div class="history-grid">
        `;

        for(let i = 0; i < data.length; i++){
            let date = new Date(data[i].date);
            html += `
            <div class="history-card">
                <div class="history-card-left">
                    <span class="history-card-num">${i+1}回目の練習</span>
                    <span class="history-card-teacher">担当：${data[i].teacher} 先生</span>
                </div>
                <div class="history-card-date">
                    ${date.toLocaleString("ja-JP")}
                </div>
            </div>
            `;
        }

        html += "</div>";
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="state-empty" style="color: #ff3333;">
                <div class="state-empty-icon">⚠️</div>
                <p class="state-empty-text">読み込みに失敗しました。</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
