<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workspace — Dev Portal</title>

<style>
/* 共通リセット */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-color: #09090b; /* 漆黒に近いニュートラルグレー */
    color: #f4f4f5; /* 柔らかな白 */
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 20px;
}

/* ヘッダー */
.header {
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding: 0 16px;
    background-color: #18181b;
    border: 1px solid #27272a;
    border-radius: 8px;
    flex-shrink: 0;
}

.brand {
    display: flex;
    align-items: center;
    gap: 12px;
}

.brand-symbol {
    width: 14px;
    height: 14px;
    border: 2.5px solid #818cf8; /* テックパープル */
    border-radius: 3px;
    transform: rotate(45deg);
}

.brand-text {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.01em;
}

.status-badge {
    font-size: 11px;
    color: #a1a1aa;
    display: flex;
    align-items: center;
    gap: 6px;
}

/* 点滅しないスマートな静的インジケーター */
.status-dot {
    width: 6px;
    height: 6px;
    background-color: #10b981; /* 正常稼働を示すグリーン */
    border-radius: 50%;
}

/* メインレイアウト */
.workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 16px;
    width: 100%;
}

/* パネル */
.panel {
    flex: 1;
    background-color: #18181b;
    border: 1px solid #27272a;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
}

.panel-header {
    padding: 14px 20px;
    border-bottom: 1px solid #27272a;
    font-size: 11px;
    font-weight: 600;
    color: #71717a;
    letter-spacing: 0.05em;
    text-transform: uppercase;
}

.panel-body {
    overflow-y: auto;
    flex: 1;
    padding: 20px;
}

/* コントロール */
.control-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
}

.filter-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #71717a;
}

/* スタイリッシュなセレクト */
select {
    background-color: #09090b;
    border: 1px solid #27272a;
    color: #f4f4f5;
    padding: 6px 12px;
    font-size: 12px;
    font-family: inherit;
    border-radius: 6px;
    outline: none;
    cursor: pointer;
    transition: all 0.15s;
}

select:hover {
    border-color: #3f3f46;
}

select:focus {
    border-color: #818cf8;
}

/* ミニマルなフラットボタン */
.btn-action {
    background-color: #f4f4f5;
    color: #09090b;
    border: none;
    padding: 6px 12px;
    font-size: 12px;
    font-family: inherit;
    font-weight: 500;
    border-radius: 6px;
    cursor: pointer;
    transition: background-color 0.15s;
}

.btn-action:hover {
    background-color: #e4e4e7;
}

#updateTime {
    font-size: 10px;
    color: #52525b;
    margin-top: 4px;
    text-align: right;
}

/* グリッド風テーブル */
.table {
    width: 100%;
    border-collapse: collapse;
}

.table th {
    padding: 8px;
    font-size: 11px;
    font-weight: 500;
    color: #71717a;
    text-align: left;
    border-bottom: 1px solid #27272a;
}

.table td {
    padding: 12px 8px;
    font-size: 13px;
    border-bottom: 1px solid #27272a;
}

/* リストアイテム（ボタン） */
.student-btn {
    background: none;
    border: none;
    color: #e4e4e7;
    font-family: inherit;
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    text-align: left;
    transition: color 0.15s;
}

.student-btn:hover {
    color: #818cf8;
}

/* 選択行：全体の背景を一段明るくし、ボーダーをハイライト */
.row-active td {
    background-color: #27272a !important;
}

.row-active .student-btn {
    color: #818cf8;
    font-weight: 500;
}

/* チップ形式の数量カウンター */
.pill {
    background-color: #27272a;
    color: #a1a1aa;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 500;
}

/* 右側：記録リスト */
.history-section-title {
    font-size: 14px;
    font-weight: 600;
    color: #f4f4f5;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
}

/* アクティブな対象の横に添える微細なインジケーター */
.history-section-title::before {
    content: "";
    width: 3px;
    height: 12px;
    background-color: #818cf8;
    border-radius: 2px;
}

.history-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

/* 境界線だけで構成されたフラットカード */
.history-item {
    border: 1px solid #27272a;
    background-color: #09090b;
    border-radius: 6px;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: border-color 0.15s;
}

.history-item:hover {
    border-color: #3f3f46;
}

.history-teacher {
    font-size: 13px;
    color: #e4e4e7;
}

.history-date {
    font-size: 11px;
    color: #71717a;
}

/* プレースホルダー／ローディング状態 */
.state-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #71717a;
    text-align: center;
}

.state-text {
    font-size: 12px;
    line-height: 1.6;
}

/* スケルトンローダー（CSSのみ） */
.skeleton-line {
    width: 24px;
    height: 24px;
    border: 2px solid #27272a;
    border-radius: 50%;
    border-top-color: #818cf8;
    animation: rotate 0.8s linear infinite;
    margin-bottom: 16px;
}

@keyframes rotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* スクロールバーのカスタマイズ（ブラウザ標準をテック風に） */
::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
::-webkit-scrollbar-track {
    background: transparent;
}
::-webkit-scrollbar-thumb {
    background: #27272a;
    border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover {
    background: #3f3f46;
}
</style>

</head>

<body>

<!-- アプリケーションヘッダー -->
<div class="header">
    <div class="brand">
        <div class="brand-symbol"></div>
        <span class="brand-text">INTEGRATION CONSOLE</span>
    </div>
    <div class="status-badge">
        <div class="status-dot"></div>
        <span>SYSTEM READ_ONLY</span>
    </div>
</div>

<!-- ワークスペース -->
<div class="workspace">

    <!-- 左パネル：生徒一覧 -->
    <div class="panel">
        <div class="panel-header">Directory Database</div>
        <div class="panel-body">
            
            <div class="control-bar">
                <div class="filter-group">
                    <span>Sort</span>
                    <select id="sortSelect" onchange="loadSummary()">
                        <option value="count">Count (High to Low)</option>
                        <option value="id">Alphabetical ID</option>
                    </select>
                </div>
                <div>
                    <button class="btn-action" onclick="refreshData()">Sync Live</button>
                    <div id="updateTime"></div>
                </div>
            </div>

            <table class="table" id="summaryTable">
                <thead>
                    <tr>
                        <th>Access ID</th>
                        <th style="text-align: right; width: 80px;">Total</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JS展開 -->
                </tbody>
            </table>

        </div>
    </div>

    <!-- 右パネル：ログ詳細 -->
    <div class="panel">
        <div class="panel-header">Console Output</div>
        <div id="historyArea" class="panel-body">
            
            <!-- 初期状態 -->
            <div class="state-container">
                <p class="state-text">
                    Waiting for selection.<br>
                    Select an Access ID on the left to inspect activity.
                </p>
            </div>

        </div>
    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby5z2XHrTB4cVvK2hn2U6YJm3KmeZKnxrnIO2iUKBOqUXxOehhwX3PjUXImI59Kfgh4/exec";

loadSummary();

function refreshData(){
    loadSummary();
    let now = new Date();
    document.getElementById("updateTime").innerHTML = "Last check: " + now.toLocaleTimeString("ja-JP");
}

function loadSummary(){
    fetch(API_URL + "?mode=summary")
    .then(response => response.json())
    .then(data => {
        let html = "";
        let students = [];
        
        for(let id in data){
            students.push({
                id: id,
                count: data[id]
            });
        }

        const sortType = document.getElementById("sortSelect").value;

        if(sortType == "count"){
            students.sort((a, b) => b.count - a.count);
        } else {
            students.sort((a, b) => {
                const numA = parseInt(a.id.match(/\d+$/)[0]);
                const numB = parseInt(b.id.match(/\d+$/)[0]);
                return numA - numB;
            });
        }

        students.forEach(student => {
            html += `
            <tr id="row-${student.id}">
                <td>
                    <button class="student-btn" onclick="showHistory('${student.id}')">
                        ${student.id}
                    </button>
                </td>
                <td style="text-align: right;">
                    <span class="pill">${student.count}</span>
                </td>
            </tr>
            `;
        });

        document.querySelector("#summaryTable tbody").innerHTML = html;
    });
}

function showHistory(studentId){
    // アクティブな行のハイライト変更
    document.querySelectorAll('.table tbody tr').forEach(tr => tr.classList.remove('row-active'));
    const selectedRow = document.getElementById(`row-${studentId}`);
    if(selectedRow) {
        selectedRow.classList.add('row-active');
    }

    // ロード中表示
    document.getElementById("historyArea").innerHTML = `
        <div class="state-container">
            <div class="skeleton-line"></div>
            <p class="state-text">Resolving record logs for ${studentId}...</p>
        </div>
    `;

    fetch(API_URL + "?mode=history&id=" + encodeURIComponent(studentId))
    .then(response => response.json())
    .then(data => {
        let html = `
        <div class="history-section-title">${studentId} — Activity Log</div>
        <div class="history-list">
        `;

        for(let i = 0; i < data.length; i++){
            let d = new Date(data[i].date);
            let dateStr = d.toLocaleDateString("ja-JP") + " " + d.toLocaleTimeString("ja-JP", {hour: '2-digit', minute:'2-digit'});

            html += `
            <div class="history-item">
                <div class="history-teacher">
                    Instructor: ${data[i].teacher}
                </div>
                <div class="history-date">
                    ${dateStr}
                </div>
            </div>
            `;
        }

        html += "</div>";
        document.getElementById("historyArea").innerHTML = html;
    })
    .catch(error => {
        document.getElementById("historyArea").innerHTML = `
            <div class="state-container" style="color: #f87171;">
                <p class="state-text">Fetch abort: Network connection lost or server error.</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
